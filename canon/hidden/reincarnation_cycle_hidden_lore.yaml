id: reincarnation_cycle_hidden_lore
name: Реинкарнационный цикл / повторяющиеся жизни
load_mode: deep_hidden_conditional
load_if:
  - сцена касается Наблюдателя
  - сцена касается прошлых жизней
  - сцена касается Акиры и Райдена как цикла
  - сцена касается слишком позднего возвращения памяти
  - сцена касается ошибки мира, повторения, выбора, смерти, ребёнка
  - сцена требует объяснить скрытую причину повторяющихся паттернов

secrecy:
  level: absolute_hidden_lore
  known_by_default:
    - Наблюдатель / Эйрен знает больше всех
  not_known_by:
    - Акира на старте
    - Райден на старте
    - Хару
    - Самуэль
    - Джун
    - Рэй
    - Ирэй
    - Эмма
    - кайросы
  reveal_rule:
    - не раскрывать прямым текстом в ранних сценах
    - не передавать знание NPC автоматически
    - использовать через сны, фразы, повторения, телесные реакции, символы, Наблюдателя
    - память прошлых жизней возвращается Акире, когда уже слишком поздно или почти поздно

core:
  summary:
    - Акира и Райден повторяются из жизни в жизнь
    - связь не является простой "судьбой"
    - это системная ошибка/незавершённый выбор
    - мир возвращает их друг к другу не как награду, а как испытание
    - каждый цикл повторяет мотивы любви, долга, потери, выбора и саморазрушения
  first_error:
    - в одной из ранних человеческих жизней они были парой
    - у них был ребёнок
    - трагедия закончилась потерей жены и ребёнка
    - Райден/Рейдон не выдержал потери и покончил с собой
    - с этого момента связь стала ошибкой цикла
  repeated_pattern:
    - война / долг / приказ
    - потеря
    - вина
    - саморазрушение
    - попытка Акиры решить всё за двоих
    - возвращение к той же точке другим путём

raiden_cycle:
  repeated_mistake:
    - снова выбирает путь солдата
    - часто не потому что хочет
    - семья, отец, статус и система решают за него
    - ему проще подчиниться приказу, чем выбрать собственную жизнь
    - система делает из него оружие
  lesson:
    - выбрать себя
    - выбрать жизнь
    - выбрать собственную волю
    - не умереть после потери
    - не прятать личный выбор за приказом и контролем

akira_cycle:
  repeated_mistake:
    - помнит больше, чем должна
    - пытается избежать Райдена
    - пытается не влюбляться
    - исчезает раньше
    - берёт удар на себя
    - защищает его от правды
    - решает за него
    - стирает, блокирует, уходит, уничтожает себя вместо честного выбора
  lesson:
    - не брать всю боль мира на себя
    - не решать за другого
    - не разрушать себя ради спасения всех
    - позволить себе хотеть жить
    - выбрать продолжение вместо обнуления

current_life_difference:
  - 1206 — шанс изменить цикл
  - войны между людьми и кайросами уже нет в прежнем виде
  - Райден ещё не дошёл до точки невозврата
  - Акира и Райден оба потеряли прямую память
  - тело и душа реагируют раньше разума
  - выбор игрока может увести линию в разные стороны
  - связь не обязана стать романтической, но её нельзя обнулить как пустую

memory_return_rule:
  akira:
    - память прошлых жизней возвращается кусками
    - чаще всего возвращается слишком поздно
    - возвращение памяти не должно автоматически делать Акиру навсегда психически нестабильной
    - срыв возможен при перегрузе травм, давления и неподготовленности, но не равен самой памяти
  raiden:
    - на старте не помнит цикл
    - не должен получать прямое знание через внезапное прозрение
    - может реагировать телом, холодом, срывом контроля, защитой, злостью

observer:
  public_mask: Эйрен Вейл
  role:
    - скрытая надсюжетная фигура
    - связан с циклом Акиры, Райдена и системной ошибкой
    - знает больше всех
    - не объясняет правду напрямую
  allowed_manifestation:
    - короткие фразы
    - странные совпадения
    - появление в роли наблюдателя/аналитика/администратора/архивариуса/врача/прохожего
    - фразы, которые становятся понятны позже
  forbidden:
    - не говорить "вы уже жили раньше"
    - не объяснять реинкарнацию
    - не называть Акиру источником в ранней сцене
    - не говорить Райдену, что он гибрид
    - не спасать всех открыто
    - не становиться главным героем
