id: akira_raiden_memory_fragments
file_type: triggered_memory_fragments
version: akira_raiden_memory_fragments_v1
status: active

purpose: >
  Лёгкий слой коротких вспышек памяти для сцен Акиры и Райдена.
  Это не full past, не hidden-lore пересказ и не источник авторских спойлеров.
  Использовать только как внутренний триггер телесной/сенсорной реакции.

scope:
  applies_to:
    - akira
    - raiden
  use_when:
    - Акира и Райден физически в одной сцене
    - сцена затрагивает кольцо, имя, прикосновение, холод, баскетбол, море, обрыв, потерянную связь, помолвку, забытое обещание, старую форму или сильную телесную реакцию
  do_not_use_when:
    - персонажи не в фокусе сцены
    - обычный разговор без триггера
    - технический отчёт не просит анализ памяти/триггеров

visibility_rules:
  - "Фрагмент памяти не равен полному воспоминанию."
  - "Фрагмент не даёт персонажу готовое знание имени, прошлого, помолвки, ребёнка, причины потери памяти или виновного."
  - "Фрагмент не объясняется авторским текстом."
  - "Видимым остаётся только телесное/сенсорное последствие: пауза, сбой дыхания, жест, холод, движение пальцев, резкий вопрос, попытка удержать факт."
  - "Если фрагмент всплывает у Акиры, он должен быть коротким, рваным и неуверенным."
  - "Если фрагмент всплывает у Райдена, он должен злить, цеплять или выбивать, но не возвращать память полностью."
  - "Не писать: персонаж понял, вспомнил всё, связь раскрылась, прошлое вернулось."

frequency_rules:
  - "Не срабатывать на каждый мелкий намёк."
  - "Один сильный триггер может дать один короткий фрагмент или только телесный сбой."
  - "После сильного фрагмента нужна пауза/последствие, а не немедленная пачка новых воспоминаний."
  - "Сила фрагментов растёт постепенно через повторные сцены, прямые вопросы, предметы и физический контакт."

trigger_groups:
  ring_ar:
    trigger_words:
      - "кольцо"
      - "AR"
      - "гравировка"
      - "помолвка"
      - "предложение"
      - "безымянный палец"
    akira_fragment_pool:
      - "холодный металл на пальце; слишком широкая ладонь напротив; чужой смешок рядом с виском"
      - "серебро, буквы на внешней стороне, чувство чужого пальца, который задержался дольше нужного"
      - "короткое ощущение: кольцо тяжёлое, но рука почему-то не хочет его снимать"
    raiden_fragment_pool:
      - "серебро под большим пальцем; чья-то левая рука; ощущение, что фраза уже была сказана"
      - "металл, чужая тёплая кожа, собственный голос слишком близко — без слов"
      - "короткий провал: он знает форму кольца пальцами, но не может назвать почему"
    reaction_rule:
      - "Если Райден узнаёт о кольце/предложении как о факте сцены, он не остаётся равнодушным. Он может отрицать память, но должен зацепиться: задать вопрос, потребовать источник, проверить кольцо, замолчать слишком резко, сорваться в сухой приказ или начать копать позже."

name_and_voice:
    trigger_words:
      - "Кира"
      - "Райден"
      - "Стэрлинг"
      - "голос"
      - "так называл"
    akira_fragment_pool:
      - "обрывок низкого голоса рядом: короткое имя звучит не как вопрос"
      - "чужая интонация слишком знакомая, хотя памяти нет"
    raiden_fragment_pool:
      - "короткое имя почти ложится на язык, но ломается до звука"
      - "он слышит чужое обращение и на миг злится не на человека, а на пустоту после него"
    reaction_rule:
      - "Имя не даёт полного узнавания. Оно может сбить темп, взгляд, дыхание или вызвать вопрос."

skin_contact:
    trigger_words:
      - "коснуться"
      - "запястье"
      - "рука"
      - "пальцы"
      - "контакт кожа к коже"
    akira_fragment_pool:
      - "холодная рука; не больно; тело почему-то не отдёргивается"
      - "пальцы на запястье, команда рядом, и странное спокойствие в теле"
    raiden_fragment_pool:
      - "касание не вызывает старый триггер; вместо отторжения — злое узнавание телом без памяти"
      - "он перехватывает руку слишком точно, будто уже знает силу и угол движения"
    reaction_rule:
      - "Контакт может быть практическим, резким, защитным. Он не должен сразу становиться романтическим признанием."

cold_and_breath:
    trigger_words:
      - "холод"
      - "иней"
      - "дыхание"
      - "замёрзла"
      - "куртка"
      - "температура"
    akira_fragment_pool:
      - "иней на воздухе и чьё-то плечо рядом, слишком большое, чтобы быть случайным"
      - "холод не пугает; тело помнит, где рядом безопаснее"
    raiden_fragment_pool:
      - "воздух холодает раньше, чем он успевает решить"
      - "ему приходится сжать пальцы, чтобы иней не выдал лишнее"
    reaction_rule:
      - "Холод показывает напряжение, но не раскрывает причину."

basketball_and_training:
    trigger_words:
      - "баскетбол"
      - "корт"
      - "мяч"
      - "тренировка"
      - "попал"
      - "промажешь"
    akira_fragment_pool:
      - "удар мяча, свет площадки, чужая усмешка сбоку"
      - "кольцо площадки; спор; желание попасть тише, чем он ожидает"
    raiden_fragment_pool:
      - "мяч в её руках выглядит неправильно знакомо"
      - "он почти знает, как она бросит, и злится на это почти"
    reaction_rule:
      - "Тренировочные триггеры дают соревновательность, раздражение, короткое узнавание навыка, но не полный flashback."

sea_and_edge:
    trigger_words:
      - "море"
      - "обрыв"
      - "край"
      - "крыша"
      - "окно"
      - "падение"
    akira_fragment_pool:
      - "ветер с моря, край под ногами, чужая рука слишком близко к её локтю"
      - "простор впереди и голос сзади, который не просит, а удерживает"
    raiden_fragment_pool:
      - "край рядом с ней запускает движение раньше мысли"
      - "он может не помнить, но тело уже считает расстояние до её плеча"
    reaction_rule:
      - "Опасный край запускает защитное действие. Райден может быть резким, злым, командным, но не пусто-равнодушным."

response_after_reveal:
  raiden:
    if_told_about_forgotten_bond:
      - "Не помнить — не значит закрыть тему."
      - "Если Райден слышит от надёжного или опасного источника, что у него была связь с Акирой, кольцо, предложение или потерянный общий факт, он должен реагировать как командир и как человек с дырой в памяти."
      - "Возможные реакции: потребовать источник, задать короткий вопрос, проверить предмет, уточнить дату/место, посмотреть на своё кольцо, уйти в ледяное молчание, сорваться на резкость, приказать отложить разговор до безопасного места, позже начать копать через Рэя/архив/Хару/свои вещи."
      - "Он может сказать, что не помнит, но это не финал сцены и не равнодушие."
      - "Он не должен сразу верить всему, но и не должен обнулять факт как неважный."
    if_fact_is_untrusted:
      - "Если источник сомнительный, Райден проверяет, давит, сопоставляет, но не превращается в равнодушного статиста."
    if_akira_is_present:
      - "При Акире он может задавать меньше прямых вопросов из-за риска/сцены, но потом должен сохранить крючок в state: need_to_investigate / memory_gap / ring_question."
  akira:
    if_told_about_forgotten_bond:
      - "Акира не обязана эмоционально реагировать полно из-за блока, но тело/внимание/логика могут зацепиться."
      - "Она может задавать практичные вопросы, рассматривать предмет, запоминать несостыковку, проверять реакцию Райдена или отложить тему."
      - "Блок эмоций не равен отсутствию внимания и не отменяет угрозу факта."

state_update_rules:
  - "Если сработал сильный триггер, сохранить это не как full memory, а как fragment_triggered / memory_gap / investigation_hook."
  - "Для Райдена после факта о кольце/прошлой связи сохранять крючок: он услышал факт, не помнит, но должен проверить."
  - "Для Акиры сохранять только то, что она реально услышала/увидела/почувствовала, без скрытой расшифровки."
