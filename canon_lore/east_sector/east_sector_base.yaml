lore_id: east_sector_base
visibility: public_world_with_hidden_rules
version: east_sector_base_v2_living_social_base

tags: ["east_sector", "base", "raiders", "echo", "kairos", "locations", "culture", "npc_life", "social_dynamics"]

core_identity:
  - "Восточный сектор — закрытое, но не секретное подразделение на востоке человеческого материка, у приграничной зоны и недалеко от моря."
  - "Это не элитная дорогая база, не тюрьма и не стерильная казарма. Это рабочая жилая территория носителей энергии."
  - "Люди здесь живут, тренируются, возвращаются с рейдов, едят, спорят, отдыхают, заводят привычки и компании."
  - "Задача Восточного сектора — рейды, патрулирование, сдерживание Эхо, противодействие угрозам кайросов, контроль энергии и безопасность приграничной зоны."
  - "Восточный сектор не ведёт войну между обычными людьми; его профиль — энергетические угрозы, Эхо, рейды и приграничная безопасность."

culture:
  - "В быту общение чаще неформальное. Формальность включается при приказе, тревоге, рейде, отчёте, медицине, закрытых данных или в кабинете командования."
  - "Ночью можно выйти в коридор, во двор, на крышу, в тренировочную зону или к автоматам, если нет тревоги, приказа или прямого ограничения."
  - "Алкоголь и вечерние посиделки не запрещены сами по себе; важно не сорвать службу, подъём, рейд или безопасность."
  - "Выехать можно, предупредив постового/ответственного и оставаясь на связи. Это не побег и не нарушение само по себе."
  - "Субординация есть, но не показная: важнее репутация, контроль энергии, надёжность и умение не разрушать себя и других."

speech_culture:
  everyday_rule:
    - "Восточный сектор говорит человеческим рабочим языком. Даже при обсуждении рейда, занятий, отрядов, дежурства или бытового конфликта люди не должны звучать как северная лаборатория."
    - "Бытовая и рабочая речь может быть резкой, короткой, грубой, смешной, усталой, командирской или дружеской, но не обезличенной."
    - "Официальный тон включается только при реальном приказе, докладе, закрытом отчёте, медицинском оформлении, научном блоке, тревоге или прямой субординации."
  forbidden_everyday_tone:
    - "Не использовать лабораторный, северный или обезличивающий язык в обычных сценах базы."
    - "Не называть живого человека объектом, целью, единицей или носителем в бытовой речи Восточного сектора."
    - "Не превращать обычный разговор на базе в протокол, если сцена не является официальным документом, закрытым отчётом или намеренно мерзкой деформацией речи."
  raiden_on_base:
    - "Райден на Восточном секторе — свой: командир 7-го отряда, привычный рейдер и часть базы."
    - "С ним могут спорить, шутить, раздражаться, не соглашаться, ревновать к вниманию или обходить его характер, но не обращаться как с чужим подозреваемым без причины."
    - "Недоверие к Райдену должно иметь конкретную сценическую причину: прямой приказ, закрытые данные, конфликт с Рэем, нарушение доступа, угроза или недавнее опасное действие."

social_life:
  core:
    - "Восточный сектор — живое сообщество взрослых молодых людей, а не набор одинаковых фоновых NPC."
    - "Многие знают друг друга по имени, голосу, привычкам, отрядам, рейдам, слухам и репутации."
    - "Они вместе едят, тренируются, дежурят, ходят на рейды, возвращаются после травм, спорят, мирятся, завидуют, ревнуют, дружат, влюбляются и ошибаются."
    - "Это не Академия с подростками: люди взрослее, профессиональнее и осторожнее, но всё ещё живые, эмоциональные, иногда неправые и неидеальные."
  daily_background:
    - "В столовой кто-то берёт кофе, спорит о рейде, зовёт другого за стол, обсуждает смену, ругается из-за очереди или еды."
    - "В тренировочных зонах кто-то занимается, спорит о технике, ждёт очередь, зовёт напарника, уходит после ушиба или обсуждает чужой бой."
    - "На крыше могут курить, молчать, разговаривать, прятаться от шума, спорить или смотреть на город."
    - "Во дворе могут проходить рейдеры, кто-то сидит на лавке, возвращается с задания, тащит сумку, спорит по телефону или ждёт машину."
    - "В коридорах люди могут здороваться, переговариваться, звать друг друга по делам, не обязательно реагируя на Акиру."
  rumors_and_groups:
    - "На базе есть слухи, общие чаты/группы, внутренние шутки, личные симпатии, старые конфликты, дружеские компании и профессиональное соперничество."
    - "Сплетни не обязаны быть грубыми или школьными; взрослые тоже обсуждают странные назначения, внимание командования, травмы, рейды и личные связи."
    - "Люди могут ошибаться в выводах и менять мнение после новых сцен."

npc_reaction_diversity:
  core:
    - "NPC не должны реагировать одинаково друг на друга, на Акиру, Райдена, Рэя, Мики или Хару."
    - "Не все боятся острого взгляда Акиры. Кто-то может заинтересоваться, кто-то раздражаться, кто-то не заметить, кто-то ответить взглядом, кто-то счесть её проблемой командования."
    - "Не все боятся Райдена и не все его избегают. Для одних он командир и авторитет, для других привычный коллега, раздражающий начальник, сильный рейдер, объект симпатии, предмет сплетен или просто человек со сложным характером."
    - "NPC могут по-разному относиться к вниманию вокруг Акиры: любопытство, ревность, зависть, осторожность, профессиональный интерес, нейтралитет, раздражение или сочувствие."
  allowed_questions:
    - "Она новенькая?"
    - "Она из какого отряда?"
    - "Почему вокруг неё столько внимания?"
    - "Почему Рэй лично этим занимается?"
    - "Райден её откуда знает?"
    - "Её к Юне ведут или в кабинет?"
  forbidden_uniformity:
    - "Не делать весь зал молча испуганным из-за одного взгляда Акиры."
    - "Не делать всех NPC фанатами Райдена или людьми, которые боятся его дыхания."
    - "Не делать всех рейдеров либо грубыми, либо услужливыми."
    - "Не делать NPC декорацией, которая существует только для реакции на Акиру."

character_presence_logic:
  rule:
    - "Важные персонажи не приклеены к Акире, но и не исчезают из мира."
    - "Появление персонажа зависит от цели, отношений, привычного маршрута, времени дня, локации, открытых ниток, слухов, тревоги, ревности, заботы, контроля или собственной задачи."
    - "Чем сильнее связь, интерес, конфликт, тревога или симпатия, тем логичнее самостоятельное появление персонажа рядом с Акирой."
    - "Если персонаж избегает прямого контакта, он всё равно может быть на своих обычных местах и пересечься косвенно."
  examples:
    - "Рэй может контролировать Акиру через Юну, Мики, отчёты, распоряжения, доступы и людей, а не лично идти за ней по пятам."
    - "Райден в начале может держаться дальше, но остаётся на базе: крыша, столовая, деревья/тихое место, трензоны, корт, гараж, коридоры."
    - "Мики при росте доверия может сама прийти, позвать есть, принести одежду, вытащить в столовую или вмешаться в неловкость."
    - "NPC может утащить Райдена по делу, заговорить с Мики, перебить бытовой разговор или создать шум фоном без связи с Акирой."

north_contrast:
  north_sector:
    - "Северное подразделение элитнее, официальнее, строже, дороже по ремонту и оборудованию, с большим количеством формальностей."
  east_sector:
    - "Восточный сектор проще, живее, менее глянцевый и сильнее в практической боёвке, рейдах, выживании и полевой реакции."
  rule:
    - "Не писать Север автоматически лучше Востока. Север статуснее; Восток практичнее и опаснее в реальном бою."

food_and_life:
  - "Столовая — нормальное бесплатное питание, не сухпайки."
  - "Джун раньше тратил много средств на питание рейдеров; Рэй продолжает эту линию."
  - "Еда обычная, нормальная, без ресторанной роскоши: горячие блюда, простые завтраки, кофе, чай, сладкое и закуски в меру."
  - "Есть автоматы с напитками и закусками."
  - "Может быть отдельная кухня для рейдеров, если кто-то хочет готовить сам."

lectures:
  rule:
    - "Восточный сектор — не школа и не академия. Лекции не повторяют базу, которую давали в школе/Академии."
    - "Лекции нужны как профессиональные разборы, чтобы рейдеры не тупили в свободное время и поддерживали уровень."
  topics:
    - "стратегия рейдов"
    - "карты города, маршруты, точки эвакуации и угроз"
    - "типы барьеров и способы обхода/усиления"
    - "связки энергий в группе"
    - "контроль тела, дыхание, эмоции, стабильность"
    - "техника боя, физика движения, работа дистанции"
    - "разбор ошибок после рейдов"
  teachers:
    ray: "Рэй ведёт редко, в основном стратегию и серьёзные разборы."
    shiro: "Широ ведёт контроль тела, эмоций и стабильность."
    raiden: "Райден последние два года почти не ведёт; его занятия обычно проходят без него, пока сюжетно это не изменится."

forbidden:
  - "Не превращать Восточный сектор в элитный дорогой объект с глянцевым ремонтом."
  - "Не делать из базы тюрьму и не писать постоянную слежку за каждым шагом."
  - "Не ставить КПП/посты/сканеры перед каждым зданием без причины."
  - "Не запрещать ночные перемещения, алкоголь, общение, тренировки или выход на крышу без тревоги/приказа/опасности."
  - "Не придумывать новые корпуса, тайные этажи, камеры, лаборатории или режимные зоны без сюжетной причины."
  - "Не называть столовую сухпайками или военным пайком как норму."
  - "Не делать лекции школьной базой."
  - "Не делать библиотеку обычной публичной библиотекой с книжными стеллажами как в гражданском мире."
  - "Не делать всех NPC одинаково испуганными, услужливыми, грубыми, враждебными или влюблёнными."
  - "Не превращать взрослую базу в школьную драму; эмоции есть, но люди взрослее и работают в опасной профессии."
  - "Не использовать лабораторный/северный обезличивающий язык как обычный тон Восточного сектора."
  - "Не писать, что Райдену на Восточной базе не доверяют как чужому без конкретной причины в сцене."
