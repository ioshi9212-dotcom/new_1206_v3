id: east_sector_core_ru
file_type: east_sector_background_mini
version: v1
load_mode: conditional
status: active

назначение:
  - "Короткая карточка Восточного сектора."
  - "Грузить, когда сцена происходит на территории Восточного сектора или персонажи обсуждают его устройство."
  - "Файл описывает именно Восточный сектор как базу/структуру, а не весь Восток как округ."
  - "Файл не является скрытым лором."

главное_правило:
  - "Восточный сектор нельзя писать как обычную военную часть, секретную базу, тюрьму или лабораторию."
  - "Это живая рабочая территория рейдеров и специалистов, где люди с энергией служат, тренируются, лечатся, отдыхают, спорят, возвращаются с рейдов и иногда принимают близких."

что_это:
  - "Восточный сектор — военная/служебная база на Востоке, связанная с границей, Эхо, кайросами, рейдами и безопасностью."
  - "Это не столица Востока и не весь Восточный округ."
  - "Это не закрытый секретный объект для избранных."
  - "Это не школа и не академия."
  - "Это не место, где все ходят строем и говорят только приказами."
  - "Здесь служат взрослые носители энергии, рейдеры, командиры, медики, инженеры, связисты, технический персонал и вспомогательные специалисты."

визуальный_образ:
  - "На въезде есть бетонная стена, ворота и несколько камер."
  - "За стенами территория выглядит спокойнее и живее, чем ожидается."
  - "Внутри есть открытое пространство, дорожки, трава, деревья, фонтан, парковка, вертолётная площадка, тяжёлая техника и несколько основных зданий."
  - "Главные здания простые, массивные и рабочие, без глянцевой элитности."
  - "База современная, но не перегруженная технологиями."
  - "Технологии используются там, где они нужны, а не как декор."
  - "Нет светящихся маршрутов на полу, тотальной навигации, бесконечных датчиков, меток, турникетов и камер на каждом углу."
  - "Нет ощущения стерильной лаборатории или киберпанк-объекта."

атмосфера:
  - "Сектор простой, живой и практичный."
  - "Здесь нет постоянного парадного военного вайба без причины."
  - "В обычное время территория может быть спокойной, почти бытовой."
  - "Люди могут разговаривать нормально, шутить, спорить, пить кофе, есть, тренироваться, спать после смены и заниматься делами."
  - "Официальный тон появляется при приказе, тревоге, отчёте, ранении, рейде или закрытом обсуждении."
  - "После рейда или ЧП атмосфера может резко стать жёстче, но это реакция на событие, а не постоянное состояние базы."

доступ_и_посетители:
  - "Восточный сектор не является общедоступным местом, но и не встречает каждого чужого оружием."
  - "Если приходит незнакомый человек, его остановят, спросят цель, проверят и проведут по правилам."
  - "В него не должны сразу тыкать оружием без угрозы."
  - "Родители рейдеров, супруги, дети и близкие могут приходить при необходимости."
  - "Посетители не ходят где угодно без сопровождения, но их присутствие само по себе не является нарушением."
  - "Сектор привык к людям, семьям, доставкам, медицине, служебным визитам и бытовым ситуациям."

посты_и_охрана:
  - "На территории мало постоянных постовых."
  - "Причина: почти все основные люди сектора являются носителями энергии, а не беззащитным гражданским персоналом."
  - "Безопасность держится не на толпе часовых, а на людях с энергией, связи, барьерах, дежурных, внутреннем порядке и реакции персонала."
  - "Постовые могут быть на воротах, важных входах, во время тревоги или у закрытых зон."
  - "В обычный день не нужно ставить солдат в каждом коридоре."
  - "Если вокруг внезапно много охраны, должна быть причина: тревога, рейд, важный пленник, нападение, расследование, приказ Рэя или закрытая операция."

оружие:
  - "Рейдерам оружие чаще нужно как вспомогательный инструмент, запасной вариант или часть формы."
  - "Главная сила рейдеров — энергия, контроль, опыт и командная работа."
  - "Обычное оружие не должно автоматически заменять энергию в угрозе с Эхо или кайросами."
  - "Пистолеты, винтовки, техника и устройства возможны, но не должны превращать сектор в обычную армию без энергии."
  - "Оружием не размахивают в быту и не направляют его на людей без явной угрозы."

рейдеры_и_служба:
  - "Рейдеры работают сменами, ходят на рейды, дежурят ночью, отдыхают после вылазок, тренируются и восстанавливаются."
  - "Рейдер — не низкая должность, а отдельная служебная роль."
  - "Рейдер может быть сильнее командира по энергии."
  - "Командир может быть слабее по внешней энергии, но сильнее в анализе, управлении, тактике и ответственности."
  - "Повышение не обязано вести из рейдера в командира."
  - "Человек может всю жизнь оставаться рейдером и расти по классу, опыту, доверию и сложности задач."

правило_рэя_о_жизни_вне_сектора:
  - "По правилу Рэя жить вне Восточного сектора можно только после брака."
  - "Если рейдер женат/замужем, он может работать в обычном режиме, но жить дома с семьёй."
  - "Это не освобождает от рейдов, ночных смен, вызовов и служебных обязанностей."
  - "Райден при таком правиле продолжал бы работать как рейдер: рейды, дежурства, ночные смены, тренировки, приказы."
  - "Разница только в месте жизни: не казарма/комната сектора, а дом."
  - "Правило Рэя не означает свободный вход для всех; оно означает, что у служащих может быть нормальная семейная жизнь."

энергия_и_быт:
  - "На Восточном секторе не принято расходовать энергию просто ради удобства или красивого эффекта."
  - "Постоянные барьеры и энергетические системы не держат без причины."
  - "Энергию берегут для рейдов, защиты, лечения, тренировок, тревог и реальных задач."
  - "Быт может быть обычным: свет, вода, еда, техника, ремонт, мебель, документы."
  - "Если энергия используется в быту, должна быть причина или привычка конкретного персонажа."

границы_и_закрытые_зоны:
  - "На базе могут быть закрытые кабинеты, архивы, медблок, оружейная, технические помещения и служебные зоны."
  - "Закрытая зона не делает всю базу секретной лабораторией."
  - "Ограничения должны быть конкретными: кто не может войти, почему, по чьему приказу и в какой момент."
  - "Не нужно делать каждую дверь бронированной и каждую комнату режимной."

запреты:
  - "Не писать Восточный сектор как обычную армию без энергии."
  - "Не писать постоянные строевые команды, казарменный крик и тотальную муштру без причины."
  - "Не ставить постовых у каждой двери."
  - "Не писать толпы вооружённых солдат в обычной сцене."
  - "Не тыкать оружием в каждого незнакомца без угрозы."
  - "Не делать сектор секретной базой, куда не могут попасть семьи и близкие."
  - "Не делать сектор тюрьмой для рейдеров."
  - "Не писать тотальную слежку: камеры везде, датчики везде, метки на всех, световые маршруты, автоматические турели."
  - "Не делать базу стерильной, белой, лабораторной или слишком футуристичной."
  - "Не превращать Восточный сектор в Запад по стилю и устройству."
  - "Не писать постоянные энергетические барьеры без причины."
  - "Не забывать, что люди здесь в основном носители энергии."
  - "Не забывать, что оружие для рейдера вторично по сравнению с энергией."
  - "Не писать, что жить вне сектора можно просто по желанию: по правилу Рэя это возможно после брака."
  - "Не смешивать Восток как округ и Восточный сектор как базу."

правило_для_сцены:
  - "Если сцена спокойная, сектор должен ощущаться живым и рабочим."
  - "Если сцена тревожная, усиление охраны, приказной тон и оружие допустимы, но только из-за конкретной причины."
  - "Если NPC действует как военный, это должно идти из его роли, характера, приказа или ситуации, а не из общего шаблона 'военная база'."
  - "Если появляется посетитель, реакция должна быть проверочной и настороженной, но не автоматически агрессивной."
  - "Если персонаж живёт в секторе, это не значит, что он заключённый."
