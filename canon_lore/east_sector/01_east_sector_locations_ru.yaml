id: east_sector_locations_ru
file_type: east_sector_location_registry
version: v1_clean_ru
load_mode: conditional
status: active

назначение:
  - "Короткий реестр основных локаций Восточного сектора."
  - "Использовать, когда сцена происходит на территории базы Восточного сектора."
  - "Не заменяет персонажей, расписание, сцену или текущее состояние."
  - "Новые крупные локации не придумывать без явной сюжетной причины."

главное_правило_тона:
  - "Восточный сектор — рабочая жилая база носителей энергии, а не обычная военная часть."
  - "База закрытая, но не секретная: сюда могут приходить родители, жёны, дети и близкие, если есть причина и доступ."
  - "Внутри нет толпы постовых, постоянных досмотров, военных криков и оружия в лицо без угрозы."
  - "Рейдеры полагаются прежде всего на энергию, контроль и опыт; оружие — запасной инструмент, а не главный образ базы."
  - "База простая, живая и рабочая: без футуристической навигации, стерильных коридоров, датчиков на каждом шагу и камер везде."

общие_запреты:
  - "Не делать базу тюрьмой, секретной лабораторией, режимным бункером или глянцевой военной крепостью."
  - "Не добавлять КПП после каждых дверей, сканеры, световые маршруты на полу, турникеты, метки, камеры и постовых без причины."
  - "Не ставить вооружённую охрану у обычных дверей, коридоров, столовой, крыши, жилого блока или тренировочного зала без тревоги."
  - "Не писать, что чужого человека сразу берут на прицел, если он не ведёт себя как угроза."
  - "Не делать обычные бытовые зоны режимными."
  - "Не делать все помещения одинаково бетонными, холодными и военными."
  - "Не превращать локации в длинную экскурсию. В сцене показывать только то, что нужно кадру."

правила_доступа:
  - "Главные ворота контролируют вход и выезд, но это не цепочка КПП по всей базе."
  - "Знакомые, семьи и гости могут попасть на территорию по причине, приглашению, сопровождению или согласованию."
  - "Незнакомца остановят, спросят цель и проверят, но не будут автоматически тыкать оружием."
  - "Внутри базы люди свободно ходят по обычным зонам, если нет тревоги, приказа, лечения, рейда или личного ограничения."
  - "Опасные места требуют допуска не из-за секретности, а из-за риска: оружие, перегруз, энергия, травмы, техника."

локации:
  главные_ворота:
    тип: "вход_и_выезд"
    описание:
      - "Высокая бетонная стена, тяжёлые ворота, несколько камер у входа."
      - "Ворота выглядят серьёзно, но не превращают всю базу в тотальную режимку."
      - "Здесь проверяют въезд, выезд, гостей и транспорт."
    правила:
      - "Не добавлять несколько дополнительных КПП за воротами без причины."
      - "Камеры есть у ворот и важных точек, но не на каждом углу."
      - "Если человек свой или с сопровождающим, сцена не должна превращаться в допрос."

  парковка:
    тип: "служебная_и_бытовая_зона"
    описание:
      - "Парковка сразу после въезда: мотоциклы, машины, служебный транспорт."
      - "Здесь могут встречать, отдавать транспорт, спорить, ждать, возвращаться с рейда."
    правила:
      - "Не делать парковку военным плацем."
      - "Здесь может быть мало людей ранним утром или ночью."

  центральный_двор:
    тип: "открытая_живая_зона"
    описание:
      - "Открытая зелёная часть базы: дорожки, деревья, трава, лавки, простой классический фонтан."
      - "Двор спокойный и почти странно мирный для места, где работают рейдеры."
      - "Отсюда видны основные здания, техника и открытые проходы."
    правила:
      - "Не делать двор плацем для построений по умолчанию."
      - "Не делать фонтан роскошным или декоративно-элитным. Он простой, обычный, живой."
      - "Двор может быть местом ожидания, коротких разговоров, тишины и случайных встреч."

  вертолетная_площадка:
    тип: "служебная_инфраструктура"
    описание:
      - "Обычная вертолётная площадка на территории."
      - "Нужна для выездов, эвакуации, доставки и служебных задач."
    правила:
      - "Не делать её центром повседневной жизни."
      - "Не использовать без причины как постоянный шумовой фон."

  зона_техники:
    тип: "служебная_инфраструктура"
    описание:
      - "Тяжёлая спецтехника и служебные машины по краям территории."
      - "Техника выглядит рабочей, не парадной."
    правила:
      - "Не превращать зону в огромный военный парк с бесконечной бронетехникой."
      - "Техника есть, но база всё равно держится на рейдерах и энергии."

  административное_здание:
    тип: "работа_и_командование"
    описание:
      - "Большое, простое, массивное здание."
      - "Здесь находятся рабочие помещения, кабинет Рэя, комнаты совещаний, разборы, отчёты, часть учебных/профессиональных кабинетов."
      - "Тон здесь собраннее, чем в быту, но это не стерильный штаб с солдатами у каждой двери."
    правила:
      - "Формальность включается по делу: приказ, отчёт, тревога, закрытая информация, разговор с командованием."
      - "Не ставить вооружённых постовых в каждом коридоре."
      - "Не делать все двери закрытыми режимными шлюзами."

  кабинет_рэя:
    тип: "командная_локация"
    описание:
      - "Просторный кабинет с большими окнами, рабочим столом, шкафами с документами, диваном и небольшим столиком у стены."
      - "Здесь тише, строже и тяжелее по атмосфере, чем в обычных зонах."
      - "В кабинет не заходят просто так, но это не тронный зал и не комната допросов."
    правила:
      - "Рэй может работать с бумагами, экраном, картами, отчётами и вызовами."
      - "Не делать кабинет местом постоянного крика и угроз."
      - "Не превращать каждый разговор у Рэя в официальный протокол."

  комнаты_совещаний:
    тип: "рабочая_зона"
    описание:
      - "Небольшие практичные комнаты для отчётов, разборов рейдов, карт и планов."
      - "Мебель простая: стол, стулья, экран/доска, карты, документы."
    правила:
      - "Не делать их школьными классами или элитными залами совета."
      - "Использовать только когда действительно нужен разбор, план или разговор группы."

  профессиональные_кабинеты:
    тип: "обучение_взрослых_рейдеров"
    описание:
      - "Кабинеты для профессиональных занятий, лекций и разборов."
      - "Здесь не учат школьной базе, а разбирают рейды, тактику, карты, связки энергий, ошибки и контроль."
    правила:
      - "Не делать из Восточного сектора школу или Академию."
      - "Занятия короткие, прикладные и взрослые."

  архив_и_карты:
    тип: "рабочий_архив"
    описание:
      - "Место для отчётов, карт, дел, маршрутов, энергетических следов и служебных данных."
      - "Это не гражданская библиотека с художественными книгами."
    правила:
      - "Доступ зависит от роли, задачи или разрешения."
      - "Не делать архив тайной комнатой с мистическим лором без причины."

  жилое_здание:
    тип: "жилая_и_бытовая_зона"
    описание:
      - "Более аккуратное и спокойное здание для жизни, еды, отдыха и бытовых сцен."
      - "Внутри обычные коридоры, комнаты, общие зоны, столовая/кухня или проходы к ним."
      - "Люди здесь живут, а не просто ночуют между приказами."
      - "Рейдеры могут ходить в пижаме, в тапочках, кто то полуголоый, это не приветсвуется, но некоторые после ночных рейдов тупят с утра"
      - "Кто то может идти с полотенцем или с кружкой кофе"
      - "Спокойно могут ходить в комнаты друг друга"
      - "Тут не запрещено дружить, заводить отношения, спорить, ругатся, все в пределах нормы"
      - "Не запрещено выходить ночью"
    правила:
      - "Не делать жилой блок казармой с одинаковыми койками и строевой дисциплиной."
      - "Не ставить охрану у комнат без причины."
      - "В коридорах могут здороваться, спорить, нести еду, звать друг друга, возвращаться после смены."

  комната_акиры:
    тип: "личная_жилая_локация"
    описание:
      - "Комната больше обычной, поэтому в ней могут собраться несколько человек."
      - "Есть кровать, стол, стулья, шкаф/место для вещей, тумба, зеркало, окно."
      - "Есть маленькая кухонная зона и отдельная ванная/душевая."
      - "Комната спокойная, чистая, немного слишком тихая."
      - "Комната находится на втором этаже, в котором живут 6 командиров и сам Рэй, это комната Райдена. Она пустая, потому что чуть больше двух лет назад он захотел жить с Хару на третьем этаже. Причины личные, не хотел оставатся один, и не понимает почему"
    правила:
      - "Не придумывать содержимое шкафов, ящиков и документов, пока это не задано сценой/state."
      - "Не делать комнату роскошной квартирой. Это большая комната на базе, не полноценный дом."
      - "После заселения Акиры комната может постепенно оживать вещами, едой, стульями, кружками, одеждой, чужими визитами."

  обычные_жилые_комнаты:
    тип: "личные_комнаты_рейдеров"
    описание:
      - "Комнаты рейдеров проще и меньше комнаты Акиры."
      - "Могут быть одноместные, двухместные или смешанные по старому распределению."
      - "Комната отражает человека: порядок, бардак, одежда, чашки, зарядки, книги, мелочи, следы смен."
    правила:
      - "Не делать все комнаты одинаковыми казарменными ячейками."
      - "Не описывать чужую комнату детально без входа в неё."

  общая_зона_отдыха:
    тип: "бытовая_зона"
    описание:
      - "Небольшое место посидеть: диван или старые кресла, стол, чайник/кофе, иногда чужие кружки и разговоры."
      - "Здесь можно случайно встретиться, переждать шум, поговорить неофициально."
    правила:
      - "Не делать зону отдыха элитным лаунжем."
      - "Она простая, немного обжитая и рабочая."

  столовая:
    тип: "еда_и_социальный_центр"
    описание:
      - "Общая столовая с нормальной горячей едой, кофе, чаем, простыми сладостями и закусками."
      - "Это один из самых живых центров базы: люди едят, спорят, обсуждают смены, рейды, слухи и бытовые мелочи."
      - "Еда обычная, не ресторанная и не сухпайки."
      - "Столовая не по расписанию, а по свободному времени и желанию, даже ночью, если хочется кофе"
    правила:
      - "Не делать столовую военной раздаткой с пайками как нормой."
      - "Не заставлять всех молчать при входе важного персонажа. Реакции разные и зависят от сцены."
      - "Кофе, чай и сладкое допустимы как обычная часть быта."

  маленькая_кухня:
    тип: "дополнительная_бытовая_зона"
    описание:
      - "Небольшая кухня для тех, кто хочет приготовить что-то сам или собрать закуски."
      - "Простые шкафы, раковина, столешница, базовая техника."
    правила:
      - "Не делать полноценный ресторанный блок."
      - "Использовать для бытовых сцен, еды, чаепития, посиделок и подготовки к вечеру."

  медпункт:
    тип: "медицина_и_восстановление"
    описание:
      - "Небольшой рабочий медпункт для осмотра, обработки ран, стабилизации, контроля перегруза и последствий рейдов."
      - "Медики лечат и проверяют состояние, а не карают."
    правила:
      - "Не делать медпункт роскошной клиникой или лабораторией Самуэля."
      - "После серьёзной травмы, перегруза, потери сознания или странного состояния персонажа могут оставить под наблюдением."
      - "Не использовать медпункт как место принудительных опытов без отдельной сюжетной причины."

  тренировочный_зал:
    тип: "энергия_бой_подготовка"
    описание:
      - "Главный зал для спаррингов, энергии и боевых тренировок."
      - "Шумный, тёплый, живой: удары, металл, маты, стойки, мишени, следы использования, люди вокруг."
      - "Может быть галерея/верхний уровень, откуда наблюдают."
    правила:
      - "Это не школьный спортзал и не стерильный полигон."
      - "Команда остановки важна, потому что энергия опасна."
      - "После потери контроля или травмы тренировка прекращается."
      - "Не забывать, что почти все здесь носители энергии: тренировки учитывают способности, тело и контроль."

  обычный_спортзал:
    тип: "физическая_подготовка"
    описание:
      - "Отдельная зона для обычной физической формы: силовые, растяжка, выносливость, восстановление."
      - "Нужна, потому что энергия не заменяет тело."
    правила:
      - "Не путать с главным боевым тренировочным залом."

  бассейн:
    тип: "восстановление_и_контроль_тела"
    описание:
      - "Простой бассейн для восстановления, дыхания, контроля тела и отдельных тренировок."
      - "Может использоваться после травм, перегруза или для подготовки."
    правила:
      - "Не делать его курортной зоной."
      - "Вода требует осторожности: ошибка в состоянии срыва или слабости быстро становится опасной."

  стрельбище:
    тип: "оружие_и_подготовка"
    описание:
      - "Закрытая зона для тренировки с оружием."
      - "Оружие есть, но оно не главный символ рейдера."
    правила:
      - "Доступ по задаче, тренировке, сопровождению или разрешению."
      - "Не водить туда человека в явном срыве без контроля."
      - "Не делать оружие главным способом решения угроз Эхо и кайросов."

  гараж:
    тип: "транспорт_и_ремонт"
    описание:
      - "Место для машин, мотоциклов, инструментов, ремонта и подготовки транспорта."
      - "Может быть шумным, пахнуть металлом, бензином, резиной, пылью после рейда."
    правила:
      - "Не делать гараж тайной оружейной без причины."
      - "Это рабочее место, а не декорация."

  крыша:
    тип: "тихая_пограничная_зона"
    описание:
      - "Крыша не запретная по умолчанию."
      - "Там могут курить, молчать, смотреть на город, прятаться от шума, разговаривать честнее, чем внизу."
      - "Ветер, ночной воздух, свет города или базы — нормальный фон."
    правила:
      - "Не добавлять охрану на крыше без тревоги."
      - "Не превращать крышу в романтическую сцену автоматически: она может быть местом тишины, злости, усталости, разговора или одиночества."

  баскетбольный_корт:
    тип: "спорт_и_разрядка"
    описание:
      - "Обычный рабочий корт на территории: покрытие, кольца, ограждение, лавки или стена рядом."
      - "Здесь можно играть, спорить, мириться, сбрасывать злость и проверять реакцию мягче, чем в спарринге."
    правила:
      - "Не делать корт глянцевым спорткомплексом."
      - "Акиру может тянуть к корту телом/привычкой, но не объяснять это скрытым лором без раскрытия."

  дорожки_коридоры_лестницы:
    тип: "переходы"
    описание:
      - "Обычные переходы между локациями: дорожки, лестницы, коридоры, входы, площадки."
      - "Там может быть живой фон: шаги, разговоры, кофе в руках, мокрые волосы после душа, сумки, усталость после рейда."
    правила:
      - "Не превращать каждый переход в проверку документов."
      - "Не ставить камеру/пост/датчик в каждом переходе."
      - "Переходы нужны для движения сцены, не для лишней режимности."

мини_ориентир_для_первого_въезда:
  - "Снаружи: бетонная стена, ворота, пара камер у входа."
  - "После въезда: парковка, зелёная открытая территория, фонтан, дорожки, трава, деревья."
  - "Дальше: вертолётная площадка, техника по краям, два основных здания."
  - "Общее впечатление: спокойно, просто, живо, рабоче; не секретная крепость и не военная стерильность."

правило_для_новых_сцен:
  - "Если сцена бытовая, выбирать простую живую локацию: столовая, двор, коридор, крыша, комната, корт, зона отдыха."
  - "Если сцена служебная, выбирать рабочую локацию: кабинет Рэя, совещание, архив, трензал, медпункт, гараж."
  - "Если нужна угроза, сначала проверить current_frame/state: без тревоги не добавлять внезапную охрану, протоколы и оружие."
