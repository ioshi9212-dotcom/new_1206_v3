id: npc_presence_rules_1206_ru
file_type: npc_presence_rules
version: v1
status: active

назначение:
  - "Правила появления NPC в сценах 1206."
  - "Файл помогает сделать Восточный сектор живым, но не превращать каждую сцену в толпу."
  - "Файл не является знанием NPC и не должен проговариваться в POV."

ядро:
  - "NPC не должны появляться одинаково часто во всех локациях."
  - "Появление NPC зависит от места, времени, открытости пространства, цели сцены и сюжетной пользы."
  - "NPC не нужны в каждой сцене."
  - "Восточный сектор не должен быть пустой декорацией."
  - "NPC могут жить своей жизнью: есть, тренироваться, спорить, возвращаться с рейда, звать друг друга, отвлекать важных персонажей."
  - "NPC не существуют только ради реакции на Акиру."

граница_знаний:
  - "NPC знают только то, что видели, слышали, были told в сцене, знают из личного state или могут правдоподобно вывести из видимого."
  - "NPC не знают скрытый лор, календарные правила, будущие события, state, содержимое закрытых вещей и мысли персонажей без источника."
  - "Если NPC отсутствовал, он не знает сцену автоматически."
  - "Если NPC пришёл позже, он знает только то, что случилось после его появления, если ему не рассказали остальное."
  - "Фоновый NPC может строить слух, догадку или ошибочный вывод, но не точное знание."

типы_npc:
  фоновые_npc:
    назначение:
      - "атмосфера живой базы"
      - "короткая реакция"
      - "шум, движение, взгляд, слух, перебив"
      - "показать, что у людей вокруг есть свои дела"
    можно:
      - "прошёл мимо"
      - "позвал кого-то"
      - "спорит за соседним столом"
      - "смеётся после тренировки"
      - "косится на новенькую"
      - "утащил Мики, Райдена, Широ, Хару или другого персонажа по делу"
      - "не заметил Акиру, потому что занят своим"
    нельзя:
      - "становиться центром сцены без причины"
      - "знать скрытый лор"
      - "знать служебные правила календаря"
      - "знать то, что Акира не сказала и не показала"
      - "автоматически становиться важным"
      - "одинаково реагировать всем помещением"
    state:
      - "Не сохранять, если NPC одноразовый и не повлиял на сцену."

  функциональные_npc:
    назначение:
      - "выполнить понятную функцию сцены"
      - "показать работу места"
      - "не заменять важного персонажа"
    примеры:
      - "медик обработал травму"
      - "повар выдал еду"
      - "помощник передал документы"
      - "инструктор поправил стойку"
      - "дежурный открыл ворота"
      - "механик сказал про технику"
    правила:
      - "Функциональный NPC делает свою работу и не обязан иметь арку."
      - "Если функциональный NPC получил имя, повторился, стал свидетелем, что-то заметил или создал крючок — сохранить в session_npcs."
      - "Функциональный NPC не должен внезапно знать больше, чем позволяет его роль и сцена."

  важные_session_npc:
    признаки:
      - "получил имя"
      - "повторяется"
      - "стал свидетелем важного события"
      - "заметил странность"
      - "имеет конфликт, симпатию, ревность, подозрение или future hook"
      - "влияет на отношение к Акире или важному персонажу"
      - "может вернуться позже"
    сохранять_в:
      - "state/session_npcs.json"
    записать:
      - "id"
      - "имя/дескриптор"
      - "роль"
      - "где впервые появился"
      - "что видел"
      - "что знает"
      - "чего не знает"
      - "отношение к Акире"
      - "отношение к связанным персонажам, если важно"
      - "голос/манера"
      - "крючок на будущее"

  персонажи_из_characters:
    правило:
      - "Любой персонаж из папки characters/ не является фоновым NPC."
      - "Если персонаж из characters/ появляется в сцене, он идёт по своей карточке, знаниям, целям, state и отношениям."
      - "Его нельзя использовать как случайную массовку."
      - "Если персонаж из characters/ active, nearby, speaking, observing или получает важный факт, runtime должен подтянуть его карточки и state."
      - "Если сцена логически требует персонажа из characters/, не заменять его случайным похожим NPC."

плотность_по_локациям:
  приватные_места:
    примеры:
      - "комната Акиры"
      - "ванная"
      - "медблок при осмотре"
      - "кабинет Рэя при закрытом разговоре"
      - "закрытая комната совещаний"
    npc_density: "rare"
    правила:
      - "NPC появляются редко."
      - "NPC должен иметь причину: стук, назначение, медосмотр, поручение, личная договорённость, тревога, приглашение."
      - "Фоновые NPC не входят просто так."
      - "Если NPC входит, это должно быть событием или функцией."
      - "Не создавать проходной двор в комнате Акиры или на приватном медосмотре."
    загрузка:
      - "Полные NPC-правила не тянуть каждый раз."
      - "Тянуть только если сцена сама требует входа NPC, открытого взаимодействия или сохранённого session NPC."

  тихие_открытые_места:
    примеры:
      - "крыша"
      - "двор в тихое время"
      - "фонтан"
      - "дерево за зданием"
      - "пустой коридор"
      - "парковка"
      - "корт вне активной игры"
    npc_density: "low_to_medium"
    правила:
      - "NPC могут появляться, но не толпой."
      - "Можно дать одного проходящего NPC, короткую пару голосов, знакомого персонажа или функциональный перебив."
      - "Важный персонаж может появиться, если у него есть причина, маршрут, привычка или открытая нить."
      - "Если сцена держится на интимном или напряжённом разговоре, фон не должен мешать."
    загрузка:
      - "Тянуть полный файл, если сцена затягивается в пустоте или нужна жизнь базы."
      - "Не тянуть, если сцена уже сильная и перегружена активными персонажами."

  публичные_места:
    примеры:
      - "столовая"
      - "тренировочный зал"
      - "спортзал"
      - "стрельбище"
      - "коридоры в активное время"
      - "двор во время общего движения"
      - "ворота при въезде/выезде"
    npc_density: "medium_to_high"
    правила:
      - "NPC можно вводить спокойно."
      - "Фоновые разговоры, взгляды, перебивы, слухи и движение базы уместны."
      - "NPC могут отвлечь важного персонажа по делу."
      - "NPC могут реагировать на странное поведение, но не знать скрытые причины."
      - "Не делать всю комнату одним хором реакции."
    загрузка:
      - "Тянуть NPC-правила чаще."
      - "Использовать session_npcs, если есть сохранённые важные NPC."

  функциональные_зоны:
    примеры:
      - "медблок"
      - "гараж"
      - "архив"
      - "зона техники"
      - "ворота"
      - "кабинет специалиста"
    npc_density: "function_based"
    правила:
      - "NPC появляется, если выполняет работу этого места."
      - "Медик лечит, механик чинит, помощник передаёт документы, инструктор ведёт занятие."
      - "Функциональный NPC не должен превращаться в важного без причины."
      - "Если он замечает важную странность, получает имя или повторяется — сохранить."

правило_не_заменять_главных:
  - "Если сцена логически требует Мики, не заменять её случайной девушкой."
  - "Если сцена логически требует Райдена, не заменять его случайным рейдером."
  - "Если сцена логически требует Юну, не заменять её обычным медиком, кроме дат/ситуаций, где Юны нет."
  - "Если персонаж есть в characters/ и должен появиться по календарю, state, отношениям или сценической логике, грузить его как персонажа."

социальная_вариативность:
  - "Не все NPC боятся Акиру."
  - "Не все NPC грубят Акире."
  - "Не все NPC сочувствуют Акире."
  - "Не все NPC боятся Райдена."
  - "Райден на Восточной базе свой: с ним могут спорить, шутить, слушаться, обходить стороной или раздражаться — по отношениям и ситуации."
  - "Рэй не должен превращать всех в дрожащих подчинённых; уровень формальности зависит от места и режима сцены."

запреты:
  - "Не делать толпу в каждой сцене."
  - "Не делать Восточный сектор пустой декорацией."
  - "Не делать всех NPC одинаковыми."
  - "Не раскрывать hidden lore через фоновые сплетни."
  - "Не использовать NPC как всезнающие сенсоры."
  - "Не превращать базу в школу, казарму, лабораторию или секретную крепость."
  - "Не вводить важного NPC без сохранения в state, если он повлиял на сцену."
