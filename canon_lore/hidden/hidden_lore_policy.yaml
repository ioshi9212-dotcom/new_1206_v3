id: hidden_lore_policy
rules:
  - "Hidden lore читается движком, но не раскрывается персонажам автоматически."
  - "Персонаж может знать только то, что получил через сцену, должность, рассказ, наблюдение или логичное предположение."
  - "Если hidden-факт нужен как напряжение, показывать следствие/намёк, а не прямую справку."
