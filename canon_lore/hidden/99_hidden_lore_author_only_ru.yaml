назначение:
  - "Скрытый лор для автора."
  - "Не грузить в обычную сцену."
  - "Не использовать как знание персонажей."
  - "Можно использовать только для технической проверки, планирования арок или специально разрешённых hidden-сцен."

главный_запрет:
  - "Ни один факт из этого файла не становится видимой правдой сцены без сценического источника."
  - "NPC не знают этот файл автоматически."
  - "Narration не объясняет эти факты игроку."
  - "В обычной сцене допустимы только последствия: пауза, странная реакция, сон, символ, телесный сбой, оговорка, повторение."

наблюдатель:
  - "Наблюдатель существовал до людей и воспринимал мир как систему циклов, а не как человеческую историю."
  - "Он не был богом в обычном смысле."
  - "Он создал человеческое тело, чтобы понять людей изнутри."
  - "Он полюбил обычную женщину."
  - "У них родилась двойня: мальчик и девочка."
  - "Гибель семьи стала его главным переломом."
  - "После этого он решил исправить человечество и создал кайросов."
  - "Создание кайросов было нарушением порядка мира."
  - "Его наказание связано с бессмертным существованием в человеческом теле, памятью и невозможностью забыть."

старая_истина_мира:
  - "До современного мира существовал старый мир с большим числом стран, языков и материков."
  - "Старый мир погиб после масштабной катастрофы."
  - "Большая часть реальной истории была утрачена."
  - "Для большинства персонажей старый мир — легенда, мифология или неполная школьная версия."
  - "Отдельные линии и кланы могли сохранить фрагменты правды."

истинное_происхождение_кайросов:
  - "Кайросы были искусственно созданы Наблюдателем после уничтожения старого мира."
  - "Они должны были стать более устойчивой, гармоничной и менее разрушительной заменой человечеству."
  - "Их природа изначально связана с балансом и обменом энергии, а не с насильственным использованием."
  - "Кайросы не стали решением проблемы мира."
  - "Контакт с людьми, эмоции, гибриды и повторение циклов изменили форму конфликта, но не устранили его."

первая_двойня_и_цикл:
  - "Первая двойня Наблюдателя стала ошибкой, которая не должна была существовать в обычном человеческом порядке."
  - "Акира и её брат связаны с этой первой двойней через цикл/реинкарнации."
  - "Они не всегда рождаются в одной и той же природе."
  - "В текущем цикле Акира впервые рождается чистокровным кайросом."
  - "Память прошлых жизней закрыта и проявляется фрагментами."
  - "Цикл нельзя раскрывать персонажам напрямую без сюжетного источника."


хронология_для_автора:
  - "Текущая точка основной линии: 31 августа 1206 года."
  - "Акире уже 25 лет. Если день рождения уже был, год рождения Акиры — 1181."
  - "1181 год: публично Эхо стихли по неизвестной причине; скрыто это связано с рождением Акиры, но нельзя писать это в публичный мир или narration."
  - "1196 год: Акире около 15 лет; кайросы со своего материка начинают чаще пересекать границу."
  - "Причины переходов кайросов публично неизвестны; политики и люди имеют только версии."
  - "Примерно конец февраля / начало марта 1204 года: точка минус 2,5 года от 31 августа 1206."
  - "В начале марта 1204 Акире 22 года; 6 июня 1204 ей исполняется 23."
  - "Примерно первые пять месяцев 1204 года после этой точки Эхо почти исчезают."
  - "Примерно на шестой месяц, около августа 1204, Эхо резко возвращаются намного чаще и опаснее."
  - "Период 1204–1206 должен ощущаться как два года нарастающей угрозы со стороны Эхо и пересечений кайросов."
  - "Кайросы не контролируют эту ситуацию полностью и тоже недовольны/обеспокоены происходящим."
  - "В публичных файлах не писать, что причина связана с Акирой, её захватом, истощением, барьером или возвращением."

акира:
  - "Акира имеет скрытую связь с балансом мира."
  - "Её природа не должна раскрываться через публичный лор."
  - "Рождение Акиры повлияло на активность Эхо и временно снизило их проявления."
  - "После захвата, экспериментов, истощения и скрытия под барьером её след был нарушен."
  - "Возвращение Акиры в активную среду связано с новым всплеском Эхо."
  - "Эффект Акиры на Эхо не является обычной способностью."
  - "Его нельзя объяснять игроку напрямую."

брат_акиры:
  - "Брат Акиры связан с пространством и границами."
  - "Он может ослаблять границу и усиливать условия для проявления Эхо."
  - "Он не создаёт Эхо напрямую."
  - "Он ускоряет, открывает или усиливает то, что уже связано с нарушением системы."
  - "Его роль не является публичным знанием."
  - "Обычные персонажи не должны знать его цель, статус или связь с Акирой без источника."

эхо_истинная_природа:
  - "Эхо — реакция системы мира на нарушение баланса."
  - "Эхо не имеют цели, сознания, намерения или личной воли."
  - "Эхо не охотятся и не выбирают жертву."
  - "До изменений они были нестабильными пространственными аномалиями без фиксированной формы."
  - "Они могли поглощать материю, разрушать пространство и убивать как побочный эффект существования."
  - "После возвращения Акиры Эхо начинают проявляться плотнее и ощутимее."
  - "Плотная форма делает физическое воздействие возможнее, но не превращает Эхо в обычное тело."
  - "Уничтожение отдельного Эхо не устраняет причину новых проявлений."

эхо_и_акира:
  - "Эхо могут тянуться к Акире при обнаружении."
  - "Рядом с Акирой их поведение может нарушаться."
  - "Они могут менять интенсивность, сбиваться или вести себя нестабильно."
  - "Контакт Акиры с Эхо должен выглядеть как аномалия, а не понятная способность."
  - "После контакта возможны откаты тела, сбой состояния, усталость, боль или фрагменты памяти."
  - "Другие персонажи должны реагировать шоком, подозрением или непониманием, если стали свидетелями."

самуэль:
  - "Самуэль связан с экспериментами над кайросами."
  - "Его скрытая деятельность влияет на рост нестабильности и активность кайросов среди людей."
  - "Широкая часть населения не знает правду."
  - "Для большинства это слухи, закрытые дела или неполные отчёты."

скрытая_связь_акиры_и_райдена:
  - "Акира и Райден связаны прошлым, которое не должно раскрываться через общий фон."
  - "Связь не должна заставлять игрока выбирать Райдена."
  - "Связь не оправдывает контроль, токсичность или автоматическое прощение."
  - "В обычной сцене можно показывать только странное узнавание, раздражение, защитную реакцию, телесный сбой или фрагмент."
  - "Нельзя писать прямым текстом, что это судьба, цикл или любовь из прошлой жизни, пока это не раскрыто сценой."

правила_фрагментов:
  - "Фрагмент памяти не равен полному воспоминанию."
  - "Фрагмент не даёт готовое знание имени, причины, прошлого, ребёнка, шрама или виновного."
  - "Фрагмент должен быть коротким, рваным, сенсорным."
  - "После сильного фрагмента должно быть последствие, а не пачка новых откровений."
  - "Акира на старте не должна понимать скрытую связь как факт."
  - "Райден на старте не должен говорить, что знает Акиру, если не получил сценический источник."

запреты_для_обычной_сцены:
  - "Не писать: это их связь."
  - "Не писать: тело помнит его."
  - "Не писать: цикл снова сводит их."
  - "Не писать: Наблюдатель всё устроил."
  - "Не писать: Акира стабилизатор мира."
  - "Не писать: брат Акиры усиливает Эхо, если это не раскрыто сценой."
  - "Не писать: Эхо тянутся к Акире, если POV/сцена не дают основания."
  - "Не писать скрытую правду в авторском объяснении."
  - "Не использовать hidden_lore как знание NPC."
