id: "energy_public_rules_ru"
file_type: "energy_background_rules"
version: "v1_clean_ru"
load_mode: "always"
status: "active"

назначение:
  - "Короткая фоновая карточка о правилах энергии."
  - "Файл задаёт механику, ограничения и запреты, чтобы энергия не превращалась в декоративную магию."

главное_правило:
  - "Энергия — не ресурс, не заряд и не предмет."
  - "Энергия — поток системы мира, связанный с пространством, природой, живыми существами и балансом."
  - "Её нельзя просто взять, накопить и тратить без последствий."

кто_может_использовать:
  - "Энергию способны использовать кайросы, гибриды и носители."
  - "Обычные люди без связи с гибридной или носительской линией доступа к энергии не имеют."
  - "Даже очень дальняя связь с гибридом или носителем может сделать человека носителем."
  - "Носитель может иметь почти нулевой отклик, но формально всё равно относиться к системе носителей."

категории:
  человек:
    - "Нет доступа к энергии."
    - "Может использовать технику, оружие, знания и обычные навыки."
  носитель:
    - "Есть наследственная связь с энергией."
    - "Отклик может быть слабым, средним или сильным."
    - "Человек остаётся человеком, но обязан жить с учётом энергетической системы."
  гибрид:
    - "Рождён от кайроса и человека."
    - "Сочетает человеческую эмоциональность и кайросскую энергетическую природу."
    - "Считается нестабильной и политически опасной категорией."
  кайрос:
    - "Отдельный вид с естественной связью с энергией."
    - "Использует энергию через баланс и встроенность в поток."

два_способа_взаимодействия:
  через_поток:
    - "Пользователь действует в рамках системы и направляет энергию, не вырывая её грубо."
    - "Требуются контроль, стабильность, тренировка и понимание границ."
    - "Такой способ ближе кайросам и хорошо обученным носителям."
  насильственное_использование:
    - "Пользователь вытягивает энергию, давит на поток и берёт больше, чем компенсирует."
    - "Такой способ быстрее, грубее и опаснее."
    - "Он сильнее нарушает общий баланс."
    - "Именно такое использование чаще ведёт к перегрузам, срывам и усилению угроз."

цена_энергии:
  - "Любое серьёзное использование энергии имеет цену."
  - "Цена может идти через тело, психику, усталость, боль, потерю контроля, истощение или повреждения."
  - "Чем больше объём и длительность, тем выше риск."
  - "Сильная энергия без контроля опаснее слабой энергии с хорошей подготовкой."
  - "Если энергия не используется, она сама по себе не обязана вредить носителю."

контроль:
  - "Контроль зависит от тела, психики, эмоций, опыта, усталости и ситуации."
  - "Контроль учат развивать с детства."
  - "Эмоции могут усилить проявление, но ухудшить стабильность."
  - "Страх, злость, паника, травма и боль могут спровоцировать срыв."
  - "Холодная голова не гарантирует слабую энергию, а сильные эмоции не гарантируют силу."

перегруз_и_потеря_контроля:
  перегруз:
    - "Перегруз возникает от слишком большого объёма, длительности или давления энергии на тело/психику."
    - "Последствия: боль, слабость, потеря сознания, внутренние повреждения, временная нестабильность."
  потеря_контроля:
    - "Потеря контроля связана с эмоциями, срывом, травмой, страхом или резким нарушением состояния."
    - "Последствия зависят от типа энергии и ситуации."
  правило:
    - "Не путать перегруз и потерю контроля."
    - "Перегруз — это предел объёма/длительности."
    - "Потеря контроля — это сбой управления."

энергия_и_эхо:
  - "Эхо связаны с нарушением общего баланса энергии."
  - "Эхо не реагируют на одного конкретного виновного по обычной логике."
  - "Если система нарушена в одном месте, последствия могут проявиться в другом."
  - "Оружие и техника могут замедлить или частично повлиять на Эхо, но не решают проблему полностью."
  - "Основной способ противодействия Эхо — энергия."
  - "Чем плотнее форма Эхо, тем больше возможностей воздействовать на него физически, но это не делает его обычным существом."

общественная_система:
  - "Детей проверяют на проявление энергии примерно в шесть лет."
  - "Детей с проявлением отправляют в специальную школу."
  - "Школа учит контролю, типу энергии, эмоциям, безопасности и обычным предметам."
  - "Слабым носителям могут разрешить обычную жизнь или небоевую профессию."
  - "Средние и сильные носители чаще обязаны идти в академии, военные структуры, рейдерство или службы."
  - "На Востоке энергию стараются использовать разумно."
  - "На Западе энергию используют широко, в том числе в быту и инфраструктуре."

запреты_для_сцен:
  - "Не делать энергию бесконечной."
  - "Не решать любой конфликт одной способностью без цены."
  - "Не придумывать персонажу новый тип энергии без его карточки."
  - "Не использовать энергию только как красивое сияние."
  - "Не забывать про энергию в сценах угрозы, боя, защиты, рейда или Эхо."
  - "Не писать внутреннюю механику, если POV её не знает."
  - "Не раскрывать скрытую природу Эхо или Акиры через эту карточку."
  - "Не делать Запад правым только потому, что его система эффективна."
  - "Не делать Восток слабым только потому, что он бережнее расходует энергию."

правило_показа:
  - "Энергия должна проявляться через действие, тело, последствия, тактику или состояние среды."
  - "Хорошо: энергия меняет расстояние, температуру, давление, движение, защиту, восприятие или риск."
  - "Плохо: энергия просто красиво описана и ни на что не влияет."
