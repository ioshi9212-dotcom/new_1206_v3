id: "world_public_history_ru"
file_type: "world_public_history"
version: "v1_clean_ru"
load_mode: "always"
status: "active"

назначение:
  - "Публичная история и устройство мира: то, что знают почти все люди, носители, рейдеры и большинство персонажей."
  - "Файл описывает не абсолютную скрытую правду, а общепринятую версию мира."
  - "Файл должен работать фоном, а не превращаться в лекцию в сцене."

главное_правило:
  - "Мир в этом файле — общий фон."
  - "Если факт относится к Наблюдателю, циклу, истинной причине появления кайросов, Акире, брату Акиры, Самуэлю или скрытой природе Эхо — его не использовать как публичное знание."
  - "Если персонаж знает больше публичной версии, это должно быть в личной карточке персонажа, knowledge/state или раскрыто сценой."

материки:
  - "В современном мире есть два крупных материка: человеческий материк и материк кайросов."
  - "Свободное пересечение между материками запрещено."
  - "После войны люди и кайросы живут раздельно."
  - "Между материками действует мирный договор и система границ."
  - "Обычные люди знают, что кайросы существуют, но плохо понимают их общество, мотивы и внутренние правила."

человеческий_материк:
  - "На человеческом материке один основной язык и единое общее государственное пространство."
  - "При этом нет одного простого правителя над всем материком."
  - "Материк делится на крупные части/округа: Восток, Запад, Север и Юг."
  - "Округа отличаются устройством, культурой, отношением к энергии и уровнем контроля."
  - "Юг почти не заселён и редко участвует в основной политике."
  - "Север считается более строгим, статусным и политически тяжёлым."
  - "Восток ближе к границе с материком кайросов."
  - "Запад находится дальше от материка кайросов и живёт по более техногенной системе."

восток_как_округ:
  - "Восток — часть человеческого материка, а не военная база."
  - "Восток ближе к границе с кайросами."
  - "Восток зеленее, проще и практичнее Запада."
  - "На Востоке стараются не тратить энергию без необходимости."
  - "Энергию не используют постоянно в быту."
  - "Постоянные барьеры без причины не держат, потому что это лишняя нагрузка на систему и носителей."
  - "У Востока больше прямых столкновений с границей, Эхо и кайросами."

запад_как_округ:
  - "Запад дальше от материка кайросов."
  - "На Западе реже случаются прямые столкновения с кайросами и часть проявлений Эхо ощущается слабее из-за расстояния и барьеров."
  - "Запад активно использует энергию в быту, инфраструктуре, защите, освещении, городских системах и технологиях."
  - "Западные города более техногенные: неон, плотная застройка, энергетические барьеры, много искусственного света и систем контроля."
  - "Запад не щадит носителей энергии."
  - "Даже слабый отклик стараются применить."
  - "Если человек может быть полезен системе, его используют."
  - "Отказ от использования энергии на Западе почти невозможен."
  - "С Запада сложно уйти или сбежать."
  - "На Западе могут принудительно подбирать связи и браки ради нужного типа энергии у потомков."
  - "Запад воспринимается как жёсткий и местами жестокий округ."

отношение_к_западникам:
  - "Западникам часто не доверяют."
  - "Если человек сбежал с Запада и хочет жить спокойно, его могут принять как беженца."
  - "К таким людям относятся настороженно, но не обязательно враждебно."

война_и_разделение:
  - "В прошлом между людьми и кайросами была крупная война."
  - "Точную причину войны большинство людей не знает."
  - "Есть официальные версии, слухи, политические объяснения и бытовые догадки."
  - "Известно, что после появления гибридов напряжение между людьми и кайросами резко выросло."
  - "После войны люди и кайросы разделились на два материка."
  - "Мирный договор закрепил границы, запрет свободного пересечения и запрет союзов между людьми и кайросами."
  - "Нарушение договора считается серьёзной угрозой."

расы_и_категории:
  люди:
    - "Обычные люди не имеют доступа к энергии."
    - "Если в роду нет гибридов или носителей, человек остаётся обычным человеком."
  кайросы:
    - "Кайрос рождается только от кайроса и кайроса."
    - "Кайросы — отдельный вид, а не просто люди с сильной энергией."
  гибриды:
    - "Гибрид рождается только от кайроса и человека."
    - "Гибриды считаются отдельной опасной и политически болезненной категорией."
  носители:
    - "Носитель — человек с наследственной связью с энергией."
    - "Носитель может родиться от гибрида и человека, носителя и носителя, носителя и человека."
    - "Если в роду был хотя бы один гибрид или носитель, потомок может считаться носителем даже при очень слабом отклике."
    - "Носитель не равен кайросу и не равен гибриду."

дети_и_система:
  - "У детей проводят проверку/анализ на проявление энергии примерно в шесть лет."
  - "Если энергия проявилась, ребёнка отправляют в специальную школу."
  - "В обычной школе не учат безопасно жить с энергией."
  - "В специальной школе дети учатся обычным предметам, контролю энергии, определению типа, работе с эмоциями и базовой безопасности."
  - "Ребёнок обычно живёт на территории школы и появляется дома только по установленному расписанию."
  - "Для общества это привычная система, хотя семьи реагируют по-разному."
  - "Кто-то отдаёт ребёнка спокойно, кто-то спорит, кто-то пытается скрывать проявление энергии."
  - "Если отклик почти отсутствует, ребёнку позже могут разрешить обычную жизнь или небоевую работу."
  - "Если энергия средняя, выше средней или сильная, дальнейшая служебная траектория почти обязательна."
  - "Сильные носители после школы идут в академии, службы, военные структуры, рейдерство, политику или закрытые направления."

отношения_с_носителями:
  - "Обычные люди не обязательно презирают носителей."
  - "Но многие обычные люди не хотят создавать семью с носителем."
  - "Главная причина — будущие дети."
  - "Если обычный человек создаёт семью с носителем, ребёнок почти наверняка будет считаться носителем."
  - "Значит, ребёнка ждёт проверка, специальная школа и жизнь по правилам системы."
  - "Из-за этого отношения с носителями считаются серьёзным выбором."
  - "Семьи между обычными людьми и носителями всё равно существуют."

энергия_в_обществе:
  - "Энергия считается полезной, опасной и политически важной."
  - "Против Эхо и кайросов по-настоящему может работать только энергия."
  - "Оружие, техника и люди без энергии не решают такие угрозы полностью."
  - "Поэтому система школ, академий и служб воспринимается как необходимость."
  - "Не все согласны с этой системой, но большинство принимает её как часть мира."

эхо_в_публичном_понимании:
  - "Эхо известны как опасные аномальные проявления, связанные с пространством, энергией и нарушением баланса."
  - "Эхо не считаются обычными живыми существами."
  - "С Эхо нельзя договориться."
  - "Эхо не охотятся как звери и не воюют как люди."
  - "Эхо могут искажать пространство, разрушать среду и убивать тех, кто оказался рядом."
  - "Обычные люди не знают истинную природу Эхо."
  - "Для населения Эхо — причина эвакуаций, закрытых зон, рейдов и тревог."
  - "Люди знают, что чрезмерное использование энергии опасно для общего баланса, но понимают это неполно."

эхо_и_общая_ответственность:
  - "Эхо не выбирают виновного."
  - "Если один округ нарушает баланс, последствия могут прийти в другой округ."
  - "Запад часто защищён расстоянием и барьерами."
  - "Из-за этого последствия чрезмерного расхода энергии могут чаще ощущать Восток и Север."
  - "Это усиливает напряжение между округами."

напряжение_между_округами:
  - "Официально гражданской войны между округами нет."
  - "Но разговоры о будущем внутреннем конфликте существуют."
  - "Главная причина — разное отношение к энергии, носителям и цене безопасности."
  - "Восток и часть Севера чаще понимают, что энергию нельзя расходовать бездумно."
  - "Запад использует энергию максимально и перекладывает часть последствий на общую систему."

что_почти_все_знают:
  - "Кайросы существуют."
  - "У кайросов есть отдельный материк."
  - "Люди и кайросы разделены после войны."
  - "Есть мирный договор и запрет свободного пересечения границ."
  - "Союзы людей и кайросов запрещены или крайне опасны политически."
  - "Гибриды и носители — разные категории."
  - "Эхо существуют и являются угрозой."
  - "Эхо связаны с энергией, пространством и нарушением баланса."
  - "Рейдеры и военные структуры занимаются угрозами, связанными с энергией, Эхо, кайросами и границей."
  - "Официальная версия мира не всегда полная."

что_не_является_общим_знанием:
  - "Истинная роль Наблюдателя."
  - "Настоящая причина создания кайросов."
  - "Цикл и реинкарнации."
  - "Истинная природа Акиры."
  - "Связь Акиры с балансом мира."
  - "Роль брата Акиры."
  - "Истинные причины резких всплесков Эхо."
  - "Скрытые цели Самуэля."
  - "Почему отдельные кайросы пересекают границы."

запреты:
  - "Не писать в этом файле Восточный сектор как военную базу."
  - "Не писать здесь быт базы, комнаты, столовые, медблоки, тренировки и внутренние правила подразделения."
  - "Не писать здесь тон сцены или манеру NPC."
  - "Не раскрывать скрытый лор как факт."
  - "Не делать всех персонажей знатоками истинной истории."
  - "Не превращать публичную историю в монолог внутри сцены."
