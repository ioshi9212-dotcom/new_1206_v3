id: "kairos_public_ru"
file_type: "kairos_public_background"
version: "v1_clean_ru"
load_mode: "always"
status: "active"

назначение:
  - "Короткая фоновая карточка о кайросах: что о них известно в мире и что можно использовать без скрытого лора."
  - "Файл не раскрывает тайну Акиры, брата Акиры, Наблюдателя или цикл."

главное_правило:
  - "Кайросы — отдельный вид, а не люди с сильной энергией."
  - "Публичные сведения о кайросах неполные и часто искажены страхом, политикой и военными отчётами."
  - "Если персонаж говорит точную скрытую правду о кайросах, нужен личный источник знания."

кто_такие_кайросы:
  - "Кайросы внешне похожи на людей, но отличаются природой, телом, долголетием, энергией и отношением к миру."
  - "Кайросы сильнее связаны с энергией, средой и балансом."
  - "Их энергия не является трюком, магией для красоты или простой боевой способностью."
  - "Для кайросов взаимодействие с энергией естественнее, чем для людей и носителей."
  - "Кайросы не обязаны быть одинаковыми, одинаково мирными или одинаково опасными."

происхождение_в_публичной_версии:
  - "Большинство людей не знает истинную причину появления кайросов."
  - "Существуют официальные версии, мифы, религиозные объяснения, политические теории и школьные упрощения."
  - "Истинная версия не является общеизвестной."

внешность_и_тело:
  - "У кайросов часто встречаются белые или очень светлые волосы."
  - "Кайросы могут выглядеть более устойчивыми и здоровыми, чем люди."
  - "Их тело иначе реагирует на энергию, перегруз и баланс."
  - "Долгая жизнь возможна, но не делает кайросов неуязвимыми."
  - "Кайрос может погибнуть, истощиться, сорваться или получить тяжёлые последствия от энергии."

общество_кайросов:
  - "Кайросы живут на отдельном материке."
  - "Их общество не строится по человеческой технологической модели."
  - "Они меньше зависят от техники и сильнее от энергии, правил, природы и внутреннего порядка."
  - "У кайросов строгие ограничения на контакт с людьми и пересечение границ."
  - "Кайрос, нарушивший границу или принявший человеческий образ жизни, может потерять право вернуться на свой материк."
  - "У кайросов почти нет внутренних войн в человеческом смысле, но насилие и жёсткие решения возможны."

эмоции:
  - "Кайросы не устроены эмоционально так же, как люди."
  - "Их эмоции слабее, иначе проявляются или иначе контролируются."
  - "При долгом контакте с людьми у части кайросов могут проявляться более человеческие чувства."
  - "Эмоции для кайроса могут усиливать возможности, но также увеличивают риск срыва."
  - "Кайросы не являются бездушными машинами."

энергия_кайросов:
  - "Кайросы взаимодействуют с энергией через баланс, обмен и встроенность в поток."
  - "Для них энергия — часть существования, а не отдельный инструмент."
  - "Чрезмерное использование энергии всё равно имеет цену."
  - "Даже кайрос может перегрузиться, потерять сознание или повредить тело."

люди_и_кайросы:
  - "Между людьми и кайросами был крупный конфликт."
  - "После войны действует разделение материков и запрет свободного контакта."
  - "Люди часто боятся кайросов."
  - "Кайросы часто считают людей нестабильными, шумными, опасными и разрушительными."
  - "Несмотря на запреты, отдельные кайросы могут пересекать границу, жить среди людей или действовать скрытно."
  - "Обычные люди редко знают реальные причины таких пересечений."

гибриды_и_носители:
  - "Гибрид — ребёнок кайроса и человека."
  - "Носитель — потомок гибридной или носительской линии среди людей."
  - "Кайрос, гибрид, носитель и обычный человек — разные категории."
  - "Гибриды считаются политически опасной темой из-за сочетания энергии кайросов и человеческих эмоций."
  - "Потомки гибридов могут иметь разный уровень отклика: от почти незаметного до очень сильного."

публичные_страхи:
  - "Люди боятся кайросов из-за войны, границ, слухов и реальных нападений."
  - "Многие считают, что кайросы не должны находиться среди людей."
  - "Правительство и военные структуры могут скрывать часть инцидентов, чтобы избежать паники."
  - "Если кайрос появляется в человеческом городе, это часто становится закрытым делом."

что_можно_показывать_в_сцене:
  - "Настороженность людей к кайросам."
  - "Слухи, страхи и неполные знания."
  - "Разницу между кайросом, гибридом, носителем и человеком."
  - "Спор персонажей о том, опасны ли кайросы и гибриды."
  - "Факт, что кайросы не все одинаковые."

что_нельзя_раскрывать_из_этого_файла:
  - "Не раскрывать истинного создателя кайросов."
  - "Не раскрывать роль Наблюдателя."
  - "Не раскрывать связь Акиры с кайросами."
  - "Не раскрывать брата Акиры."
  - "Не раскрывать цикл и реинкарнации."
  - "Не делать любого кайроса автоматически знающим Акиру."
  - "Не делать всех кайросов врагами."
  - "Не делать всех кайросов добрыми хранителями баланса."

запреты:
  - "Не превращать кайросов в эльфов, демонов, ангелов или мистических богов."
  - "Не писать справку о кайросах в сцене без повода."
  - "Не давать NPC знание о кайросах выше его статуса, опыта или личной карточки."
  - "Не путать материк кайросов с Востоком или Восточным сектором."
