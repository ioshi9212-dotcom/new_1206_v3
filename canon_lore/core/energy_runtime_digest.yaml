energy_runtime_digest:
  purpose: "Small always-loaded world rule for energy-aware rendering."
  rule: "Energy is an active world layer for humans/kairos and can affect combat, movement, pressure, defense, perception and restraint."
  use_rule: "Characters do not use energy every second, but renderer must keep it available when pressure, danger, pursuit, restraint or defense logically calls for it."
  known_profiles:
    akira: "space; in 1206 access is blocked/closed unless scene unlocks it"
    emma: "water / moisture / liquid pressure"
    irey: "space + spatial-sensory link; intentional touch creates an anchor; contact is not required forever; anchor lasts about a day then weakens"
    raiden: "cold + air"
    jun: "barrier / illusion shift / concealment"
    ray: "sensory analysis"
  forbidden:
    - "Do not render energy-capable characters as ordinary humans if their energy slice is loaded."
    - "Do not invent new abilities beyond character slices."
    - "Do not make energy decorative magic; render physical effect or tactical consequence."
