lore_id: world_background
visibility: public_world
always_load: true
tags: ["world", "echo", "kairos", "energy", "continents", "second_world", "hidden_lore"]

summary:
  - "Мир состоит из человеческой цивилизации и скрытого слоя, связанного с кайросами, энергией и Эхо."
  - "Есть два материка: человеческий и второй, связанный с кайросами/иным устройством мира."
  - "Люди используют энергию, но не всегда возвращают баланс природе."
  - "Кайросы связаны с балансом энергии и природой глубже, чем люди."
  - "Эхо — аномальные проявления нарушения баланса. Они могут быть скрытыми, краткими, а позже физическими и разрушительными."
  - "Академия Астрейн обучает, проверяет и сортирует людей/носителей энергии, но не должна ощущаться как тюрьма."
  - "Скрытый лор существует для авторской логики и подтекста. Персонажи не знают скрытое, пока это не раскрыто сценой."

kairos_species_rules:
  race_rule:
    - "Кайросы — отдельная раса/народ, а не просто сильные человеческие носители энергии."
    - "Люди-носители энергии не становятся кайросами только из-за силы, редкого типа или высокого контроля энергии."
    - "В текущей стартовой линии 1206 кайросы среди активной группы: Акира, Эмма, Ирэй."
    - "Мики, Юна, Широ, Хару, Рэй и большинство рейдеров Восточного сектора — люди-носители энергии, если отдельный файл не говорит обратное."
  visible_traits:
    - "У кайросов часто встречаются белые волосы, ускоренное заживление тканей и иное качество/контроль энергии."
    - "Белые волосы не являются доказательством: персонажи не должны автоматически говорить или думать 'белые волосы — значит кайрос'."
    - "Безэмоциональность не является расовой нормой всех кайросов; она может быть следствием блока эмоций/потока/памяти, как у Акиры на старте 1206."
  recognition_rules:
    - "Обычный человек или слабый носитель может заметить странность, но не обязан распознать кайроса."
    - "Сильный носитель энергии с опытом может отличить кайросскую энергию по качеству, следу, давлению, структуре или угрозе."
    - "Райден может распознать не-человеческое качество энергии/угрозы по боевому опыту и чувствительности, но это не делает его всезнающим."
  scene_forbidden:
    - "Не использовать белые волосы как автоматическое раскрытие расы."
    - "Не называть персонажа кайросом в видимой сцене, если POV-персонаж не получил основания."
    - "Не путать кайросов с людьми-носителями энергии."

hard_rules:
  - "Не объяснять весь лор в сцене лекцией без причины."
  - "Держать лор фоном: через атмосферу, реакцию, термины, страхи, слухи, инструкции, ограничения."
  - "Не путать знание автора и знание персонажа."
  - "Если NPC не может знать факт, он может ошибаться, подозревать, молчать или задавать вопрос."
  - "Если упоминается Эхо, Кайросы, энергия, материки или второй мир, нужно подтягивать профильный файл по тегам."
