date: "1206-09-01"
year: 1206
day_month: "1 сентября"
start_phase: "утро / после ночного узла"
label: "первое утро после узла / Восточный сектор или безопасная промежуточная точка"

calendar_role:
  type: "adaptive_followup_day"
  rule:
    - "Этот день включается, если ветка 31 августа привела Акиру к Восточному сектору или к безопасному временному месту."
    - "Если текущая ветка ещё не дошла сюда, не форсировать дату."
    - "День не задаёт действие Акиры; игрок выбирает реакцию."

scene_general_info:
  summary:
    - "Мир реагирует на последствия ночи."
    - "Если Акира в Восточном секторе, база должна ощущаться живой: люди, еда, коридоры, задачи, усталость, обычные разговоры."
    - "Рэй может быть занят, осторожен и закрыт, но это не тотальный запрет на жизнь Акиры."
    - "Мики может стать первым тёплым бытовым контактом, если она введена сценой."
  player_freedom:
    - "Игрок может искать ответы, закрыться, просить встречу, изучать базу, отдыхать, спорить, наблюдать или пропустить часть времени."
    - "Если игрок выбирает рутину, сжать день до значимых изменений."
  sleep_followup_rule:
    - "Если игрок завершил 31 августа сном/отключением/отдыхом, начать с meaningful beat: утро, внешний стук, телесное состояние, тревожный сон или изменение обстановки."
    - "Не спрашивать игрока, от чего проснуться."

scene_characters:
  active_or_likely:
    akira:
      files:
        main: "characters/akira/main.yaml"
        character: "characters/akira/character.yaml"
        knowledge: "characters/akira/knowledge.yaml"
    ray:
      files:
        main: "characters/ray/main.yaml"
        character: "characters/ray/character.yaml"
        knowledge: "characters/ray/knowledge.yaml"
      role: "старший командир; занят, скрывает часть правды, может обрубать прямые вопросы"
    raiden:
      files:
        main: "characters/raiden/main.yaml"
        character: "characters/raiden/character.yaml"
        knowledge: "characters/raiden/knowledge.yaml"
      role: "свой на Восточном секторе; командир 7-го отряда; не чужой подозреваемый без причины"
    miki:
      files:
        main: "characters/miki/main.yaml"
        character: "characters/miki/character.yaml"
        knowledge: "characters/miki/knowledge.yaml"
      role: "живая бытовая опора, может принести еду/одежду/информацию/контакт с базой"
  conditional:
    jun:
      files:
        main: "characters/jun/main.yaml"
        character: "characters/jun/character.yaml"
        knowledge: "characters/jun/knowledge.yaml"
      load_when:
        - "jun_status не dead"
        - "ветка привела Джуна к Восточному сектору или скрытому месту"
    yuna:
      files:
        main: "characters/yuna/main.yaml"
        character: "characters/yuna/character.yaml"
        knowledge: "characters/yuna/knowledge.yaml"
      load_when:
        - "нужна медицинская сцена"

beats:
  - id: "morning_state_or_wakeup"
    type: "meaningful_start"
    function:
      - "показать состояние после ночи и текущую обстановку"
      - "не пересказывать всю ночь, если игрок просил пропуск"

  - id: "first_base_contact"
    type: "conditional_social_intro"
    character_ids: ["miki", "ray", "raiden"]
    function:
      - "дать базе человеческий тон"
      - "не превращать пребывание Акиры в тотальную камеру"
      - "подвести к будущим вопросам, еде, одежде, комнате, разговору или наблюдению"

  - id: "ray_access_pressure"
    type: "soft_block_not_prison"
    function:
      - "Рэй не обязан отвечать сразу"
      - "Рэй может работать, избегать полного разговора или дать короткий приказ"
      - "игрок может искать обход, момент, посредника или конфликтный способ разговора"

scene_forbidden:
  - "Не писать за игрока решение Акиры."
  - "Не делать Восточный сектор тюрьмой без текущей причины."
  - "Не использовать лабораторный язык в обычной базе."
  - "Не делать Рэя абсолютной стеной на все даты."
  - "Не грузить будущие дни, если дата ещё не перешла."
