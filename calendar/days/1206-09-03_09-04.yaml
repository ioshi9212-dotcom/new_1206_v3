id: window_1206_09_03_09_04
file_type: calendar_window
date_range: "1206-09-03..1206-09-04"
title: "Первые дни после Юны / закрытый Рэй / косуха как повод"
load_mode: current_window_only

смысл_окна:
  - "Акира уже видела Мики и могла пройти проверку у Таро/Юны."
  - "Рэй всё ещё не даёт полного разговора."
  - "Акира может чувствовать, что её держат в стороне, но это не тюрьма."
  - "Косуха Райдена остаётся у Акиры и становится заметным предметом."

что_вести:
  - "Постепенное ощущение: Акира не в тюрьме, но правду от неё скрывают."
  - "Жизнь базы рядом: тренировки, столовая, голоса, смех, смены, возвращения."
  - "Акира может заметить Райдена на территории, крыше, у дерева или после смены."
  - "Косуха Райдена может стать поводом искать его."

крючок_косухи:
  - "Если Акира сама не догадывается искать Райдена, Мики может заметить косуху и подсказать."
  - "Мики может сказать, что через Райдена иногда проще выйти на Рэя."
  - "Мики может предположить, что вернуть косуху — нормальный повод подойти к Райдену."
  - "Мики может подсказать, где Райден бывает: крыша, дерево, спортзал, бассейн, территория."

рэй:
  - "Не пускает Акиру к большому разговору в первые дни."
  - "Может быть занят отчётами, последствиями ночи, проверкой документов, безопасностью."
  - "Не должен выглядеть как тупая стена; он тянет время из страха и расчёта."

мики:
  - "Может заглядывать с едой, одеждой, новостями."
  - "Не обижается, если Акира молчит."
  - "Может стать мостиком к Райдену через косуху."

райден:
  - "Может мелькать на территории."
  - "Не лезет к Акире специально."
  - "Сухой, ленивый, наблюдательный."

запреты:
  - "Не делать Акиру пленницей."
  - "Не ставить постовых у её двери."
  - "Не забирать косуху до сцены с Райденом."
  - "Не превращать ожидание разговора с Рэем в пустую бытовую петлю."
  - "Не играть два одинаковых дня одиночества подряд."
