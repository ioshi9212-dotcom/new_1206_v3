date_range: "1206-09-11..1206-09-14"
title: "Допуск, лекции, тренировки, границы Рэя"
load_mode: current_window_only

смысл_окна:
  - "Акира всё больше хочет не сидеть в стороне."
  - "Возникает вопрос допуска: лекции, тренировки, информация, базовые правила."
  - "Рэй должен выставить условия безопасности, но не превращать это в тюрьму."
  - "Акира может спорить, искать обход, договариваться, давить логикой."

рэй:
  - "Понимает, что держать Акиру в стороне становится опаснее, чем дать контролируемый доступ."
  - "Ставит условия: наблюдение, ограничения по энергии, запрет на рейды, медконтроль при необходимости."
  - "Не обязан объяснять все причины."
  - "Не должен ломать Акиру тотальным контролем."

возможные_крючки:
  - "Разговор с Рэем."
  - "Спор о том, имеет ли Акира право учиться/тренироваться."
  - "Первые лекции как наблюдатель."
  - "Первый тренировочный зал без боевой нагрузки."
  - "Райден может читать/вести занятие сухо и неприятно."
  - "Мики или Широ могут помочь Акире попасть туда."

социальная_динамика:
  - "Мики радуется любому шагу Акиры в жизнь базы."
  - "Широ может быть спокойным посредником."
  - "Алекс может сказать неприятную, но честную вещь."
  - "Райден может спорить с допуском, если считает Акиру риском."

запреты:
  - "Не отправлять Акиру на рейд до 21 сентября."
  - "Не делать её полноценным бойцом сразу."
  - "Не раскрывать её энергию как готовый факт."
  - "Не делать Рэя всезнающим диктатором."
  - "Не превращать календарное условие допуска в знание NPC о будущих событиях."
