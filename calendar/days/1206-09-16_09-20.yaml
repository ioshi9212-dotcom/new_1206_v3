id: window_1206_09_16_09_20
file_type: calendar_window
date_range: "1206-09-16..1206-09-20"
title: "Нарастание связей / перед возвращением Хару"
load_mode: current_window_only

смысл_окна:
  - "Акира уже не полностью чужая, но ещё не своя."
  - "Нужно укрепить связи с Мики, Широ, Алекс и Райденом до появления Хару."
  - "Появление Хару 21 сентября должно изменить уже существующую динамику, а не начинать всё с нуля."

что_вести:
  - "Мики становится ближе."
  - "Алекс может дать первый острый, но честный контакт."
  - "Широ становится безопасным взрослым/старшим рядом."
  - "Райден остаётся сложным: грубость, наблюдение, редкие точные действия заботы."
  - "Акира может начать понимать, что база не враждебна, но вся правда скрыта."

возможные_крючки:
  - "Столовая."
  - "Крыша."
  - "Трензал."
  - "Медпункт после нагрузки."
  - "Разговор о кайросах/гибридах в публичной версии."
  - "Слухи о возвращении Хару."

подготовка_к_хару:
  - "Мики может упоминать Хару как яркого, шумного, рыжего, живого."
  - "Райден может не хотеть обсуждать Хару."
  - "Широ может говорить о Хару тепло, но с осторожностью."
  - "Акира не должна заранее знать личную связь с Хару."

запреты:
  - "Не раскрывать Акире, что Хару знал её раньше."
  - "Не делать Райден/Акира слишком близкими без выбора игрока."
  - "Не превращать ожидание Хару в спойлерный монолог."
  - "Не делать Хару знанием всех как календарную дату, если персонаж не имеет источника."
