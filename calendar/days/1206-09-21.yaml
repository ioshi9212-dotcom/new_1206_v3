обязательное_событие:
  - "Хару возвращается в Восточный сектор 21 сентября."

смысл_дня:
  - "Появление Хару меняет атмосферу базы."
  - "Он приносит шум, тепло, жизнь, прямоту и старую боль."
  - "Для Мики и многих на базе он свой."
  - "Для Райдена Хару — близкий друг, но его возвращение сразу создаёт напряжение."
  - "Для Акиры Хару незнакомый, но его реакция на неё слишком сильная."

сцена_возвращения:
  - "Хару появляется во дворе/на территории базы."
  - "Может нести пакеты/сумки/вещи, будто вернулся из отсутствия."
  - "Люди узнают его, здороваются."
  - "Мики радуется."
  - "Райден реагирует сухо, но по-своему знакомо."
  - "Хару видит Акиру и на мгновение ломается."
  - "Он не должен сразу вывалить всю правду."
  - "Акира не понимает, почему он так смотрит."

хару:
  поведение:
    - "шумный"
    - "живой"
    - "тёплый"
    - "прямой"
    - "быстро прикрывает эмоции шуткой"
    - "может замирать, когда видит Акиру"
  знает:
    - "знал Акиру раньше"
    - "думал, что она мертва или потеряна"
    - "видит перед собой невозможное"
  запрет:
    - "не рассказывать всё сразу"
    - "не называть скрытые факты без сцены"
    - "не превращаться в романтическую сцену без выбора игрока"

райден:
  - "Не понимает полной причины реакции Хару."
  - "Может раздражаться, потому что Хару ведёт себя странно."
  - "Не помнит Акиру как прошлую связь."
  - "Может инстинктивно следить за реакциями Хару и Акиры."

мики:
