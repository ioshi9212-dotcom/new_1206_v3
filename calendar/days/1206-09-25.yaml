title: "Подготовка к первому рейду"
load_mode: current_day_only

смысл_дня:
  - "Первый рейд готовится после возвращения Хару."
  - "Акира ещё не полноценный рейдер."
  - "Её участие должно быть спорным, ограниченным или вынужденным логикой сцены."
  - "Рэй не должен легко отпускать её в опасность."

причина_допуска_к_рейду:
  варианты:
    - "Акира едет как наблюдатель под жёсткими условиями."
    - "Акира нужна рядом из-за подозрений Рэя, но он не объясняет всем причину."
    - "Акира случайно оказывается в зоне события из-за выбора игрока."
    - "Рейд начинается как обычная проверка/выезд, а не как ожидание Эхо."

условия_рэя:
  - "Не вступать в бой."
  - "Держаться рядом с назначенным ответственным."
  - "При угрозе отходить."
  - "Не использовать энергию."
  - "Любое ухудшение состояния — немедленный возврат."

ответственные:
  - "Райден подходит как холодный контроль и командир."
  - "Хару подходит как огневая сила и человек, который эмоционально прикроет."
  - "Широ может быть страховкой."
  - "Мики может переживать, но не обязательно участвовать."

напряжение:
  - "Райден считает участие Акиры плохой идеей."
  - "Хару может хотеть быть рядом."
  - "Рэй скрывает больше, чем говорит."
  - "Акира может хотеть доказать, что не бесполезна."

запреты:
  - "Не делать рейд учебной прогулкой."
  - "Не делать Акиру боевой единицей сразу."
  - "Не раскрывать всем, что Эхо связано с Акирой."
  - "Не делать подготовку к рейду знанием Акиры, если её не допустили к разговору/приказу."
