date: "1206-09-05"
year: 1206
day_month: "5 сентября"
start_phase: "день / свободный период"
label: "жизнь базы / свободный промежуток / социальные крючки"

calendar_role:
  type: "free_gap_day"
  rule:
    - "Это не обязательная рельса, а свободный период для игры, рутины и мини-событий."
    - "Игрок может играть день подробно или сжать несколько дней одной рутиной."
    - "Мини-арки NPC разрешены, если не ломают главную линию и знания персонажей."

scene_general_info:
  summary:
    - "База живёт: столовая, тренировки, коридоры, двор, бытовые разговоры, работа отрядов."
    - "Акира может искать ответы, наблюдать, избегать людей, цепляться за бытовые опоры или проверять границы."
    - "Мики, Широ, Алекс, Райден и другие могут входить в сцену через логичные места и цели."
  free_gap_rule:
    - "Если игрок пишет пропуск с рутиной, сжать повторяющиеся дни в короткий итог."
    - "Добавлять только значимые изменения: состояние, отношения, слухи, доступ, конфликт, новые знания или последствия."
    - "Не дробить пропуск на каждый приём еды, каждый сон и каждый шаг."

scene_characters:
  likely_pool:
    miki:
      files:
        main: "characters/miki/main.yaml"
        character: "characters/miki/character.yaml"
        knowledge: "characters/miki/knowledge.yaml"
      use_for:
        - "еда, одежда, бытовая помощь, тёплый контакт, новости, социальный мостик"
    shiro:
      files:
        main: "characters/shiro/main.yaml"
        character: "characters/shiro/character.yaml"
        knowledge: "characters/shiro/knowledge.yaml"
      use_for:
        - "спокойная взрослая опора, столовая, тренировки, мягкая защита, юмор"
    alex:
      files:
        main: "characters/alex/main.yaml"
        character: "characters/alex/character.yaml"
        knowledge: "characters/alex/knowledge.yaml"
      use_for:
        - "закрытая динамика с Мики, ревность, холодность, возможное сближение позже"
    raiden:
      files:
        main: "characters/raiden/main.yaml"
        character: "characters/raiden/character.yaml"
        knowledge: "characters/raiden/knowledge.yaml"
      use_for:
        - "командир 7-го отряда, сухой тон, лекции позже, бытовая резкость, скрытая тяга без знания"
    ray:
      files:
        main: "characters/ray/main.yaml"
        character: "characters/ray/character.yaml"
        knowledge: "characters/ray/knowledge.yaml"
      use_for:
        - "командование, закрытые ответы, ограничения доступа, редкие личные срывы"
    kai:
      files:
        main: "characters/kai/main.yaml"
        character: "characters/kai/character.yaml"
        knowledge: "characters/kai/knowledge.yaml"
      use_for:
        - "может быть замечен как давление/угроза, но активное столкновение лучше ближе к тренировочным/лекционным узлам"

beats:
  - id: "routine_or_social_hook"
    type: "optional"
    function:
      - "если игрок играет день — дать живую сцену базы"
      - "если игрок пропускает — кратко сжать рутину и отметить изменения"

  - id: "miki_bridge"
    type: "optional_character_hook"
    character_ids: ["miki", "alex"]
    function:
      - "Мики может втянуть Акиру в жизнь базы"
      - "Алекс остаётся важной связью Мики и не должна исчезать из динамики"

  - id: "raiden_distance_or_collision"
    type: "optional_character_hook"
    character_ids: ["raiden"]
    function:
      - "Райден может пересечься с Акирой через базу, столовую, крышу, двор, тренировки или поручение"
      - "он не обязан быть мягким и не знает их прошлую связь"

scene_forbidden:
  - "Не превращать свободный промежуток в пустой filler."
  - "Не вводить всех персонажей сразу без причины."
  - "Не делать NPC всезнающими о маршрутах, вещах, мотивах и скрытом прошлом."
  - "Не превращать Восточный сектор в стерильный протокол."
