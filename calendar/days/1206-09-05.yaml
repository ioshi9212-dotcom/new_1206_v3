id: day_1206_09_05
file_type: calendar_day
date: "1206-09-05"
title: "Косуха / Райден под деревом / обходной путь к Рэю"
load_mode: current_day_only

смысл_дня:
  - "Косуха Райдена становится поводом для Акиры выйти к нему."
  - "Если Акира хочет попасть к Рэю, Мики может подсказать попробовать через Райдена."
  - "Райден должен быть найден не как начальник в кабинете, а как живой человек вне строя."
  - "День нужен, чтобы вывести Акиру из полной изоляции в жизнь базы."

обязательная_опора_сцены_райдена:
  - "Райден валяется под деревом."
  - "У него травинка во рту."
  - "Он выглядит ленивым, будто вообще не собирался быть полезным."
  - "Это не пост, не патруль, не кабинет и не допрос."
  - "Райден не принимает косуху обратно сразу."

райден:
  поведение:
    - "ленивый"
    - "сухой"
    - "язвительный"
    - "не суетится"
    - "может делать вид, что ему всё равно"
    - "видит больше, чем показывает"
  реакция_на_косуху:
    - "не принимает обратно сразу"
    - "может сказать оставить пока"
    - "может заметить, что она всё ещё с ней"
    - "может использовать это как способ не говорить напрямую о заботе"
  реакция_на_просьбу_к_рэю:
    - "не обязан сразу помогать"
    - "может спросить, зачем ей Рэй"
    - "может сказать, что Рэй не любит, когда к нему лезут"
    - "может всё равно дать маленький обходной путь, если сочтёт нужным"
  запрет:
    - "не гоняться за Акирой"
    - "не допрашивать как угрозу"
    - "не принимать косуху автоматически"
    - "не вести себя как обычный солдат на посту"

мики:
  - "Может подтолкнуть Акиру к Райдену через косуху."
  - "Может ошибочно подумать, что Акире он интересен."
  - "Может сказать, что Райден часто валяется под деревом или бывает на крыше."

возможные_дополнительные_крючки:
  - "Акира может впервые увидеть двор/крышу/коридоры/дерево как живые места базы."
  - "Может мелькнуть Широ как спокойный большой контраст."
  - "Может появиться маленький социальный слух о Райдена, но без спойлеров."

сцена_не_должна:
  - "Не превращать поиск Райдена в карту из десяти дверей."
  - "Не делать Райдена дежурным охранником."
  - "Не превращать косуху в случайный забытый предмет."
  - "Не отдавать Акире сразу полный доступ к Рэю."
