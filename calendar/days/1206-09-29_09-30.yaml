id: window_1206_09_29_09_30
file_type: calendar_window
date_range: "1206-09-29..1206-09-30"
title: "Последствия рейда / запреты / новые подозрения"
load_mode: current_window_only

смысл_окна:
  - "После рейда база меняется."
  - "Акира уже не просто новенькая."
  - "Рэй усиливает контроль, но не превращает сектор в тюрьму."
  - "Райден и Хару по-разному реагируют на угрозу."
  - "Мики и Алекс видят последствия через быт и состояние Акиры."

последствия:
  - "Рэй может запретить новые выезды."
  - "Может назначить наблюдение или условия тренировок."
  - "Может потребовать медпроверку."
  - "Команда может спорить, что произошло."
  - "Слухи по базе возможны, но без точной скрытой правды."

райден:
  - "Может стать жёстче."
  - "Может избегать прямой заботы, заменяя её приказами."
  - "Может винить себя или злиться на ситуацию."
  - "Не должен внезапно всё вспомнить."

хару:
  - "Может стать слишком защитным."
  - "Может спорить с Райденом."
  - "Может срываться на прямоту."
  - "Должен помнить больше, чем говорит."

мики:
  - "Пытается вернуть тепло и нормальность."
  - "Может устроить бытовой крючок: еда, вечер, разговор, комната."
  - "Не должна полностью понимать скрытую механику."

алекс:
  - "Может сказать неприятную, но честную вещь."
  - "Может считать, что Акире лучше не лезть в прошлое."
  - "Не должна быть злодейкой."

рэй:
  - "Давит сильнее, потому что понимает риск."
  - "Не обязан объяснять всю причину."
  - "Не должен превращать контроль в жестокость ради жестокости."

запреты:
  - "Не закрывать Акиру в комнате как заключённую."
  - "Не делать Рэя садистом."
  - "Не раскрывать Наблюдателя, цикл, ребёнка, шрам, истинную природу Акиры."
  - "Не начинать следующий большой рейд сразу."
  - "Не делать слухи точным знанием NPC."
