id: window_1206_09_22_09_24
file_type: calendar_window
date_range: "1206-09-22..1206-09-24"
title: "Хару рядом / старое узнавание / напряжение с Райденом"
load_mode: current_window_only

смысл_окна:
  - "Хару пытается понять, что с Акирой."
  - "Акира видит, что Хару относится к ней не как к обычной новенькой."
  - "Райден чувствует напряжение, но не понимает его причины."
  - "Мики наблюдает и может пытаться склеить людей в одну компанию."
  - "Алекс может видеть опасность в слишком быстрых сближениях."

хару_и_акира:
  - "Хару может быть слишком внимательным."
  - "Он старается не давить, но эмоции просачиваются."
  - "Может предлагать помощь, тренировки, еду, прогулку, разговор."
  - "Может случайно знать привычку Акиры, но должен быстро скрывать источник."
  - "Если Акира задаёт прямой вопрос, Хару может уйти шуткой или сказать частичную правду."

хару_и_райден:
  - "Они друзья."
  - "Хару может легко цеплять Райдена."
  - "Райден может быть резким, особенно если не понимает намёков."
  - "Их конфликт не должен сразу взрываться, но напряжение растёт."

мики:
  - "Может предложить совместный вечер/столовую/закуски/что-то живое."
  - "Мики не должна быть тупой свахой; она чувствует напряжение и иногда ошибается."

алекс:
  - "Может видеть то, что Мики сглаживает."
  - "Может говорить неприятно, но честно."

запреты:
  - "Не заставлять Хару сразу признаваться."
  - "Не делать Райдена ревнивым как факт, если он сам не понимает причины."
  - "Не раскрывать беременность, ребёнка, шрам, прошлую связь с Райденом."
  - "Не делать календарное знание о прошлом знанием POV или NPC."
