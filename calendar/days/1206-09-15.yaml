date: "1206-09-15"
year: 1206
day_month: "15 сентября"
start_phase: "день / узел допуска"
label: "доступ к лекциям и тренировочным зонам / давление через Рэя"

calendar_role:
  type: "soft_story_node"
  rule:
    - "Это дата-узел, но не фиксированная сцена."
    - "Если игрок пришёл к этой теме раньше или позже, узел можно сдвинуть по состоянию."
    - "Главная функция — дать путь к лекциям, тренировочным зонам, экзамену/проверке безопасности и новым NPC-конфликтам."

scene_general_info:
  summary:
    - "Акира может добиваться доступа к занятиям, лекциям, тренировочным зонам или информации."
    - "Рэй может ставить условия через безопасность, ответственность и контроль риска."
    - "Доступ не должен выглядеть как произвольная тюрьма: у него должна быть причина внутри мира."
    - "Если Джун жив в ветке, возможен скрытый разговор Джуна и Рэя вне знания Акиры."
  player_freedom:
    - "Игрок может давить на Рэя, искать посредника, идти через Мики/Райдена/Широ, наблюдать, нарушать правила или ждать."
    - "Нарушение запретов должно давать последствия, а не автоматическую стену."

scene_characters:
  likely_or_conditional:
    ray:
      files:
        main: "characters/ray/main.yaml"
        character: "characters/ray/character.yaml"
        knowledge: "characters/ray/knowledge.yaml"
      role:
        - "старший командир; контроль доступа; скрывает часть правды"
      rule:
        - "может обрубать разговор, но не должен быть абсолютной механической стеной"
        - "если игрок находит рычаг, момент или кризис — разговор может сдвинуться"
    akira:
      files:
        main: "characters/akira/main.yaml"
        character: "characters/akira/character.yaml"
        knowledge: "characters/akira/knowledge.yaml"
      control_rule:
        - "игрок управляет её решением"
    miki:
      files:
        main: "characters/miki/main.yaml"
        character: "characters/miki/character.yaml"
        knowledge: "characters/miki/knowledge.yaml"
      role:
        - "может подсказать бытовой маршрут, слух, кабинет, человека, но не знает hidden lore"
    raiden:
      files:
        main: "characters/raiden/main.yaml"
        character: "characters/raiden/character.yaml"
        knowledge: "characters/raiden/knowledge.yaml"
      role:
        - "может быть связан с лекциями, безопасностью, тренировками, но действует через свой характер"
    shiro:
      files:
        main: "characters/shiro/main.yaml"
        character: "characters/shiro/character.yaml"
        knowledge: "characters/shiro/knowledge.yaml"
      role:
        - "может стать мягким проводником в быт/столовую/тренировки"
    kai:
      files:
        main: "characters/kai/main.yaml"
        character: "characters/kai/character.yaml"
        knowledge: "characters/kai/knowledge.yaml"
      role:
        - "давление, конфликт, проверка, пятый отряд или будущие тренировки"
    jun:
      files:
        main: "characters/jun/main.yaml"
        character: "characters/jun/character.yaml"
        knowledge: "characters/jun/knowledge.yaml"
      load_when:
        - "jun_status жив/ранен/скрыт и текущая ветка допускает его участие"
      hidden_hook:
        - "может говорить с Рэем как с сыном только вне знания Акиры, если сцена не раскрыла родство"

beats:
  - id: "access_pressure"
    type: "player_driven_goal"
    function:
      - "подвести к вопросу доступа без назначения способа"
      - "дать Рэй/система/безопасность как сопротивление"
      - "оставить игроку способы давления, обхода или переговоров"

  - id: "safety_condition_or_exam"
    type: "conditional_requirement"
    function:
      - "если Рэй разрешает доступ, он может поставить проверку техники безопасности, экзамен, сопровождение или ограниченный допуск"
      - "условие должно быть объяснимым, а не произвольным запретом"

  - id: "hidden_family_pressure_if_jun_alive"
    type: "hidden_conditional"
    visible_to_akira: false
    condition:
      - "jun_status не dead"
      - "Джун и Рэй имеют сценическую возможность говорить без Акиры"
    function:
      - "сдвинуть давление на Рэя"
      - "не раскрывать родство Акире без сцены"

scene_forbidden:
  - "Не делать Рэя вечной стеной без реакции на действия игрока."
  - "Не писать, что Акира не может выйти/ходить/дышать без разрешения, если current_state не ввёл жёсткое ограничение."
  - "Не давать доступ без цены, если сцена логически требует проверки."
  - "Не раскрывать скрытые семейные связи через календарь в видимой сцене."
