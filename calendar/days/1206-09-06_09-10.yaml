id: window_1206_09_06_09_10
file_type: calendar_window
date_range: "1206-09-06..1206-09-10"
title: "Мики, Широ, Алекс / первые социальные связи"
load_mode: current_window_only

смысл_окна:
  - "Акира начинает входить в живую среду Восточного сектора."
  - "Не через протокол, а через людей."
  - "Мики тянет к общению."
  - "Широ даёт спокойную опору."
  - "Алекс может быть холодной, резкой, но не злодейкой."
  - "Райден остаётся рядом фоном: сухой, наблюдательный, не вмешивается без причины."

главные_крючки:
  - "Столовая."
  - "Первый общий стол."
  - "Широ громко зовёт Акиру."
  - "Мики спорит за Акиру как за подругу."
  - "Алекс наблюдает, говорит сухо, не лезет с нежностью."
  - "Райден может сидеть рядом и делать вид, что его это не касается."
  - "Крыша, двор, дерево, трензал и коридоры могут давать короткие встречи, если игрок сам выбирает движение."

атмосфера:
  - "Живая база."
  - "Разговоры, еда, шум, шутки, чужие взгляды."
  - "Не военный строй."
  - "Не казарма."
  - "Не школьная столовая, но человеческая, шумная, рабочая столовая."

персонажи:
  мики:
    - "быстро привязывается"
    - "защищает Акиру социально"
    - "может быть смешной и громкой"
  широ:
    - "спокойный большой человек"
    - "может шутить, звать мелкой, но без злобы"
    - "даёт ощущение безопасного взрослого"
  алекс:
    - "резкая, сухая, с границами"
    - "не обязана сразу любить Акиру"
    - "её холодность должна иметь характер, а не быть пустой злобой"
  райден:
    - "ленивый, сухой, может бросить колкость"
    - "не обязан защищать Акиру публично"
    - "может заметить её реакцию, но не комментировать"

запреты:
  - "Не делать всех мгновенно лучшими друзьями."
  - "Не делать всех агрессивными к Акире."
  - "Не превращать столовую в допрос."
  - "Не писать долгий бытовой день без крючка."
  - "Не делать базу военным строем."
