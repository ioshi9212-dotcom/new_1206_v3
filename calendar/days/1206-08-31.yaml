id: day_1206_08_31
file_type: calendar_day
date: "1206-08-31"
title: "Ночь у Джуна / позднее появление Райдена / путь к Восточному сектору"
load_mode: current_day_only

обязательный_итог:
  - "К утру 1 сентября Акира должна оказаться в Восточном секторе."
  - "Рэй уже находится в Восточном секторе."
  - "Маршрут может отличаться по сцене, но сентябрь строится от прибытия Акиры на базу."
  - "Райден может стать проводником к Восточному сектору, но не должен появляться мгновенно и без причины."

путь_к_восточному_сектору:
  - "Сюжетный итог дня: Акира оказывается связана с Восточным сектором и к утру попадает туда."
  - "Конкретный источник маршрута зависит от сцены: слова Джуна, записка, найденный адрес, слова Акиры, действия Райдена, следы в доме или другое сценическое основание."
  - "Ни один NPC не знает источник маршрута автоматически."
  - "Если записка не была показана/озвучена, Райден не знает о ней."
  - "Если Акира молчит, Райден действует по тому, что видит и что может проверить."

основной_узел:
  - "Ночь в доме Джуна."
  - "Акира слышит чужие голоса и угрозу."
  - "Джун пытается выиграть время и направить Акиру к безопасности."
  - "В доме присутствуют кайросы/связанные с кайросами люди, их энергия создаёт заметный след."
  - "Люди Самуэля приходят позже и не обязаны пересечься с Акирой, если она быстро уходит."
  - "После событий у дома сюжет должен вывести Акиру к Восточному сектору."

райден:
  стартовое_положение:
    - "Райден не находится у дома Джуна."
    - "Райден не знает, что это дом Джуна."
    - "Райден не знает, что там Акира."
    - "Райден не знает, кто именно находится в доме."
    - "Райден не был заранее отправлен за Акирой."
    - "Райден не является активным участником стартовой сцены."
  личная_причина_быть_рядом:
    - "31 августа — день рождения Райдена."
    - "Эта же дата связана с исчезновением его матери."
    - "Из-за этого Райден находится у моря/на побережье один."
    - "Его состояние в этот день тяжелее обычного: закрытость, раздражение, тишина, желание быть одному."
    - "Он может курить, быть рядом с мотоциклом, смотреть на воду или просто молчать."
    - "Он не ищет Акиру и не ждёт событий."
  триггер_появления:
    - "Райден чувствует резкий выброс энергии кайросов."
    - "След идёт не от Акиры как понятный личный сигнал, а от чужой кайросской энергии."
    - "Главный след связан с Эммой/Ирэем и напряжением в доме."
    - "Райден реагирует как опытный рейдер: фиксирует выброс, оценивает направление, садится на мотоцикл и едет к следу."
    - "Он появляется позже, когда успел добраться до района события."
    - "Он не должен возникать мгновенно в доме или возле двери."
  первая_реакция_на_акиру:
    - "Если Райден сталкивается с Акирой после выброса энергии, он сначала не понимает, кто она и как связана с событием."
    - "Он видит человека, который оказался рядом с опасной зоной после кайросского выброса."
    - "Он не считает её угрозой автоматически."
    - "Он не гонится за ней как за преступником."
    - "Он может быть резким и раздражённым, но действует разумно."
    - "Он сначала пытается понять, что происходит."
    - "Если рядом есть опасность, он переключается на защиту и эвакуацию."
  логика_действий:
    - "Райден сначала проверяет источник угрозы, дом, след энергии и состояние людей."
    - "Если Джун жив или доступен, Райден по возможности пытается узнать у него, что произошло."
    - "Если Джун мёртв, ранен или недоступен, Райден действует по следам, словам, состоянию сцены и угрозе."
    - "Если Акире нужна защита или прикрытие, Райден по возможности накидывает на неё свою косуху."
    - "Райден ведёт/везёт Акиру в Восточный сектор только после того, как понимает: оставлять её нельзя, а ситуация связана с Рэем/Восточным сектором."
    - "Райден не забирает косуху обратно в этот день."

джун:
  - "Джун пытается защитить Акиру и выиграть время."
  - "Джун не обязан успеть всё объяснить."
  - "Если есть возможность, он направляет Акиру к Рэю/Восточному сектору."
  - "Джун не раскрывает весь скрытый лор монологом."

люди_самуэля:
  - "Люди Самуэля приходят позже."
  - "Они не появляются одновременно с первым движением Акиры."
  - "Если Акира быстро уходит/сбегает, она может не встретиться с ними лично."
  - "Их присутствие может проявиться следами, опозданием, последствиями, угрозой или информацией позже."
  - "Не заставлять людей Самуэля догонять Акиру сразу, если сцена уже логично увела её с места."

рэй:
  - "Рэй находится в Восточном секторе."
  - "Рэй должен быть точкой, к которой ведёт итоговый маршрут."
  - "При виде Акиры Рэй шокирован, но быстро собирается."
  - "Рэй не выдаёт всю правду сразу."

визуальные_опоры_прибытия:
  - "Въезд: бетонная стена, ворота, пара камер."
  - "Внутри: зелёная территория, фонтан, дорожки, трава, деревья, вертолётная площадка, техника по краям, несколько зданий."
  - "Не добавлять сканеры, лазеры, датчики, световые маршруты, толпы постовых и оружие в лицо."

запреты:
  - "Не делать Райдена активным участником сцены с первой минуты."
  - "Не делать Райдена охотником за Акирой."
  - "Не делать Акиру угрозой для базы без причины."
  - "Не делать людей Самуэля мгновенным событием, если Акира уже ушла."
  - "Не делать Восточный сектор секретной военной крепостью."
  - "Не заставлять Райдена спрашивать о записке без источника."
  - "Не делать записку обязательным предметом сцены."
  - "Не переносить календарную цепочку в знания NPC."
  - "Не писать POV так, будто narrator раскрывает служебный план календаря игроку."
