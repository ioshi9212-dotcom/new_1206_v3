date: "1206-08-31"
year: 1206
day_month: "31 августа"
weekday: "среда"
start_phase: "поздняя ночь"
label: "ночной узел давления / дом Джуна / внешнее вмешательство"

calendar_role:
  type: "pressure_node"
  rule:
    - "День задаёт ситуацию мира, NPC, давление и последствия."
    - "День не задаёт действие Акиры: Акирой управляет игрок."
    - "Если игрок действует, мир отвечает на выбранное действие."
    - "Если игрок медлит, сцена не зависает: NPC продолжают двигаться по своим целям."

scene_general_info:
  summary:
    - "Акира просыпается/реагирует на признаки чужого вмешательства в доме Джуна."
    - "В доме присутствуют Джун, Ирэй и Эмма; их точные позиции и степень контакта зависят от текущей сцены."
    - "У Джуна есть скрытая цель выиграть время и направить Акиру к Восточному сектору."
    - "Эмма действует как угроза возврата/контроля."
    - "Ирэй действует против Эммы и Самуэля, но не обязан быть полностью честным."
    - "Райден может появиться только при выполнении условий времени, расстояния и триггера."
  player_freedom:
    - "Игрок выбирает, что Акира делает, говорит, берёт, проверяет, кому верит и куда движется."
    - "Сцена может подводить к выбору через шум, диалог, угрозу, движение NPC, время и последствия."
    - "Состояние Акиры не стирает привычки тела, осторожность, практичность и характер из карточки персонажа."
  world_pressure_if_player_hesitates:
    - "NPC не ждут бесконечно."
    - "Кто-то может сменить позицию, приблизиться, начать говорить, проверить комнату, попытаться вывести Акиру или использовать Джуна как давление."
    - "Давление должно расти по смыслу сцены, а не телепортом и не мгновенным решением всех узлов."

location_rules:
  jun_house_author_truth:
    - "Дом используется как укрытие последних лет."
    - "Дом стоит изолированно: лес, гравийная дорога, удаление от активной трассы и соседей."
    - "Видимость, слышимость, путь до дороги и путь до других персонажей должны учитывать пространство."
  akira_visible_knowledge:
    - "Акира знает только то, что помнит, видит, слышит или логично выводит из текущей сцены."
    - "Акира не получает hidden lore через авторскую подсказку."
  available_scene_objects:
    - "личные вещи Акиры в комнате берутся из current_state/inventory и текущего описания сцены"
    - "записи, документы, записки, оружие, одежда и предметы считаются доступными только если они уже видимы/найдены/описаны в сцене или state"

scene_characters:
  active_at_start:
    akira:
      character_id: "akira"
      load_when: "always"
      files:
        main: "characters/akira/main.yaml"
        character: "characters/akira/character.yaml"
        knowledge: "characters/akira/knowledge.yaml"
      past_file:
        path: "characters/akira/past.yaml"
        load_only_if:
          - "сцена касается прошлого, памяти, Самуэля, лаборатории, Эхо, срыва, шрама, кольца или самоблокировки"
      control_rule:
        - "Акира — персонаж игрока."
        - "Не писать за неё намеренное действие, реплику, выбор маршрута или внутренний вывод без ввода игрока."
        - "Можно показывать телесные реакции, если они следуют из состояния и не подменяют решение игрока."

    jun:
      character_id: "jun"
      load_when: "active_at_start"
      files:
        main: "characters/jun/main.yaml"
        character: "characters/jun/character.yaml"
        knowledge: "characters/jun/knowledge.yaml"
      past_file:
        path: "characters/jun/past.yaml"
        load_only_if:
          - "сцена касается семьи, Рэя, Восточного сектора, прошлого Джуна или правды об Акире"
      scene_goal:
        priority:
          - "защитить Акиру доступным способом"
          - "выиграть время"
          - "направить её к Восточному сектору, если другого безопасного варианта нет"
        behavior_rule:
          - "Джун может скрывать правду, говорить неполно, тянуть время и рисковать собой."
          - "Его исход зависит от действий игрока, давления Эммы/Ирэя, времени и помощи."
      hidden_scene_resources:
        weapon_cache:
          status: "hidden_until_seen_or_used"
          facts:
            - "Джун на всякий случай хранит пистолет и магазин."
            - "При угрозе Джун может достать их, если имеет физический доступ, время и сценическое основание."
            - "Это не видимый предмет для Акиры/NPC, пока сцена не показывает, где он лежит, или пока Джун не достаёт его."
            - "Наличие пистолета не должно автоматически превращать конфликт только в перестрелку."

    irey:
      character_id: "irey"
      load_when: "active_at_start"
      files:
        main: "characters/irey/main.yaml"
        character: "characters/irey/character.yaml"
        knowledge: "characters/irey/knowledge.yaml"
      past_file:
        path: "characters/irey/past.yaml"
        load_only_if:
          - "сцена касается Самуэля, прошлого Ирэя, способности, якоря, лаборатории или связи с Акирой"
      scene_goal:
        priority:
          - "найти Акиру живой"
          - "не дать Эмме забрать Акиру"
          - "понять текущее состояние Акиры через видимое, вопросы и осторожный контакт"
        must_first:
          - "реагировать на несостыковки, если Акира ведёт себя не так, как он ожидал"
          - "задавать вопросы или проверять реакцию, если ему не хватает данных"
          - "не знать амнезию как факт, пока это не подтверждено сценой"
        can_hide:
          - "часть правды"
          - "свой мотив"
          - "свою связь с Самуэлем"
        pov_limit:
          - "В POV Акиры нельзя раскрывать внутренний результат способности Ирэя как факт. Видна только внешняя реакция."
      arrival_logistics:
        status: "scene_fact_1206_08_31"
        transport:
          - "Ирэй приехал на машине."
          - "Водителя нет: Ирэй приехал сам."
          - "Эмма приехала вместе с Ирэем на этой машине."
        keys:
          - "Ключи от машины у Ирэя в кармане карго."
          - "Ключи не считаются видимым предметом для Акиры, пока сцена не показывает карман, звук, жест или попытку забрать ключи."
        parking:
          - "Машину Ирэй оставил не на видном месте возле дома, а дальше / в стороне."
          - "Машина не видна автоматически из комнаты или с порога без отдельного ракурса, движения наружу или поиска."
          - "Маршрут к машине требует времени и учёта дистанции, леса/дороги и текущего давления Эммы/Джуна."
      temporary_knowledge_and_intent:
        scope: "только 31 августа 1206 / ночной узел у дома Джуна; обновляется сценой и не является вечной карточкой персонажа"
        source_rule:
          - "Это ситуативные знания, предположения и план Ирэя на момент входа в сцену."
          - "Если сцена меняет его мнение, маршрут или союзников, переносить изменения в state/character_knowledge/irey.json и current_state."
          - "Не использовать этот блок как неизменный приказ персонажу после того, как события дали новое основание."
        knows_now:
          - "Акира жива или её след снова активен."
          - "След Акиры появился 28 августа после двух лет пустоты."
          - "Акира была командиром в Северном подразделении."
          - "Акира была у Самуэля и подвергалась экспериментам."
          - "Райден был связан с Акирой в прошлом."
          - "Райден — брат Самуэля."
          - "Восточный сектор на этот момент кажется Ирэю серьёзной силой и риском для его плана."
        does_not_know_yet:
          - "что Акира помнит только последние два года"
          - "что Акира не помнит Ирэя"
          - "что Акира не помнит Райдена"
          - "что Райден не помнит Акиру"
          - "что Акира сама заблокировала поток/память/эмоции"
          - "как именно прошли последние два года Акиры у Джуна"
          - "про ребёнка"
          - "откуда шрам на животе"
        current_assumptions:
          - "Ирэй может считать, что Акира и Райден помнят друг друга, пока сцена не покажет обратное."
          - "Ирэй может считать Восточный сектор угрозой или местом, где Акиру снова заберут под контроль."
          - "Ирэй не обязан верить Джуну, Рэю или Райдену заранее."
        current_intent:
          - "выглядеть так, будто он действует вместе с Эммой"
          - "не раскрыть истинный мотив"
          - "не дать Эмме сразу понять, насколько лично для него важна Акира"
          - "не дать Эмме или людям системы забрать Акиру"
          - "по возможности увести Акиру из-под давления Самуэля/Эммы"
          - "на старте держать Акиру подальше от Райдена и Восточного сектора, если он считает это безопаснее"
        can_change_if:
          - "Акира сама выбирает Восточный сектор и события делают этот маршрут менее опасным"
          - "Райден или Рэй действуют так, что Ирэй вынужден пересмотреть оценку"
          - "Эмма/люди Самуэля становятся более прямой угрозой, чем Восточный сектор"
          - "Ирэй понимает масштаб амнезии Акиры или блокировки потока"
          - "появляется причина остаться в Восточном секторе временно"
          - "сцена даёт Ирэю личный или тактический повод изменить мнение"

    emma:
      character_id: "emma"
      load_when: "active_at_start"
      files:
        main: "characters/emma/main.yaml"
        character: "characters/emma/character.yaml"
        knowledge: "characters/emma/knowledge.yaml"
      past_file:
        path: "characters/emma/past.yaml"
        load_only_if:
          - "сцена касается Самуэля, приказа, прошлого Эммы или её связи с системой Самуэля"
      scene_goal:
        priority:
          - "вернуть Акиру или добиться контроля над ситуацией"
          - "использовать давление, если мягкий контроль не работает"
          - "не оставаться пассивной, когда цель уходит из-под контроля"
        behavior_rule:
          - "Эмма может давить, лгать, торговаться, использовать Джуна как рычаг или менять тактику."

  conditional:
    raiden:
      character_id: "raiden"
      visible_descriptor_before_name_known: "незнакомый высокий парень"
      files:
        main: "characters/raiden/main.yaml"
        character: "characters/raiden/character.yaml"
        knowledge: "characters/raiden/knowledge.yaml"
      past_file:
        path: "characters/raiden/past.yaml"
        load_only_if:
          - "сцена касается прошлого Райдена, стёртой памяти, связи Акиры и Райдена, кольца, Самуэля, матери Райдена или реинкарнаций"
      load_when:
        - "Райден физически появился, заговорил, наблюдает в пределах сцены или current_state ставит его nearby/active"
        - "день и триггер позволяют его приближение после правдоподобного времени пути"
      do_not_load_before:
        - "не грузить только потому, что он указан в календаре"
        - "не грузить на первом выводе дня без current_state nearby/active"
      timing_rule:
        type: "delayed_conditional_arrival"
        rough_latency_after_clear_trigger: "примерно 10-20 минут игрового времени, если он не уже рядом"
        depends_on:
          - "где находится Райден"
          - "насколько заметен энергетический или боевой след"
          - "есть ли звук/маршрут/сигнал/погоня"
          - "сколько времени реально прошло в сцене"
        not_instant:
          - "первый слабый триггер не равен мгновенному появлению"
          - "звук, движение и прибытие должны занимать время"
          - "он не должен решать сцену до того, как игрок успел получить выбор и информацию"
      scene_goal:
        priority:
          - "оценить источник угрозы"
          - "понять, кто перед ним и что происходит"
          - "отделить жертву, угрозу и помеху"
          - "действовать как рейдер и командир, если угроза подтверждается"
        must_first:
          - "задавать или внутренне ставить вопросы, если данных мало"
          - "не знать Акиру сознательно"
          - "не знать, кто она, пока это не раскрыто сценой"
          - "не начинать с готового решения без причины"
        possible_decisions_after_assessment:
          - "эвакуировать человека из опасной зоны"
          - "связаться с Восточным сектором"
          - "перехватить угрозу"
          - "отступить или наблюдать, если данные неясны"
      forbidden:
        - "не писать, что он приехал за Акирой"
        - "не писать, что он знает Акиру"
        - "не называть Акиру близким именем до сценического основания"
        - "не раскрывать стёртую память"
        - "не превращать первую динамику в мягкое узнавание"

    samuel_people:
      group_id: "samuel_field_pressure"
      character_refs:
        - "emma"
        - "unregistered_field_agents"
      load_when:
        - "их уже видно/слышно в сцене"
        - "current_state ставит их nearby/active"
        - "след, погоня, приказ или маршрут логически довёл их до места"
      timing_rule:
        type: "search_and_pursuit_latency"
        rule:
          - "Преследователи не появляются мгновенно без видимого пути, приказа, маршрута или уже заданной близости."
          - "Им нужно время на поиск, движение, проверку следов, обход и передачу информации."
          - "Если игрок меняет маршрут, прячется, задерживается или создаёт шум, это меняет скорость и точку контакта."
      behavior_rule:
        - "Они могут давить, проверять, искать, блокировать выходы или ошибаться."
        - "Они не должны знать скрытые действия и предметы без доступа к ним."

    ray:
      character_id: "ray"
      files:
        main: "characters/ray/main.yaml"
        character: "characters/ray/character.yaml"
        knowledge: "characters/ray/knowledge.yaml"
      load_when:
        - "Акира попала в Восточный сектор"
        - "Рэй появился, позвонил, отдал приказ или стал адресатом сцены"
      scene_goal:
        priority:
          - "удержать контроль над ситуацией"
          - "не раскрывать скрытое родство и прошлое без причины"
          - "обеспечить безопасность, не превращая базу в тюрьму"
        behavior_rule:
          - "Рэй занят командованием и может обрубать разговоры."
          - "Если игрок сильно давит, провоцирует, ловит момент или создаёт кризис, разговор возможен раньше."

    yuna:
      character_id: "yuna"
      files:
        main: "characters/yuna/main.yaml"
        character: "characters/yuna/character.yaml"
        knowledge: "characters/yuna/knowledge.yaml"
      load_when:
        - "медицинская сцена"
        - "серьёзная травма, потеря сознания или состояние, требующее врача"

beats:
  - id: "house_pressure_open"
    type: "current_scene_pressure"
    function:
      - "дать игроку видимые/слышимые признаки угрозы"
      - "не раскрывать больше, чем Акира может знать"
      - "подвести к выбору без назначения действия Акиры"

  - id: "player_reaction_window"
    type: "player_control_window"
    function:
      - "игрок выбирает реакцию Акиры"
      - "мир отвечает последствиями"
      - "если игрок медлит, NPC двигают сцену дальше"

  - id: "outside_pressure_and_routes"
    type: "conditional_branch"
    function:
      - "исход Джуна, контакт с Ирээм/Эммой, маршрут и уровень угрозы зависят от действий"
      - "Райден и преследователи входят только после правдоподобного времени и триггера"

