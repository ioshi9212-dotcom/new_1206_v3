scene_forbidden:
  - "Не писать действие Акиры вместо игрока."
  - "Не превращать календарь в фиксированный маршрут."
  - "Не использовать материалы, которых нет в загруженных файлах и current_state."
  - "Не раскрывать hidden lore через авторское повествование."
  - "Не делать NPC сенсорами скрытых предметов, маршрутов, мотивов или содержания без сценического доступа."
  - "Не делать условное появление персонажа мгновенным, если current_state не ставит его уже рядом."
  - "Не сводить конфликт только к оружию: учитывать энергию, тело, дистанцию, страх, контакт, окружение и переговоры."
