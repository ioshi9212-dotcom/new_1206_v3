calendar_id: "east_sector_1206_calendar"
file_type: "calendar_arc_overview"
version: "clean_story_rules_v1"
status: "active"

core_rule:
  - "Восточный сектор — живая база людей с энергией, а не тюрьма и не северная лаборатория."
  - "Официальность включается по ситуации: приказ, отчёт, закрытые данные, медицинский риск, тревога, рейд."
  - "В быту люди говорят живым человеческим языком."
  - "Не перегружать сцену странными устройствами: техника есть, но она не магическая и не решает всё за персонажей."
  - "Не сводить мир только к огнестрельному оружию: учитывать энергию, тело, дистанцию, контакт, окружение и тактику."

base_tone:
  allowed:
    - "еда, столовая, двор, комнаты, тренировки, шутки, споры, усталость, работа, живые разговоры"
    - "командиры могут быть своими, с ними спорят и их подкалывают в рамках отношений и статуса"
    - "Райден на Восточном секторе — свой командир, не чужой подозреваемый без причины"
  avoid:
    - "стерильный протокол в бытовых сценах"
    - "лабораторный тон без причины"
    - "универсальные сканеры и устройства, которые мгновенно знают всё"
    - "тотальный запрет на любые действия Акиры без текущей причины"

calendar_use:
  - "Этот файл даёт тон базы для календарных дней Восточного сектора."
  - "Подробные события брать из текущего day_file."
  - "Если day_file не содержит сцену с конкретным устройством, не добавлять чудо-технику ради удобства сюжета."
