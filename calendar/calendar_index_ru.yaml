главные_правила_календаря:
  - "Грузить только текущий день или текущее окно."
  - "Будущие day-файлы не грузить заранее."
  - "Прошлые day-файлы использовать только как уже случившиеся последствия."
  - "Игрок управляет Акирой. Календарь задаёт давление мира, NPC и последствия."
  - "Если игрок выбирает бытовое действие сам, сцена должна дать крючок: встречу, разговор, наблюдение, конфликт, слух, состояние тела, следствие или новую информацию."
  - "Если бытовое действие логически необходимо, но не несёт крючка, его нужно пропускать кратко."
  - "Не делать отдельную сцену из каждого приёма еды, сна, душа, переодевания, медосмотра или перехода по коридору."
  - "Медосмотр обычным медиком можно пройти кратко."
  - "Если в сцене Юна — это крючок, характер, наблюдение, подозрение или важная медицинская деталь."
  - "Сон и таймскип должны вести к следующему значимому узлу, а не к пустой бытовой петле."
  - "Восточный сектор живёт сам: люди тренируются, спорят, едят, уходят в рейды, возвращаются, отдыхают."
  - "Не превращать Восточный сектор в обычную военную часть, тюрьму, лабораторию или секретную базу."

правило_знаний_из_календаря:
  - "Календарь и правила сцены являются инструкциями для ИИ, а не знаниями персонажей."
  - "NPC не знают дату, план, будущие события, триггеры и сюжетные узлы только потому, что они написаны в календаре."
  - "POV-повествование не должно раскрывать игроку служебные правила календаря как внутреннюю правду мира."
  - "Персонаж может знать событие только если у него есть источник: личный опыт, документы, приказ, разговор, наблюдение, state или карточка знаний."
  - "Если источника нет, персонаж может только подозревать, ошибаться, строить догадки или реагировать на видимое."
  - "Будущие события календаря не становятся предчувствием, планом или знанием NPC."
  - "Скрытые причины появления NPC не проговариваются в сцене, если персонаж сам не может их знать или объяснить."

правило_источников_маршрута:
  - "Календарь может указывать, что итоговый маршрут ведёт к Восточному сектору, но NPC не знают служебную цепочку календаря."
  - "Записка не является обязательным предметом в руках Акиры."
  - "Акира может взять записку, выкинуть её, потерять, спрятать, не показать или вообще не найти — это зависит от сцены и действий игрока."
  - "Райден не знает о записке автоматически."
  - "Райден не должен спрашивать про записку, если не видел её, не слышал о ней и не получил другой сценический источник."
  - "Рэй не должен знать, что Акира принесла записку, если она её не показала и никто ему об этом не сообщил."
  - "NPC могут действовать только по доступным им признакам: выброс энергии, след, дом, состояние людей, слова Акиры, документы, приказ, наблюдение или уже показанный предмет."

райден_31_августа:
  - "31 августа — день рождения Райдена."
  - "31 августа также связано для Райдена с исчезновением матери."
  - "В этот день Райден находится не на базе и не у дома Джуна."
  - "Он был у моря/на побережье один, из-за личной даты."
  - "Он не знает, что рядом находится дом Джуна."
  - "Он не знает, что в доме Акира."
  - "Он не знает, что там Джун, Ирэй или Эмма."
  - "Причина его движения к месту событий — резкий выброс энергии кайросов."
  - "Основной энергетический след связан с Эммой/Ирэем, а не с Акирой."
  - "Райден чувствует выброс, садится на мотоцикл и едет к следу."
  - "Поэтому он появляется позже, уже после начала события, а не активен рядом с самого старта."

