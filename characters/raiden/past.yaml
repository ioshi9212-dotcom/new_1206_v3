  старые предметы, шрамы и правила раскрытия. Не всё отсюда доступно Райдену в 1206.

access_rules:
  current_conscious_1206: "Райден не помнит Акиру, их отношения, беременность, ребёнка и стирание памяти."
  hidden_lore: "Можно использовать только как фоновые микрореакции, телесные привычки, странное раздражение, пустоту и скрытые триггеры."
