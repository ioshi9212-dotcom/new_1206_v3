  status: visible_if_body_seen
  facts:
    - "на теле есть следы старых ран"
    - "часть шрамов явно не тренировочные"
    - "он не любит, когда на них смотрят слишком долго"
    - "не объясняет их первым"
    - "видимые шрамы не дают Акире автоматического воспоминания"
  source: "скрытые причины шрамов хранить в past.yaml"

