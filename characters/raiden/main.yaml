    Выглядит так, будто подходить к нему без причины — плохая идея.
  body:
    - "195 см"
    - "широкие плечи"
    - "сухая спортивная сила"
    - "движения могут казаться ленивыми, но тело всегда готово"
    - "на теле есть следы старых ран, если сцена показывает открытые участки кожи"
  hair:
    current: "тёмные густые волосы; короткие/средние по текущему образу 1206"
    academy_memory: "в Академии волосы были длиннее и часто собирались в небрежный пучок"
    rule:
      - "Райден помнит, что раньше носил волосы длиннее."
      - "Причину, по которой сменил причёску, не помнит и не придаёт этому особого значения."
      - "Не осветлять волосы."
  eyes: "холодный внимательный взгляд; светло-голубые глаза"
  face: "резкие черты, усталость без слабости, минимум мимики"
  piercings:
    one_ear: "одна серьга"
    other_ear: "четыре серьги"
