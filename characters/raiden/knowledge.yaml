id: raiden
display_name: "Райден"
file_type: character_static_knowledge
version: 1206_raiden_knowledge_clean_v4

purpose: >
  Стартовая база сознательных знаний Райдена на 1206.
  Динамические новые знания сцены хранить отдельно в state/character_knowledge/raiden.json.
  Hidden lore из past.yaml не считать знанием Райдена без сценического источника.

rules:
  - "Этот файл не обновляется через apply-turn-result."
  - "Если Райден узнаёт новое в сцене, писать это в state/character_knowledge/raiden.json."
  - "Скрытое прошлое из past.yaml не становится знанием Райдена без источника в сцене или записи в state."
  - "Знание Академии не даёт ему память об Акире, если Акира вырезана/заблокирована из его памяти."
  - "Не путать Юми Синклер с Юной."

time_boundary_rule:
  - "Событие, после которого Райден не помнит Акиру, произошло примерно 2,5 года назад."
  - "Пустота, риск и часть шрамов относятся к периоду примерно 2,5 года, а не к двум годам."
  - "Два года — срок, который Акира помнит после восстановления/жизни у Джуна, и срок активного поиска Ирэя. Не переносить эти два года на Райдена."
  - "Для Хару отсутствие Акиры длится примерно 2,5 года."

