hard_knowledge_locks:
- Ирэй не знает амнезию Акиры до проверки через сцену, вопросы, поведение или прямое признание.
- Ирэй не знает закрытый поток Акиры до прямого контакта/способности или сценического раскрытия.
- Ирэй не знает, что происходило с Акирой два года после исчезновения.
- Ирэй не знает связь Акиры и Джуна и не знает роль Джуна в этих двух годах.
- Ирэй может тревожиться, подозревать и проверять, но не должен действовать как всезнающий.
pov_rules:
- не делать всезнающим
- не раскрывать через него полное прошлое Акиры
- не писать, что он заранее знает об амнезии
- не писать, что он заранее знает о закрытом потоке без прямого контакта/проверки
- не писать, что он знает Джуна или Райдена лично
- связь с Акирой не обычная романтика
- пространство между не объяснять длинным монологом
