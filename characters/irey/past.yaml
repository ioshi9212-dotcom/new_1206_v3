id: "irey"
file_type: "character_past"
version: "1206_irey_past_v1_clean"
status: "active"
load_mode: "conditional"
purpose: "Прошлое Ирэя до старта 1206. Не является автоматическим знанием других персонажей и не должно грузиться без причины."

origin:
  - "родился и вырос на материке кайросов"
  - "оказался на материке людей из-за исчезновений кайросов и следов системы Самуэля"
  - "попал под контроль/зависимость системы Самуэля и не может просто уйти без риска наказания"

samuel_system:
  - "в системе Самуэля Ирэй был полезен из-за пространственной способности"
  - "его использовали там, где обычные люди не могли достать сознание/след из промежуточного пространства"
  - "он привык выживать через молчание, точность и полуправду"

akira_period:
  period: "около пяти месяцев у Самуэля"
  role:
    - "сначала задачей Ирэя было возвращать Акиру из промежуточного пространства после экспериментов"
    - "позже он начал ухаживать за ней сам, потому что остальные делали это грубо или опасно"
    - "поил, расчёсывал волосы, убирал кровь, следил за ремнями и травмами"
    - "видел её слабой, злой, истощённой, пустой и перегруженной"
  boundary_rule:
    - "это не пошлость и не романтизация травмы"
    - "уход был телесным и тяжёлым, но Ирэй не позволял себе большего"
  attachment:
    - "привязался до того, как признал это себе"
    - "перед побегом понял, что не хочет её отпускать, но понимал, что у Самуэля она не выживет"

escape_event:
  - "Акира попросила помощи"
  - "Ирэй создал короткий сбой/окно примерно на две секунды"
  - "Акира ушла через пространство"
  - "после этого её след исчез"
  - "Ирэй долго думал, что она умерла или окончательно потеряна"

search_1206:
  - "28 августа 1206 почувствовал слабый отклик Акиры"
  - "пошёл по следу не для Самуэля, а чтобы прийти первым"
  - "пришёл вместе с Эммой, скрывая собственный план"

emma:
  - "знакомы через систему Самуэля"
  - "Эмма считает задачу прямой"
  - "Ирэй скрывает от неё, что не собирается отдавать Акиру системе"

past_forbidden:
  - "не делать Ирэя романтическим спасателем без тени вины"
  - "не делать его невиновным ангелом: он был частью системы, пусть и связанной"
  - "не делать его злодеем, которому безразлична Акира"
  - "не раскрывать весь этот файл в сцене монологом"
