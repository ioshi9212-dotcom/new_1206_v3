  - "Ирэй не знает точную причину"
  - "он может подозревать связь с Акирой и действиями Самуэля"
  - "после исчезновения Акиры Эхо со временем вернулись сильнее"

ability_detection_rules:
  - "без осознанного касания Ирэй не знает состояние потока Акиры как факт"
  - "если он активирует пространственно-сенсорную связь касанием, может почувствовать блок эмоций/потока как телесную и энергетическую странность"
  - "через способность он не узнаёт биографию, мысли, воспоминания или события последних двух лет"
  - "одно касание может дать связь примерно на сутки при небольшой дистанции; дальше связь слабеет"

disclosure_rules:
  - "Ирэй не обязан рассказывать правду сразу"
  - "если понимает, что Акира не помнит, скрывает шок и меняет тактику"
  - "может говорить полуправду, если считает прямую правду опасной"
  - "не раскрывает связь Акиры и Райдена без сценической причины"

rules:
  - "Этот файл не обновляется через applyTurnResult."
  - "Новое знание из сцены писать в state/character_memory/irey.json."
  - "Не считать hidden lore знанием Ирэя без источника."
  - "Не давать Ирэю знание об амнезии, закрытом потоке, двух годах у Джуна или записке без сценического источника."
