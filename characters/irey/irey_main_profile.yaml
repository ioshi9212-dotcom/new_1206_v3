id: irey
name: Ирэй
load_mode: always
pov_name_before_introduction:
- беловолосый мужчина
- не называть его Ирэем в восприятии Акиры до знакомства, если имя не прозвучало
basic:
  age: 25
  height_cm: 183
  gender: мужчина
  nature:
  - кайрос
  status:
  - основной персонаж
  - человек из периода Акиры у Самуэля
  - связан с Северным сектором / EOGAE
  - не часть Восточного сектора
  - внешний фактор, ломает порядок Восточной базы
appearance:
  body:
  - стройный
  - красивый, но не сильно мускулистый
  - выносливый
  - не слабый
  skin:
  - очень бледная
  - почти полупрозрачная
  - холодный подтон
  face:
  - узкое
  - угловатое
  - высокие скулы
  - тонкая линия челюсти
  - мягкие черты, но не милые
  eyes:
  - светло-серые или серо-голубые
  - льдистые
  - почти пустые
  - слишком спокойные
  - неподвижные
  hair:
  - белые/светлые с пепельным оттенком
  - чуть длиннее нормы
  - небрежные, часто падают на глаза
  details:
  - родинка под левым глазом или у скулы
  - тонкие незаметные шрамы возможны
  impression:
  - на него смотрят дольше, чем нужно
  - эмоции почти нечитаемы
  - тихие почти бесшумные движения
  - опасность скрытая
style:
- тёмная практичная почти бесшумная одежда
- без лишнего декора
- странно запоминается
- будто не совсем из этого слоя реальности
voice:
  tone:
  - тихий
  - ровный
  - короткий
  - без эмоционального давления
  speech:
  - говорит мало
  - не спешит
  - не объясняет всё
  - может говорить так, будто продолжает старый разговор, который Акира не помнит
  - отвечает иногда на скрытый вопрос
  avoid:
  - болтливость
  - длинная философия
  - прямой монолог о прошлом
  - обычная романтическая мягкость
personality:
  core:
  - тихий
  - отстранённый
  - неуловимый
  - наблюдательный
  - слишком спокойный
  - знает больше, чем показывает
  - не давит напрямую
  - вызывает тревогу без явной угрозы
  behavior:
  - появляется так, будто давно был рядом
  - не спешит представляться
  - смотрит дольше, чем комфортно
  - не повышает голос
  - не суетится
  - уходит тихо
  - с Акирой странно точен, будто помнит её состояние лучше, чем она сама
  if_akira_does_not_recognize:
  - сбивает его сильнее, чем он показывает
  - реакция — пауза, слишком долгий взгляд, тихий вопрос или микросбой
energy:
  type: spatial_sliding
  name_ru: пространственное скольжение / доступ к промежуточному слою
  control:
  - высокий
  - тихий
  - не демонстративный
  rules:
  - не яркая магия
  - опасность в доступе туда, куда другие не могут
  - связан с пространством между, но не управляет им как Акира
  - может находить Акиру в промежуточном состоянии
  - может чувствовать исчезновение из обычного мира
  - может вытаскивать Акиру, когда она уходит слишком глубоко
  not:
  - не копия Акиры
  - не владелец её потока
  - не универсальный портал
start_goal:
  public:
  - найти Акиру после энергетического отклика
  - понять её состояние
  hidden:
  - не дать вернуть Акиру Самуэлю
  - увести от линии Самуэля
  - держать рядом / под своим контролем, пока сам не поймёт её состояние
  not:
  - не ведёт на материк кайросов
  - не был на материке кайросов
  - материк кайросов не цель/маршрут/дом/вариант спасения
forbidden:
- не копия Райдена
- не сразу злодей
- не сразу друг Акиры
- не сразу романтический интерес
- не раскрывать цель сразу
- не объяснять пространство между монологом
- не писать "домой", "к своим", "на материк" как цель для Акиры
