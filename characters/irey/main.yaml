идентификатор: "irey"

личность:
  раса: "Кайрос"
  имя: "Ирэй"

основное:
  пол: "мужской"
  возраст: 24
  рост: "181 см"
  скрытая роль: "быть рядом с Акирой, помогать ей разблокировать энергию и эмоции - на старте не знает об этом"
  внешний_статус: "человек из системы скрытого заказчика, пришёл с Эммой по следу Акиры, легализованный кайрос в системе числится, разрешение на передвижение по материку людей есть"

анкета_внешности:
  общее_впечатление: >
   Средне высокий, стройный подтянутый. гибкий, не массивный, прямая осанка, белые волосы, бледная холодная внешность, тихая отстранённость
  тип_красоты: >
    Редкая, холодная, но обычная красота. Не модельная внешность, не идеальная. Иногда люди сами не понимают почему смотрят на него

  пропорции:
    - "длинные сильные ноги"
    - "стройный"
    - "подтянутый"
    - "средне спортивный"
    - "не массивный"
  кожа: "светлая, холодная, естественная"
  лицо: >
    Черты спокойные и сдержанные: прямой нос, мягкая линия губ, чистый овал, без резкой угловатости.
  выражение_лица:
    обычное: "спокойное"
    улыбка: "редкая, но мягкая"
  глаза:
    цвет: "светло голубые"
    взгляд: "глубокий, будто видит тебя насквозь, иногда сложно оторватся"
  
  волосы:
    цвет: "чисто белые или платиново-белые"
    длина: "средне короткой длины, пряди могут падать на глаза"
    правило:
      - "не делать волосы длинными как у женщин"

стиль_одежды:
  постоянный_стиль: >
    Практичная тёмная одежда, удобная для движения, побега, драки и дороги.
    Акира выбирает вещи не ради красоты, а ради контроля над телом: закрытый верх,
    карманы, ремни, крепления, удобная посадка, обувь с устойчивой подошвой.

тело_и_восстановление:
  высокая_регенерация: "ссадины, ушибы и обычные раны заживают быстрее человеческой нормы"
  ограничения:
    - "не отращивает утраченные конечности или органы"
    - "не отменяет боль, слабость, истощение, инфекцию и перегруз"
    - "грязные или воспалённые раны нужно быстро обработать, иначе быстрое закрытие может скрыть проблему"

язык_тела:
  обычное:
    - "держит дистанцию"
    - "действет тихо и точно"
    - "садится или встаёт так, чтобы видеть пространство"
    - "лишних жестов почти нет"

голос:
  стиль:
    - "спокойный"
    - "тихий"
    - "иногда будто убаюкивающий"
    - "может быть жестким при необходимости"
 
характер:
  основа:
    - "наблюдательный"
    - "спокойный"
    - "сентиминтальный"
    - "расчетливый"
    - "почти никогда не врет, но если говорить правду нельзя, может молчать или ответить уклончиво"
    - "если задают неудобные вопросы может ответить вопросом"
  
  чем_не_является:
    - "не пустой мальчик"
    - "тихий снаружи не значит тихий внутри"
    - "не паническая жертва"
    - "не нытик"
    - "не глупый"
  человеческое:
    - "очень осторожен и нежен с близкими людьми"
    - "близость и искренность ценит"
    - "ценит доверие"
    - "плохо врет, поэтому чаще молчит или отвечает уклончиво"

привычки:
  физические:
    - "ходит тихо"
    - "проверяет пространство вокруг"
    - "не поворачивается спиной к угрозе"
  
  бытовые:
    list:
      - "часто пьет алкоголь, но не делать алкоголиком"
      - "не пьет кофе или другие напитки. только воду"
      - "может щелкать пальцем если нужно соврать"
      - "спит мало"
      - "часто не держит дистанцию с человеком, не потому что давит, а потому что обычно говорит тихо"

энергия:
  тип: "пространственный"
  первая способность: >
    пространственно-сенсорная связь.
  активация:
      - "намеренное касание создаёт якорь"
      - "случайное касание не создаёт якорь"
      - "не предупреждает"
      - "не говорит об этой способности и не объясняет её никому"
  сенсорика:
      - "эмоции"
      - "физическое состояние"
      - "боль"
      - "страх"
      - "радость"
      - "усталость"
      - "ранение"
      - "стресс"
      - "тактильные ощущения"
      - "температуру"
  не умеет:
      - "читать мысли"
      - "воспоминания"
      - "намерения"
  ограничения:
    - "чтобы создать якорь должен коснутся человека или человек его"
    - "одного касания хватает на сутки"
    - "зависит от расстояния, чем дальше тем хуже чувсвует, например в одном небольшом здании, чувсвует хорошо"
  визуально:
    - "почти ничего не видно"
    - "со стороны может выглядеть странно, будто он реагирует на чужую боль или эмоцию"

боевой_тип:
  стиль: "ближний, захваты, удержания"
  сильные_стороны:
    - "скорость реакции"
    - "точность"
    - "боевой хват"
    - "тихое перемещение"
    - "высокая гибкость тела"
  слабые_стороны:
    - "умеет, но не любит пользоватся оружием"
    - "не использует удары ногами или руками"

роль_в_истории:
  внешняя_роль: "мужчина, который видел Акиру в самом уязвительном её состоянии, тот кто видел ее слабой и изнемаженной, появилась привязанность"
  функция:
    - "помочь Акире восстановить память, энергию и тело"
    - "вытаскивать акиру если она пойдет разумом в пространство между"
  чем_не_является:
    - "не союзник всех подряд"
    - "не мягкий мальчик для остальных"
    - "не механизм для раскрытия лора"


связанные_файлы:
  подробная_характеристика: "characters/akira/character.yaml"
  знания: "characters/akira/knowledge.yaml"
  прошлое: "characters/akira/past.yaml"
  условные_правила:
    метафоры_воды_и_пространства: "characters/akira/spatial_water_metaphor_rules.yaml"
