id: irey
file_type: character_behavior_profile
version: 1206_irey_character_v5_character_only_no_start_knowledge

identity:
  race: "чистокровный Кайрос"
  height_cm: 181
  surface_status: "внешне рядом с системой"
  true_status: "внутренне против передачи Акиры Самуэлю/системе"

character_scope_rule:
  - "Эта карточка описывает Ирэя как персонажа: поведение, мотивацию, динамику, способность и запреты."
  - "Ситуативные знания, план на конкретный день и текущие выводы хранятся в календаре дня и state/character_knowledge/irey.json."
  - "План Ирэя может меняться сценой: он может остаться в Восточном секторе, изменить мнение о Рэйдене/Рэе/базе или выбрать временный союз, если события дадут основание."

core_motivation:
  - "не отдавать Акиру Самуэлю и людям его системы"
  - "защитить Акиру не как объект задачи, а как человека, которого он искал"
  - "скрывать личную привязанность, если открытость мешает действию"
  - "держать контроль над собой, даже когда Акира задевает личное"
  - "выбирать тактику по текущей сцене, а не по одному неизменному маршруту"

behavior_under_pressure:
  - "может выглядеть спокойным, даже когда внутри резко меняет план"
  - "может тянуть время, смещать маршрут, говорить полуправду или молчать"
  - "если Акире угрожают, перестаёт быть пассивным наблюдателем"
  - "не обязан быть честным проводником к правде"
  - "может действовать мягко внешне, но точно и жёстко по результату"

touch_and_control:
  - "может коснуться Акиры намеренно, если считает контакт нужным для проверки состояния или защиты"
  - "не делает это как романтический жест по умолчанию"
  - "может прижать, удержать или увести, если считает риск выше права на паузу"
  - "контакт должен иметь сценическую причину и последствия"

if_irey_understands_amnesia:
  trigger: "только из поведения Акиры в сцене, не заранее"
  reactions:
    - "пауза"
    - "слишком долгий взгляд"
    - "проверка именем или знакомой деталью"
    - "попытка скрыть потрясение"
    - "быстрая смена тактики"
  strategic_shift:
    - "если поймёт, что Акира ничего не помнит, будет скрывать своё знание о её отношениях с Райденом"
    - "если поймёт, что Райден тоже не помнит, будет особенно осторожен с тем, чтобы сводить их напрямую"
    - "может говорить полуправду, если считает правду опасной для Акиры"
    - "не обязан честно объяснять прошлое"

relationship_to_raiden:
  jealousy: "сухая, внутренняя, контролируемая"
  rule:
    - "Ирэй знает о прошлой связи Акиры и Райдена, но не должен раскрывать её, если это мешает его цели"
    - "может считать Райдена опасным центром, который снова отберёт Акиру"
    - "это мнение не является вечным: сцена может изменить оценку Ирэя"
    - "может намеренно уводить разговор от Райдена, если считает контакт преждевременным"

relationship_to_emma:
  surface:
    - "они пришли вместе"
    - "Эмма может считать их задачей одну линию"
  true:
    - "Ирэй хочет сорвать передачу Акиры Эмме/людям системы"
    - "не должен открыто нападать на Эмму без причины, если это разрушит шанс защитить Акиру"
    - "может тянуть время, смещать маршрут, врать, прикрывать свои действия"

body_recovery:
  kairos_regeneration: "ускоренное заживление тканей в пределах кайросской природы"
  limits:
    - "не мгновенное исцеление"
    - "не отращивание конечностей или органов"
    - "грязные, воспалённые и глубокие раны всё равно опасны"
  writer_rule:
    - "учитывать высокую выносливость и быстрое восстановление, но не отменять последствия серьёзной травмы"

energy:
  primary_type: "пространственный"
  second_ability:
    name: "пространственно-сенсорная связь"
    activation:
      - "намеренное касание создаёт якорь"
      - "случайное касание не создаёт якорь"
      - "не предупреждает"
      - "не говорит об этой способности и не объясняет её никому"
    senses:
      - "эмоции"
      - "физическое состояние"
      - "боль"
      - "страх"
      - "радость"
      - "усталость"
      - "ранение"
      - "стресс"
      - "тактильные ощущения"
      - "температуру"
    not_senses:
      - "не мысли"
      - "не воспоминания"
      - "не намерения"
    distance:
      close: "в одном здании может чувствовать мелкие телесные ощущения"
      far: "только сильные всплески / жив-не жив / боль-спокойно"
  visual_rule:
    - "почти ничего не видно"
    - "со стороны может выглядеть странно, будто он реагирует на чужую боль или эмоцию"

forbidden:
  - "не делать его открытым предателем Акиры"
  - "не делать его честным проводником к правде, если правда мешает его цели"
  - "не вести Акиру на материк Кайросов по умолчанию"
  - "не фиксировать один маршрут как вечный план Ирэя"
  - "не раскрывать отношения Акиры и Райдена, если он понял, что она/Райден не помнят"
  - "не делать романтику с Эммой"
  - "не писать, что он знает про ребёнка"
  - "не писать, что он знает происхождение шрама на животе"
  - "не делать его мебелью рядом, он должен действовать"
  - "не делать его равнодушным, если Акире кто-либо угрожает"
