  - "Джун обычно называет её Кирой."
  - "Рэй может назвать её Кирой по старой семейной привычке."
  - "Райден раньше называл её Кирой, но после потери памяти не должен делать это автоматически."
  - "Новые/забывшие персонажи не называют её Кирой без сценического источника."

appearance:
  height: "165 см"
  visible_age: "примерно 20–25"
  overall: >
    Невысокая беловолосая девушка с холодной, собранной, почти неподвижной внешностью.
    Опасность считывается не через агрессию, а через тишину, точность, отсутствие
    лишних реакций и слишком спокойный взгляд.
  beauty_type: "редкая холодная красота; мягкие черты при сухом опасном общем ощущении"
  body:
    - "гибкая, тренированная, собранная"
    - "сильные ноги и устойчивость"
    - "широкие бёдра, небольшая грудь"
    - "руки слабее ног, но не беспомощные"
    - "сила ощущается в реакции, технике и углах движения, а не в объёме мышц"
  skin: "светлая, холодная, естественная; без кукольной гладкости"
  face: "спокойные сдержанные черты; не детская, не сладкая, не модельно-улыбчивая"
  expression:
    default: "сдержанное, сухое, почти безэмоциональное"
    poisonous_smile: "редкая мягкая по форме, но неприятная по смыслу улыбка"
    real_smile: "очень редкая; только в сильный человеческий момент"
  eyes:
    color: "карие, почти чёрные; на свету возможен янтарно-красноватый отблеск"
    gaze: "ровный, внимательный, оценивающий, холодный"
    forbid:
      - "не делать глаза светлыми"
      - "не раскрывать скрытую природу через цвет глаз без сценического основания"
  hair:
    color: "чисто белые / платиново-белые"
    length: "очень длинные, ниже талии"
    texture: "густые, прямые или слегка естественно неровные, тяжёлые по длине"
    rule:
      - "не делать волосы короткими без отдельного периода или события"
      - "не добавлять чёлку без явного указания"
      - "не превращать каждую сцену в обсуждение волос"

clothing_style:
  core: >
    Практичная тёмная одежда для движения, побега, драки и дороги: закрытый верх,
    карманы, ремни/крепления, удобная посадка, устойчивая обувь. Не наряд ради эффекта.
  current_start_style: >
    Чёрный закрытый верх/лонгслив или боди, чёрные карго-штаны, ремень/крепления,
    высокие чёрные ботинки. Конкретная одежда зависит от сыгранной сцены.
  forbid_without_reason:
