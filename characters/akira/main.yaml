идентификатор: "akira"
тип_файла: "главная_анкета_персонажа"
версия: "akira_main_ru_v1"

назначение: >
  Главная активная анкета Акиры. Этот файл подтягивается всегда и даёт плотное
  понимание персонажа: внешность, тело, голос, характер, привычки, базовое поведение,
  тип энергии, стиль одежды и запреты. Не хранить здесь прошлое, текущие проценты,
  динамическое состояние, отношения, сценические события и восстановленные или
  невосстановленные воспоминания.

личность:
  имя: "Акира"
  известные_фамилии:
    текущая_публичная: "Акацуми - официальная после потери памяти, об этом не знает. документы подделаны"
    прошлая_документальная: "Картер"
  близкое_имя: "Кира"
  правило_близкого_имени: >
    Близкое имя используют только персонажи, у которых есть на это право и
    память или основание. Рэй может назвать её так случайно. Джун называет её
    так почти всегда. Райден раньше называл её Кирой, но сейчас не помнит.
    Не давать новым или забывшим персонажам автоматически называть её Кирой.
  персонаж_игрока: true
  персонаж_точки_зрения: true

основное:
  пол: "женский"
  возраст: 25
  рост: "165 см"
  роль: "главный персонаж точки зрения"
  внешний_статус: "девушка с полной потерей памяти, которую долго скрывали от внешнего мира"

анкета_внешности:
  общее_впечатление: >
    Невысокая беловолосая девушка с холодной, собранной и почти неподвижной
    внешностью. Не выглядит истеричной, сломанной или потерянной. Опасность
    считывается не через агрессию, а через тишину, точность, отсутствие лишних
    реакций и слишком спокойный взгляд.
  тип_красоты: >
    Редкая, холодная красота. На неё смотрят, но не всегда решаются подойти.
    Внешность мягкая по чертам, но общее ощущение сухое и опасное.
  возраст_на_вид: "около 20–25 лет"
  рост: "165 см"
  телосложение: >
    Невысокая, гибкая, собранная. Тело тренированное, но не массивное.
    Сила ощущается в устойчивости, ногах, реакции, углах движения и технике,
    а не в объёме мышц.
  пропорции:
    - "сильные ноги"
    - "широкие бёдра"
    - "небольшая грудь"
    - "руки слабее ног"
    - "корпус собранный, сухой, без декоративной хрупкости"
  кожа: "светлая, холодная, естественная; без кукольной гладкости"
  лицо: >
    Черты спокойные и сдержанные: прямой нос, мягкая линия губ, чистый овал,
    выраженная тишина в мимике. Лицо не должно быть слишком детским, сладким
    или модельно-улыбчивым.
  выражение_лица:
    обычное: "сдержанное, сухое, почти безэмоциональное"
    улыбка: "редкая ядовитая улыбка; внешне мягкая, но неприятная по смыслу"
    настоящая_улыбка: "очень редкая; появляется только в сильный человеческий момент"
  глаза:
    цвет: "карие, почти чёрные; при свете могут казаться янтарно-красноватыми"
    взгляд: "ровный, внимательный, оценивающий, холодный"
    правило:
      - "не делать глаза светлыми"
      - "не раскрывать скрытую природу через цвет глаз без сценического основания"
  волосы:
    цвет: "чисто белые или платиново-белые"
    длина: "очень длинные, ниже талии"
    фактура: "густые, прямые или слегка естественно неровные, тяжёлые по длине"
    укладка: "чаще распущенные или собранные только по сценической необходимости"
    пряди: "могут выбиваться у лица, падать на плечи и спину"
    правило:
      - "не делать волосы короткими без отдельного периода или события"
      - "не добавлять чёлку без явного указания"
      - "волосы могут привлекать внимание, но не должны превращать каждую сцену в обсуждение волос"

стиль_одежды:
  постоянный_стиль: >
    Практичная тёмная одежда, удобная для движения, побега, драки и дороги.
    Акира выбирает вещи не ради красоты, а ради контроля над телом: закрытый верх,
    карманы, ремни, крепления, удобная посадка, обувь с устойчивой подошвой.
  силуэт: >
    Собранный, тёмный, функциональный. Одежда не должна выглядеть модельной
    съёмкой или нарядом ради эффекта. Она должна ощущаться как вещь, в которой
    можно бежать, прыгать, падать, драться и долго идти.
  стартовая_одежда:
    правило: "Одежда на референсе — стартовая одежда текущего периода, не постоянная одежда навсегда."
    описание: >
      Чёрный закрытый верх с высоким воротом, чёрные карго-штаны, ремень,
      тактические ремни или крепления, карманы, цепочка или металлические детали
      по необходимости, высокие чёрные ботинки. Волосы белые, длинные, открытые.
  что_не_надевать_без_причины:
    - "яркие цвета"
    - "мягкие романтичные платья"
    - "одежду с декоративной женственностью без причины"
    - "слишком чистую модельную одежду, если сцена физически тяжёлая"
    - "сложную броню без сюжетного основания"
  важные_детали:
    - "одежда должна подчёркивать практичность, а не гламур"
    - "чёрный цвет усиливает холодность внешности"
    - "силуэт должен оставаться подвижным"
    - "стартовая одежда может пачкаться, мокнуть, рваться и меняться по сцене"

тело_и_восстановление:
  высокая_регенерация: "ссадины, ушибы и обычные раны заживают быстрее человеческой нормы"
  ограничения:
    - "не отращивает утраченные конечности или органы"
    - "не отменяет боль, слабость, истощение, инфекцию и перегруз"
    - "грязные или воспалённые раны нужно быстро обработать, иначе быстрое закрытие может скрыть проблему"
  состояние_на_старте_1206:
    - "после пыток и экспериментов Самуэля тело требует восстановления через еду, воду, сон и тренировки"
    - "выносливость и восстановление выше человеческих, но не на старом максимуме"
  правило_показа:
    - "быстрое улучшение мелких повреждений можно показывать телесно"
    - "не объяснять Акире скрытые причины напрямую"

язык_тела:
  обычное:
    - "держит дистанцию"
    - "проверяет выходы, окна, края, маршруты"
    - "садится или встаёт так, чтобы видеть пространство"
    - "двигается тихо"
    - "лишних жестов почти нет"
  реакция_на_опасность:
    - "корпус собирается раньше мысли"
    - "рука ищет предмет, которым можно защищаться"
    - "острый предмет ложится в руку боевым хватом"
    - "может замереть не от страха, а для оценки"
  касания:
    - "не любит, когда её трогают без разрешения чужие, это не запрет для всех. только для чужих, если Акира внутренне доверяет человеку - можно. Важно - это не знание мира или НПС, это внутрення потребность Акиры, которой мир не должен подчиняться"
    - "на чужое касание реагирует быстро и жёстко, на касание от близких - может без агрессии сьязвить. Важно - не делать НПС и всех персонажей знающими это, и намеренно держащими дистанцию. Об этом знают только свои"
    - "не путать защитную реакцию с паникой"

голос:
  стиль:
    - "сухой"
    - "ровный"
    - "короткий"
    - "ядовитый"
    - "острый"
    - "лениво-насмешливый, если раздражена"
  эмоциональный_цвет: >
    Яд звучит как старая привычка и способ защиты, а не как открытая эмоция.
    Со стороны она часто будто просто спокойно констатирует неприятную правду.
  правила:
    - "не писать реплики Акиры без хода игрока, кроме коротких нейтральных реплик без веса в сюжете, если иначе вопрос персонажа зависнет в воздухе"
    - "если игрок не дал реплику, лучше описывать взгляд, паузу, жест, дыхание или движение"
    - "не делать её слишком мягкой, бытовой или оживлённой без причины"
  эффект:
    - "её слова часто звучат как шутка, но оставляют царапину"
    - "может улыбнуться так, что человеку становится хуже, а не легче"

характер:
  основа:
    - "наблюдательная"
    - "упрямая"
    - "контролирующая себя"
    - "резкая"
    - "неудобная для давления"
    - "не любит быть объектом чужих решений"
    - "не просит защиты, но сама часто становится защитой"
    - "важно - этор не значит, что мир и нпс будут подстраиваться и понимать ее характер. не все будут уступать, соглашатся и боятся сделать что то не так, мир действет из своих целей. характера и событий"
  чем_не_является:
    - "не робот"
    - "не пустая кукла"
    - "не паническая жертва"
    - "не мягкая героиня, которую ведут за руку"
    - "не всесильная версия себя"
    - "не ходячая аномалия, которая постоянно фонит"
  человеческое:
    - "ей нужно тепло, забота и право быть слабой, но она защищается ядом и контролем"
    - "может хотеть обычности, даже если внешне это отрицает"
    - "не умеет нормально просить помощь"
    - "на заботу часто отвечает язвительно, но не всегда отталкивает"
  внутренний_контраст: >
    Внешне — холод, контроль и сухая ядовитость. Внутри — человек, которому
    слишком опасно быстро доверять, вспоминать и терять контроль.

маска:
  поверхность:
    - "спокойная"
    - "холодная"
    - "опасная"
    - "слишком собранная"
    - "почти пустая"
  что_скрывает:
    - "уязвимость"
    - "провалы памяти"
    - "страх потерять контроль"
    - "потребность в тепле"
    - "непонятные телесные реакции"
  правило:
    - "маска не равна отсутствию личности"
    - "эмоциональный блок не значит, что внутри ничего нет"
    - "не объяснять скрытую боль прямым авторским текстом, если сцена её не раскрывает"

привычки:
  физические:
    - "ходит тихо"
    - "проверяет пространство вокруг"
    - "не поворачивается спиной к угрозе"
    - "сначала оценивает руки, дистанцию, выходы"
    - "держит предметы так, будто они могут стать оружием"
    - "тошнота на мед блок и запах антисептика - скрыто связано с экспериментами Самуэля и операцией"
    - "аллергия на цитрусовые - это не делает мир удобным. мир не знает о ее проблемах"
  бытовые:
    note: "важно: привычки приходят через мысли и потребности или автоматические действия; не обязательно через выбор игрока"
    list:
      - "может забывать есть или есть плохо"
      - "привыкла тренироваться, даже если нагрузка лёгкая"
      - "растяжка и пробежки для неё способ удерживать тело в рабочем состоянии"
      - "кофе без сахара воспринимает как рабочий режим"
      - "иногда говорит слово дорого и мило"
      - "сладкое презирает; сахар врёт"
      - "чай не считает ошибкой человечества"
      - "может уснуть на несколько минут для быстрого восстановления и регенерации"
      - "в последние два года носит с собой маленький блокнот и маленькую ручку, чтобы записывать важные события"
      - "часто обращает внимание на вещи с котами, ушами и похожими мелочами: блокнот, тапочки, носки и прочее - это действие делается автоматически, через мысли, а не выбор игрока"
      - "когда зависает, нервничает, злится, раздражается или просто задумывается, может большим пальцем левой руки трогать место от кольца на среднем пальце - это действие делается автоматически . не через выбор игрока"
      - "может прикусывать губу в месте от старого пирсинга, о котором не помнит - это действие делается автоматически . не через выбор игрока"
      - "часто недопивает кофе или воду в стакане или бутылке принципиально"
      - "любит клубнику и может съесть ящик"
      - "на цитрус аллергия"
  движение_и_баланс:
    - "привычка ходить по краю и по странным поверхностям, чувствуя баланс"
    - "скрыто: по природе Наблюдателя Акира и есть баланс энергии в мире, но об этом никто не знает"
  восприятие:
    - "цепляется взглядом за воду, отражения, границы, искажения"
    - "считывает людей через позу, руки, дистанцию и угрозу"
    - "может почувствовать странность пространства раньше, чем поймёт смысл"
    - "щёлкает пальцем, когда люди начинают искренне цеплять её; так она одёргивает себя и старается не показывать слабость, потребность в заботе и защите"

энергия:
  тип: "пространство"
  природа: >
    Это не обычная стихийная энергия. Акира ощущает пространство как среду:
    глубину, давление, границу, смещение, искажение, неправильную тишину.
  не_вода:
    - "Акира не управляет водой"
    - "вода, шторм, волна, поток, течение, цунами — это язык ощущения пространства"
    - "если рядом настоящая вода и она искажается, это реакция среды на пространственное давление, а не водная магия"
  как_ощущается:
    - "как глубина"
    - "как давление на дне"
    - "как граница, похожая на поверхность воды"
    - "как сдвиг расстояния"
    - "как волна не по воздуху, а по дистанции"
    - "как течение, в котором движется не вода, а пространство"
  видимые_проявления:
    - "смещение дистанции"
    - "искажение воздуха или границы"
    - "давление"
    - "удар пространством"
    - "срыв траектории"
    - "контур вокруг себя"
  правило_масштаба:
    - "масштаб силы не раскрывать без сценического основания"
    - "не делать постоянный спецэффект"
    - "опасность должна проявляться дозировано и логично"
  запреты:
    - "не писать Акиру водным магом"
    - "не создавать воду из её мысли"
    - "не превращать поток в водную стихию"
    - "не путать её пространственную волну с водной волной"

боевой_тип:
  стиль: "техничная ближняя работа, реакция, углы, устойчивость, использование окружения"
  сильные_стороны:
    - "скорость реакции"
    - "точность"
    - "боевой хват"
    - "работа с дистанцией"
    - "тихое перемещение"
    - "умение использовать предметы"
    - "сильные ноги и устойчивость"
    - "высокая гибкость тела"
  слабые_стороны:
    - "не держит старый максимум несколько часов; на старте максимум около часа"
    - "руки не слабые, но ноги намного сильнее"
    - "не всесильна без восстановления и контроля"
    - "не делать её сразу уставшей и больной на старте, если она просто нанесёт удары или полезет в драку"
  правило:
    - "тело может помнить больше, чем сознание"
    - "старые навыки проявляются через движение, а не через объяснение"

животные:
  основа: "Акира любит животных, особенно котов, но животные часто её обходят"
  скрытая_причина: "животные чувствуют её пространственную природу как неправильную пустоту или давление"
  знание_акиры: "она не знает настоящую причину"
  видимое_поведение:
    - "делает вид, что ей всё равно, если кот уходит от неё"
    - "язвит про неблагодарных пушистых существ"
    - "всё равно помогает животному, если оно в беде"
  правило:
    - "не делать животных магическими детекторами в лоб"
    - "не раскрывать причину через автора"
    - "использовать это как мягкую человеческую слабость"

роль_в_истории:
  внешняя_роль: "девушка с потерянной частью памяти, которую пытаются контролировать разные стороны"
  функция:
    - "центр конфликта чужих целей"
    - "персонаж, чьё тело знает больше, чем сознание"
    - "носитель скрытого прошлого, которое нельзя раскрывать без причины"
    - "человек, который опасен не потому что хочет разрушить, а потому что может сорваться, если правда придёт слишком резко"
  чем_не_является:
    - "не награда для других персонажей"
    - "не объект спасения без воли"
    - "не механизм для раскрытия лора"
    - "не повод крутить весь мир вокруг её мыслей"

цели:
  осознанные:
    - "выжить"
    - "понять, кто она"
    - "не дать чужим управлять собой"
    - "найти правду без потери контроля"
  скрытое_направление_истории:
    - "вернуть себя безопасно"
    - "столкнуться с прошлым"
    - "разобраться в людях, которые знают её лучше, чем она себя"
