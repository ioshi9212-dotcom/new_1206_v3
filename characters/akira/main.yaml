id: akira
slug: akira
file_type: character_main_card
version: 1206_akira_main_clean_v1
status: active
load_mode: conditional

card_hint: >
  Акира — главный POV 1206: беловолосая девушка с потерей памяти, сухим голосом,
  опасной собранностью и заблокированным доступом к эмоциям/потоку. Не делать её
  ни беспомощной мебелью, ни всесильной аномалией.

purpose: >
  Паспорт и внешний якорь персонажа. Хранит только стабильные данные: кто она,
  как выглядит, как воспринимается, базовые запреты и ссылки на связанные файлы.
  Не хранить здесь прошлое, отношения, динамический state, проценты, текущие сцены,
  будущие арки, hidden lore и восстановленные/невосстановленные воспоминания.

context_boundary:
  - "Эта карточка не делает Акиру активной в каждой сцене."
  - "Если POV не Акира и Акиры нет в сцене/цели/упоминании, её карточки не грузить."
  - "Скрытая правда из других файлов не становится знанием Акиры или NPC."

identity:
