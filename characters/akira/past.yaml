id: akira_past
file_type: character_hidden_past
version: clean_past_v2

purpose: >
  Скрытое прошлое Акиры. Этот файл не является её текущим знанием.
  Использовать только для поведения NPC, триггеров, последствий, вспышек памяти
  и сценического раскрытия.

global_rules:
  - "Прошлое не раскрывать через мысли Акиры без вспышки памяти."
  - "Прошлое может проявляться через тело, паузы, реакции, страх, притяжение, отвращение, боль."
  - "Каждый блок различает: кто знает, кто не знает, как проявляется, когда можно раскрывать."

hidden_identity:
  truth: "Акира — чистокровный Кайрос."
  akira_current_knowledge: "не знает / не помнит"
  important:
    - "выросла среди людей"
    - "воспринималась как человек"
    - "не имеет бытовой памяти жизни среди Кайросов"
    - "не должна думать о Кайросах как о родной культуре без раскрытия"
  can_manifest_as:
    - "странность пространства"
    - "реакции животных"
    - "неправильная тишина"
    - "страх/настороженность тех, кто знает больше"

early_life_with_jun:
  truth:
    - "Джун воспитал Акиру с рождения"
    - "он скрывал её природу"
    - "он не должен раскрывать всё сразу"
  akira_knows:
    - "Джун был рядом последние годы"
    - "он назвался отцом/опекуном"
    - "он скрывает больше, чем говорит"
  akira_does_not_know:
    - "истинную степень его роли"
    - "всю причину его контроля"
    - "полную связь с её происхождением"
  manifestation:
    - "его забота воспринимается как защита и удержание одновременно"
    - "он может лгать ради безопасности"
    - "Акира может злиться на контроль, даже когда доверяет ему"

school_fire:
  truth:
    - "в прошлом был пожар/срыв другого носителя"
    - "Акира инстинктивно использовала пространственный переход"
    - "она воспринимала это как водопад/поток, но это не вода"
    - "она спасла часть людей, но не всех"
  hidden_effect:
    - "закрытые выходы, жар, дым, чужой срыв могут включать функциональную собранность"
    - "вина может проявляться без полного воспоминания"
  forbidden:
    - "не писать, что она виновата в пожаре"
    - "не раскрывать подробности без вспышки/рассказа/документа"

academy_period:
  truth:
    - "были друзья и важные связи"
    - "были отношения, ошибки, предательства, привязанности"
    - "баскетбол был важной частью её личности"
    - "ядовитая маска усилилась после болезненного социального события"
  current_use:
    - "не тащить этот период в текущую сцену без триггера"
    - "использовать только как источник телесных привычек, речевого яда, реакций и вспышек"
  can_manifest_as:
    - "слишком точное движение с мячом"
    - "старая ядовитая манера"
    - "реакция на волосы/касание/публичное давление"
  forbidden:
    - "не писать готовое воспоминание без основания"
    - "не заставлять Акиру помнить имена/сцены автоматически"

raiden_hidden_past:
  truth:
    - "между Акирой и Райденом было прошлое"
    - "была глубокая личная связь"
    - "Райден потерял память о ней"
