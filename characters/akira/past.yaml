    - "у Акиры — телесная знакомость без объяснения"
  do_not_surface_directly:
    - "он не узнал"
    - "он почувствовал связь"
    - "они любили друг друга"
    - "это память тела"
    - "это стёртая память"
    - "Ирэй понял, что Райден не узнал"

