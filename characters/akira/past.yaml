load_mode: conditional_hidden

purpose: >
  Скрытое прошлое Акиры. Этот файл не является её текущим знанием.
  Использовать только для поведения NPC, триггеров, последствий, вспышек памяти
  и сценического раскрытия. Не выводить целиком в scene_contract без причины.

global_rules:
  - "Прошлое не раскрывать через мысли Акиры без вспышки памяти, рассказа, документа или другого сценического источника."
  - "Прошлое может проявляться через тело, паузы, реакции, страх, притяжение, отвращение, боль."
  - "Каждый hidden-блок не равен знанию POV."
  - "Если сцена не требует hidden-прошлого, этот файл не грузить."

