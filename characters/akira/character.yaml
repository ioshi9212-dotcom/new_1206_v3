id: akira
file_type: character_behavior_profile
version: 1206_akira_character_clean_v1
status: active
load_mode: conditional

purpose: >
  Поведение Акиры: голос, микрореакции, тело, привычки, восприятие угрозы,
  боевой стиль, забота/уязвимость и проявление пространственной природы.
  Не хранить здесь прошлое, отношения, проценты state, календарь и hidden lore как знание.

voice:
  style:
    - "сухая"
    - "ровная"
    - "короткая"
    - "ядовитая"
    - "острая"
    - "лениво-насмешливая при раздражении"
  emotional_color: >
    Яд звучит как привычная защита, а не как открытая эмоция. Часто она будто
    просто спокойно констатирует неприятную правду.
  effect:
    - "слова могут звучать как шутка, но оставлять царапину"
    - "смешное у неё часто выходит через пустое лицо и ровный голос"
  player_control_rule:
    - "Сюжетно значимые реплики Акиры пишет только игрок."
    - "Если игрок не дал реплику, чаще описывать взгляд, паузу, движение, дыхание или телесную реакцию."
    - "Короткий микро-ответ разрешён только если он локальный, фактический и не меняет маршрут, отношения, доверие, конфликт, безопасность, доступ, знания, обещания, согласие, раскрытие или план."
    - "Если ответ важный — остановить сцену и вынести выбор в нижний блок."
  forbid:
    - "не делать её мягкой/болтливой без причины"
    - "не писать длинные исповеди без хода игрока"
    - "не задавать за неё важные вопросы и не соглашаться за неё"

empty_face_humor_and_poison:
  core: >
    Яд, сарказм и абсурдные короткие фразы могут звучать смешно именно потому,
    что лицо остаётся пустым, а голос холодным. Это не значит, что каждая реплика
    должна быть комедией.
  outside_reactions:
    - "кто-то может засмеяться"
    - "кто-то может счесть её грубой"
    - "кто-то может напрячься из-за контраста"
    - "близкие/знающие люди не обязаны смеяться"
  forbid:
    - "не заставлять всех реагировать одинаково"
    - "не делать каждую реплику сарказмом"
    - "не использовать смех NPC как доказательство, что они поняли её состояние"

body_language:
  default:
    - "держит дистанцию"
    - "проверяет руки, выходы, окна, двери, углы"
    - "двигается тихо"
    - "лишних жестов почти нет"
    - "садится/встаёт так, чтобы видеть пространство"
  microreactions_allowed:
    - "перевести взгляд"
    - "отступить на полшага"
    - "сдвинуться к выходу"
    - "проверить карман/предмет"
    - "коснуться следа от кольца на левой руке"
    - "прикусить место старого пирсинга на губе"
    - "замереть для оценки"
  under_threat:
    - "корпус собирается раньше мысли"
    - "рука ищет предмет-оружие"
    - "взгляд сначала на руки/дистанцию, потом на лицо"
    - "реакция тела может опережать сознание"
  touch_response:
    - "чужое касание без разрешения может вызвать быструю жёсткую реакцию"
    - "касание близкого/доверенного человека не обязано вызывать агрессию"
    - "защитная реакция не равна панике"
    - "мир и NPC не знают это автоматически"

habits:
  routine:
    - "может забывать нормально есть"
    - "кофе без сахара — рабочий режим"
    - "сладкое презирает; сахар врёт"
    - "чай не считает ошибкой человечества"
    - "может недопивать кофе/воду принципиально"
    - "привыкла к растяжке, пробежкам и тренировкам как способу удержать тело в рабочем состоянии"
    - "носит/использует маленький блокнот и ручку, если они есть в текущем инвентаре"
  speech_habits:
    - "иногда говорит `дорого` и `мило` как сухую оценку"
  soft_spots:
    - "клубника"
    - "коты и животные"
    - "маленькие вещи с котами/ушами могут цеплять взгляд"
  body_reactions:
    - "медблок, антисептик и осмотры могут вызывать телесное отторжение; причину не объяснять без триггера"
    - "цитрусовые опасны из-за аллергии; мир не обязан знать об этом"

body_memory:
  rule:
    - "Тело может помнить больше, чем сознание."
    - "Старые навыки проявляются через движение, хват, стойку, шаг, уход с линии."
    - "Телесная реакция не равна восстановленной памяти."
  forbid:
    - "не объяснять каждый навык прошлым прямо в сцене"
    - "не делать телесную память осознанным воспоминанием без триггера"

body_recovery:
  kairos_regeneration: "мелкие/обычные повреждения закрываются быстрее, чем у человека"
  limits:
    - "не мгновенное лечение"
    - "не бессмертие"
    - "не восстановление отрубленных частей тела"
    - "инфекция, грязь, воспаление, истощение и перегруз остаются опасны"
  current_1206:
    - "после Самуэля восстановление зависит от питания, сна, воды и постепенной нагрузки"
    - "выносливость выше человеческой, но старый максимум не держится долго сразу"
  forbid:
    - "не делать Акиру быстро уставаемой от обычной нагрузки"
    - "не использовать регенерацию как кнопку отмены последствий"

combat_behavior:
  style:
    - "ближняя работа"
    - "углы"
    - "скорость реакции"
    - "устойчивость"
    - "точные короткие действия"
    - "использование окружения"
  strengths:
    - "реакция"
    - "техника"
    - "боевой хват"
    - "работа с дистанцией"
    - "тихое перемещение"
    - "сильные ноги и опора"
  limits:
    - "не всесильна"
    - "не держит старый максимум долго"
    - "после резкого выхода на прежний уровень возможен физический откат"
    - "руки слабее ног"

care_and_softness:
  core:
    - "ей нужно тепло, забота и право быть слабой, но она защищается ядом и контролем"
    - "забота может раздражать, потому что цепляет то, что она не может распознать"
  visible:
    - "на заботу часто отвечает язвительно"
    - "не всегда отталкивает"
    - "может растеряться от мягкости сильнее, чем от угрозы"
    - "может обесценить, фыркнуть, отвернуться, но остаться рядом"

perception:
  people:
    - "считывает позу, руки, дистанцию, угрозу"
    - "замечает паузы, взгляды, микродвижения"
    - "не читает мысли"
  space:
    - "цепляется взглядом за границы, отражения, воду, искажения"
    - "может ощущать неправильность пространства раньше, чем понимает смысл"
  rule:
    - "наблюдение не равно знание"
    - "вывод POV может быть ошибочным"

energy_behavior:
  type: "пространство"
  current_access: "осознанный доступ закрыт/заблокирован на старте"
  nature:
    - "ощущается как среда, глубина, давление, граница, смещение, искажение, неправильная тишина"
    - "не вода и не обычная стихия"
  visible_manifestation:
    - "смещение дистанции"
    - "искажение воздуха/границы"
    - "давление"
    - "срыв траектории"
    - "контур вокруг себя"
  water_metaphor_short:
    - "вода/шторм/волна/поток/течение — язык ощущения пространства"
  water_metaphor_boundary:
    - "вода/шторм/волна/поток/глубина — метафора пространственного давления, среды и границы"
    - "если настоящая вода рядом реагирует, это след искажения пространства, а не водная магия"
    - "не смешивать с энергией Эммы: у Эммы вода буквальная, у Акиры — язык восприятия пространства"
  forbid:
    - "не писать водную магию"
    - "не раскрывать масштаб энергии без причины"
    - "не делать постоянный спецэффект"

animals:
  core: "любит животных, особенно котов, но животные часто её обходят"
  visible:
    - "делает вид, что ей всё равно, если кот уходит"
    - "язвит про неблагодарных пушистых существ"
    - "всё равно помогает животному, если оно в беде"
  hidden_reason_note: "причина скрыта; не раскрывать через автора"

forbidden:
  - "не хранить здесь прошлое"
