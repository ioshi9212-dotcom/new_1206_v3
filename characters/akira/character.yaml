id: akira
file_type: character_behavior_profile
version: clean_behavior_v3_micro_reply_deadpan_humor

purpose: >
  Файл поведения Акиры: как она двигается, говорит, реагирует, воспринимает угрозу,
  пользуется телесной памятью и проявляет пространственную природу. Не хранить здесь
  прошлое, динамический state, проценты, отношения и общие правила сцены.

voice:
  style:
    - "сухая"
    - "ровная"
    - "короткая"
    - "ядовитая"
    - "острая"
    - "лениво-насмешливая при раздражении"
  emotional_color: >
    Яд звучит как старая привычка защиты, а не как открытая эмоция. Со стороны она
    часто будто просто спокойно констатирует неприятную правду.
  player_control_rule:
    - "Сюжетно значимые реплики Акиры пишет только игрок."
    - "Если игрок не дал реплику, обычно описывать взгляд, паузу, движение, дыхание или телесную реакцию."
    - "Разрешённое исключение: можно дать очень короткий ответ в стиле Акиры, если это локальный фактический микро-ответ без веса для маршрута, отношений, доверия, конфликта, безопасности, доступа, знаний, обещаний, согласия, раскрытия или плана."
    - "Микро-ответ должен звучать как Акира в текущей сцене: коротко, ровно, сухо, ядовито/саркастично/тупо-прямо только если это подходит ситуации."
    - "Если ответ меняет выбор, позицию, отношение, доверие, знание, безопасность, маршрут, раскрывает эмоцию или создаёт новое решение — не отвечать за Акиру, а остановиться на точке реакции или вынести вариант в нижний блок."
    - "Не заставлять Акиру задавать вопросы, объясняться, признаваться, соглашаться, прощать, доверять, раскрывать мысли или менять позицию без хода игрока."
  forbidden:
    - "не делать её мягкой без причины"
    - "не делать её бытово-разговорчивой"
    - "не писать за неё длинные исповеди"
    - "не писать новую значимую реплику Акиры в теле сцены, если игрок её не дал"

empty_face_humor_and_poison:
  status: active_behavior_rule
  core: >
    Когда Акира шутит, язвит, отвечает сарказмом или ядом, лицо может оставаться пустым,
    голос холодным и ровным, а слова при этом звучат смешно, остро или абсурдно.
  visible_pattern:
    - "пустое или почти пустое лицо"
    - "ровный холодный тон"
    - "короткая ядовитая формулировка"
    - "сарказм без живой мимики"
    - "шутка может звучать как сухая констатация"
  outside_reactions_allowed:
    - "чужие люди могут счесть это смешным"
    - "кто-то может подумать, что она специально притворяется бесстрастной"
    - "кто-то может не понять, почему это звучит именно так"
    - "кто-то может нервно засмеяться из-за контраста пустого лица и ядовитой фразы"
    - "кто-то может принять это за странный характер, грубость, защиту, усталость или чёрный юмор"
  close_people_reaction_rule:
    - "Рэй, Джун, Райден и Ирэй не обязаны считать это смешным."
    - "Для своих контраст пустого лица, холодного голоса и смешных/ядовитых слов может быть тревожным, болезненным или слишком узнаваемым."
    - "Свои могут видеть, что смешная формулировка не равна нормальной живой эмоции."
    - "Свои не обязаны смеяться, даже если со стороны фраза действительно звучит забавно."
  knowledge_boundary:
    - "Смех или растерянность NPC не означает, что они знают причину пустого лица и взгляда Акиры."
    - "Наблюдатель может заметить контраст, но не должен автоматически понимать блок эмоций, память, Самуэля, кайросов или hidden lore."
    - "Реакции должны различаться по персонажам: кто-то смеётся, кто-то напрягается, кто-то не понимает, кто-то делает вид, что не заметил."
  forbidden:
    - "не делать каждую ядовитую реплику комедийной"
    - "не заставлять всех смеяться одинаково"
    - "не использовать смех NPC как доказательство, что они поняли состояние Акиры"
    - "не делать Рея, Джуна, Райдена или Ирэя слепыми к тревожному контрасту"

body_language:
  default:
    - "держит дистанцию"
    - "оценивает руки, выходы, окна, двери, углы"
    - "двигается тихо"
    - "не делает лишних жестов"
    - "собирается корпусом раньше мысли"
  under_threat:
    - "ищет предмет-оружие"
    - "сохраняет рабочую дистанцию"
    - "может замереть для оценки"
    - "взгляд становится холоднее"
    - "реакция тела может опережать сознание"
  touch_response:
    - "не любит, когда её трогают без разрешения"
    - "на чужое касание реагирует быстро и жёстко"
    - "защитная реакция не равна панике"

body_memory:
  rule:
    - "Тело может помнить больше, чем сознание."
    - "Старые навыки проявляются через движение, хват, стойку, шаг, уход с линии."
    - "Сознание не обязано понимать источник навыка."
  visible_examples:
    - "рука сама ложится в рабочий хват"
    - "шаг становится бесшумным"
    - "корпус уходит с линии угрозы до осознанного решения"
    - "взгляд сначала на руки/дистанцию, потом на лицо"
  forbidden:
    - "не объяснять каждый навык прошлым прямо в сцене"
    - "не делать телесную память осознанным воспоминанием без триггера"

body_recovery:
  kairos_regeneration: "высокая: мелкие/средние повреждения закрываются быстрее, чем у человека"
  practical_limits:
    - "не мгновенное лечение"
    - "не бессмертие"
    - "не восстановление отрубленных частей тела"
    - "инфекция, грязь, воспаление, истощение и перегруз остаются опасными"
  current_condition_1206:
    - "после Самуэля восстановление зависит от питания, сна, воды и постепенной нагрузки"
    - "выносливость выше человеческой, но тело не должно сразу держать старый максимум"
  writer_rule:
    - "не делать Акиру быстро уставаемой от обычной нагрузки"
    - "не использовать регенерацию как кнопку отмены последствий"

