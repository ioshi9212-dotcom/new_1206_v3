id: akira_spatial_water_metaphor_rules
file_type: conditional_character_rule
version: clean_trigger_v2

load_condition:
  type: "trigger_words"
  use_when_scene_contains:
    - "вода"
    - "море"
    - "океан"
    - "шторм"
    - "цунами"
    - "волна"
    - "поток"
    - "течение"
    - "глубина"
    - "дно"
    - "бездна"
    - "граница"
    - "искажение"
    - "давление"

core_rule:
  - "Акира не управляет водой."
  - "Водные слова — это язык ощущения пространства."
  - "Шторм/волна/цунами/поток/течение описывают внутренний подъём пространственного давления, а не водную стихию."
  - "Если рядом настоящая вода реагирует, это среда искажается от пространства, а не Акира управляет водой."

space_as_water_language:
  water: "ощущение среды"
  depth: "пространственная глубина"
  pressure: "сжатие/давление пространства"
  boundary: "граница, похожая на поверхность"
  wave: "импульс по дистанции"
  flow: "движение внутреннего фона/направления силы"
  storm: "рост напряжения и потери контроля"
  tsunami: "резкий опасный подъём пространственного давления"

manifestation:
  low:
    - "взгляд цепляется за поверхность"
    - "кажется, что граница дрогнула"
    - "звук на миг становится глубже"
  medium:
    - "давление под кожей"
    - "воздух кажется плотнее"
    - "дистанция ощущается неправильной"
  high:
    - "пространственный удар"
    - "срыв траектории"
    - "искажение границы"
    - "ощущение волны без воды"

emma_distinction:
  - "У Эммы вода/влажность/жидкостное давление могут быть буквальными."
  - "У Акиры вода почти всегда метафора пространства."
  - "Не смешивать энергию Эммы и язык восприятия Акиры."

forbidden:
  - "не писать Акиру водным магом"
  - "не давать ей управление водой"
  - "не создавать воду из её мысли"
  - "не превращать поток в водную стихию"
  - "не путать пространственную волну с водной волной"
