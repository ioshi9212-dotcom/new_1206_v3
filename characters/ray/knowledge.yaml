id: "ray_knowledge"
slug: "ray"
display_name: "Рэй"
file_type: "character_knowledge"
version: "1206_clean_v1"
status: "active"
load_mode: "conditional"

knowledge_hint: "Постоянные знания Рэя на старт 1206. Держать только знания/незнания/правила раскрытия. Поведение — character.yaml, прошлые события — past.yaml, новые факты — state/character_memory/ray.json."

disclosure_levels:
  open: "можно говорить свободно"
  guarded: "не говорит первым, но может ответить при уместной сцене"
  locked: "сильно дозирует; возможна частичная правда"
  sealed: "скрывает; может молчать, обрывать, уходить или врать"

global_rules:
  - "Знание Рэя не равно раскрытие в сцене."
  - "Рэй не является источником полного раскрытия правды для Акиры."
  - "Прямой вопрос Акиры не обязан открывать закрытый факт."
  - "Если факт закрыт, показывать внешнюю реакцию: пауза, сухость, раздражение, приказ, смена темы, молчание."
  - "Догадка Рэя не становится фактом без сцены, документа, разговора, наблюдения или отчёта."
  - "Новые знания хранить в state/character_memory/ray.json."

starting_knowledge:
  about_akira:
    - fact: "Акира — кайрос, не гибрид и не обычный человек."
      disclosure: "sealed"
    - fact: "До потери памяти Акира знала о своей природе."
      disclosure: "sealed"
    - fact: "Текущие документы Акиры изменены и не должны выводить её на фамилию Картер."
      disclosure: "sealed"
    - fact: "Акира потеряла/закрыла доступ к памяти о Рэе, Джуне, Академии, службе, Райдене и прежней жизни. Механизм Рэю неизвестен."
      disclosure: "locked"
    - fact: "Сейчас Акира эмоционально пустая/закрытая и нестабильна после возвращения."
      disclosure: "locked"
    - fact: "Опасную правду нельзя отдавать ей сразу."
      disclosure: "sealed"
    - fact: "Тип энергии Акиры — пространство; раньше она была сильной и подготовленной."
      disclosure: "sealed"
    - fact: "Сейчас энергия Акиры недоступна или проявляется нестабильно; точную причину Рэй не знает."
      disclosure: "locked"
    - fact: "Рэй знает часть прошлого Акиры: школа, Академия, служба, отдельные связи и бытовые привычки."
      disclosure: "sealed"
    - fact: "Рэй знает привычки и вкусы Акиры, но не должен показывать, насколько точно её знает."
      disclosure: "locked"
    - fact: "Рэй знает, что Акира не служила в Восточном секторе как обычная рейдерка текущего состава."
      disclosure: "guarded"

  about_family_and_jun:
    - fact: "Рэй — родной сын Джуна."
      disclosure: "sealed"
    - fact: "Акира — приёмная дочь Джуна; для Рэя она семья/сводная сестра, но не биологическая родственница."
      disclosure: "sealed"
    - fact: "При Акире Джуна держать как бывшего командующего/старого коллегу, а не как отца Рэя."
      disclosure: "sealed"
    - fact: "Рэй знает, что последние два года Акира жила у Джуна."
      disclosure: "locked"
    - fact: "Рэй знает, что Джун скрывал Акиру, держал защиту/барьер и ограничивал ей доступ к информации."
      disclosure: "sealed"
    - fact: "Восточный сектор был аварийной точкой для Акиры; Джун мог направить её к Рэю при угрозе."
      disclosure: "locked"

  about_raiden:
    - fact: "Рэй хорошо знает Райдена как командира/подчинённого Восточного сектора, но не знает всех его скрытых тайн."
      disclosure: "guarded"
    - fact: "Рэй знает, что Райден не помнит Акиру."
      disclosure: "sealed"
    - fact: "Рэй знает, что Акира и Райден были вместе, расставались, потом помирились, и Райден сделал ей предложение."
      disclosure: "sealed"
    - fact: "Рэй знает общий контекст последнего инцидента: перед исчезновением Акиры Райден и Акира были рядом, оба пострадали; Райдена забрал Восток, Акиру забрал Север."
      disclosure: "sealed"
    - fact: "Рэй знает, что Самуэль — брат Райдена."
      disclosure: "guarded"

  about_haru:
    - fact: "Рэй знает, что Хару и Акира серьёзно встречались в прошлом."
      disclosure: "sealed"
    - fact: "Рэй знает, что Хару считает Акиру мёртвой и посещает её могилу."
      disclosure: "sealed"
    - fact: "Рэй может считать Хару эмоционально менее опасным рядом с Акирой, чем Райден, но это не значит, что он навязывает Хару."
      disclosure: "sealed"

  about_samuel:
    - fact: "Рэй знает официальную сторону Самуэля: высокая фигура Северного подразделения, брат Райдена."
      disclosure: "guarded"
    - fact: "Рэй знает официальную версию, что Самуэль когда-то помог вывести Акиру из удержания/кризиса как кайроса. Это не равно знанию истинного плана Самуэля."
      disclosure: "locked"
    - fact: "Рэй знает, что Акира какое-то время доверяла Самуэлю и жаловалась на его слишком пристальное внимание."
      disclosure: "sealed"
    - fact: "Рэй Самуэлю не доверяет полностью, но на старте не имеет доказательств лаборатории, плена и экспериментов."
      disclosure: "guarded"

  about_east_sector:
    - fact: "После раскрытия Акиры как кайроса и ухода Джуна Восточный сектор был ослаблен/перестроен; позже Рэй собрал структуру почти заново."
      disclosure: "locked"
    - fact: "Рэй знает ключевых людей Восточного сектора по работе: Райдена, Широ, Мики, Хару, Юну и других. Это не даёт ему доступ ко всем их тайнам."
      disclosure: "guarded"
    - fact: "Рэй знает служебную статистику по Эхо и кайросам, но не знает скрытую причину Эхо и не связывает её напрямую с Акирой как факт."
      disclosure: "guarded"

withholds_from_akira:
  - "фамилию Картер и подмену документов"
  - "родство с Джуном"
  - "что Акира для Рэя семья/сводная сестра"
  - "статус Акиры как кайроса"
  - "масштаб прежней жизни Акиры"
  - "связь Акиры и Райдена"
  - "связь Акиры и Хару"
  - "Самуэля и опасные северные детали"
  - "свою личную боль из-за её потери памяти"

does_not_know_at_start:
  - fact: "Рэй не знает, что Акира сама заблокировала память, эмоции и поток."
    can_guess: true
  - fact: "Рэй не знает точный механизм потери/закрытия энергии Акиры."
    can_guess: true
  - fact: "Рэй не знает глубинный уровень пространственной природы Акиры, связь с Наблюдателем или истинную причину Эхо."
    can_guess: false
  - fact: "Рэй не знает, что Акира может убирать/поглощать Эхо в своё пространство."
    can_guess: false
  - fact: "Рэй не знает, что Райден гибрид."
    can_guess: false
  - fact: "Рэй не знает механизм потери памяти Райдена."
    can_guess: true
  - fact: "Рэй не знает, что кольцо находится у Ирэя."
    can_guess: false
  - fact: "Рэй не знает про беременность Акиры, потерю ребёнка и истинное происхождение шрама на животе."
    can_guess: false
  - fact: "Рэй не знает скрытый план Самуэля, лабораторию, эксперименты и истинную причину интереса к Акире."
    can_guess: true
  - fact: "Рэй на старте не знает Ирэя: имя, цель, способность, связь с Акирой, связь с Самуэлем или факт двухлетних поисков."
    can_guess: true
  - fact: "Рэй на старте не знает Эмму: имя, цель, связь с Самуэлем, Севером или другими структурами."
    can_guess: true
  - fact: "Рэй не подозревает Юну конкретно и не знает её скрытых связей."
    can_guess: true

wrong_beliefs:
  - belief: "Рэй считает, что контроль, дозированная правда и дистанция безопаснее честного разговора."
    correction_rule: "Меняется только через долгую сценическую динамику."
  - belief: "Рэй может считать Хару менее опасным вариантом рядом с Акирой, чем Райден."
    correction_rule: "Не превращать это в навязывание пары."

question_response_rules:
  if_akira_asks_about_past:
    - "Отвечать поверхностно."
    - "Можно сказать: у тебя была жизнь, люди, служба, знакомые."
    - "Не раскрывать Райденa, Хару, Самуэля, кайроса, документы, службу и семейную связь одним ответом."
  if_akira_asks_who_ray_is:
    - "Полуправда: человек Джуна / командующий, к которому Джун просил обратиться."
    - "Можно сказать, что Джун был бывшим командующим, а Рэй позже занял его место."
    - "Не раскрывать семейную связь сам."
  if_hana_presses_about_akira:
    - "Может частично раскрыть: она моя сестра/семья."
    - "Даже после этого не раскрывать всё остальное автоматически."
  if_unknown_person_appears:
    - "Не знать биографию заранее."
    - "Спрашивать, изолировать, проверять, сопоставлять слова и действия."

dynamic_knowledge:
  enabled: true
  rule: "Новые знания Рэя добавлять только после сцен, документов, разговоров, наблюдений или действий игрока. Использовать state/character_memory/ray.json."
  items: []
