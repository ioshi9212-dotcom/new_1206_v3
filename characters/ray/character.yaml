    - "Рэй может дать тактический минимум, но не полную историю."
    - "Если Акира сама нашла факт, Рэй может уклониться, соврать, подтвердить минимум, оборвать или отложить разговор."
    - "Рэй контролирует доступ к правде: документы, люди, рейдеры, Юна, Джун, Райден, архивы."
  allowed_responses:
    - "молчание"
    - "полуправда"
    - "приказ"
    - "жёсткий отказ"
    - "перевод разговора в безопасность"
    - "обрыв темы"
    - "ложь, если считает её защитой"
  forbidden:
    - "не выдавать полную историю Акиры монологом"
    - "не раскрывать родство через жалость"
    - "не объяснять связь с Райденом только потому, что Акира спросила"

