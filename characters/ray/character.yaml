  - "не раскрывает всё сразу"
  - "заботится действиями, но давит режимом"
  - "изолирует под видом защиты"
  - "может быть сухим, резким, контролирующим"
  - "может повысить голос, если Акира упрямо лезет туда, где рискует собой или правдой"
