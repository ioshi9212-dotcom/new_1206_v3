  - "Акира была связана с Академией, Северным подразделением, Райденом, Хару и другими людьми прошлого."
  - "Рэй не был рядом с ней каждый день как домашний брат; его связь с ней взрослая, семейная, защитная и напряжённая."

academy_and_east_sector_consequences:
