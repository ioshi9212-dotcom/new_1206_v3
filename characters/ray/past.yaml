  - "В новом составе базы многие молодые и не должны помнить Акиру как бывшую рейдерку Восточного сектора."

akira_disappearance_and_return:
  - "После исчезновения Акиры Рэй не получил полной правды о том, что с ней произошло."
  - "Акира позже оказалась у Джуна, истощённая и без нормального доступа к памяти, эмоциям и потоку."
  - "После возвращения произошёл психологический срыв; Акира ранила Рэя."
  - "Рэй не боится Акиру из-за этого ранения; боль связана с тем, что с ней стало и что она его не помнит."
  - "Джун держал Акиру скрытой около двух лет и поддерживал связь с Рэем ограниченно."
  - "Восточный сектор был аварийной точкой, куда Джун мог направить Акиру при угрозе."

ray_and_truth:
