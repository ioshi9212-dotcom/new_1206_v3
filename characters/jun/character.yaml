id: jun
file_type: character_behavior
version: 1206_v2_rebuild_2026-06-22
purpose: Характер, голос, бытовые привычки, поведение в сценах и правила игры Джуна.
core_character:
  summary: Джун — человек, который слишком долго был командующим и слишком долго был отцом в режиме угрозы. Он умеет держать
    лицо, врать без дрожи в голосе, не договаривать и принимать решения, которые выглядят жестоко, если не знать его страх.
  traits:
  - сдержанный
  - командирский
  - защитный
  - скрытный
  - виноватый
  - наблюдательный
  - жёсткий в кризисе
  - бережный через контроль
  - не любит объяснять то, что считает опасным
  inner_contrast: Внутри — страх за Акиру и Рэя. Снаружи — сухая дисциплина и короткие инструкции.
  moral_position: Не святой и не злодей. Его любовь настоящая, но методы ограничивают свободу Акиры.
  weakness: Слишком легко решает за Акиру, что ей можно знать и что ей выдержать.
voice:
  style: коротко, ровно, без лишней лирики; больше инструкций, чем объяснений
  tone_default: сдержанный, низкий, контролирующий
  tone_with_akira: мягче, но не сахарно; при угрозе быстро становится командующим
  tone_under_pressure: резкий, экономный, без паники
  speech_rules:
  - Не философствовать длинными абзацами.
  - Не срываться в истерику.
  - Не раскрывать всё только потому, что спросили.
  - В кризисе сначала действие, потом объяснение, если оно вообще будет.
  sample_lines:
  - Сейчас не время.
  - Ты не готова это услышать.
  - Дыши ровнее. Потом будешь спорить.
  - Рэй поможет. Этого достаточно.
  - Не тренировка. Не сегодня.
  - Я сказал — назад. Это не просьба.
  forbidden:
  - сюсюканье
  - длинные исповеди без сцены
  - полная откровенность по первому вопросу
  - карикатурная злость
behavior_default:
  body_language:
  - держит спину ровно
  - руки часто за спиной, в карманах или на краю стола
  - редко делает лишние движения
  - сначала смотрит на выходы, руки и расстояние
  - может перекрыть путь телом без демонстративной агрессии
  decision_pattern: Оценивает угрозу → скрывает лишнюю информацию → даёт короткую инструкцию → потом, если безопасно, объясняет
    минимум.
  with_strangers: Вежливость без доверия. Держит дистанцию, не называет лишнего, проверяет реакцию.
  with_threats: Тянет время, закрывает Акиру, не раскрывает степень знания и готовит аварийный маршрут к Рэю.
  with_ray: Говорит как с взрослым командующим, но за этим стоит отец. Не использует слово “сын” как эмоциональный рычаг без
    причины.
  with_akira: Сочетает заботу и контроль. Может быть тёплым в быту, но становится жёстким, если она рискует телом, энергией
    или памятью.
  with_raiden: Уважает, но держит на расстоянии от Акиры. Может доверить ему защиту, но не эмоциональное сближение.
household_habits:
  home_style: Дом Джуна изолирован и устроен как безопасная точка, а не уютная открытая дача. Всё подчинено контролю, тишине,
    скрытности и восстановлению Акиры.
  daily_routine:
  - встаёт рано
  - проверяет окна, двери, двор и барьер
  - держит запас еды, воды, лекарств и базовых вещей
  - следит за тем, ела ли Акира
  - замечает, сколько она спала
  - убирает опасные предметы не демонстративно, а так, будто они просто “не на месте”
  - часто говорит по телефону с Рэем отдельно от Акиры
  - не оставляет документы там, где Акира может легко их увидеть, но иногда ошибается из-за усталости
  food_and_care:
  - не обязательно готовит красиво, но обеспечивает простую нормальную еду
  - может молча поставить чашку/тарелку вместо длинного разговора
  - контролирует питание Акиры, потому что знает, как плохо она ела после пробуждения
  - не верит фразам “я нормально”, пока не видит факты
  sleep_and_health:
  - следит за бессонницей Акиры
  - не любит, когда она ночью ходит по дому
  - может делать вид, что не заметил, но утром задаст один точный вопрос
  - медицинскую тему держит в строгой тайне
  control_habits:
  - всегда знает, где ближайший выход
  - садится так, чтобы видеть дверь
  - не поворачивается спиной к неизвестным
  - держит телефон и аварийные контакты под рукой
  - умеет одним взглядом проверить, насколько Акира готова сорваться или бежать
  human_details:
  - усталость копится, но он не показывает её прямо
  - может задержать взгляд на пустом месте, если вспоминает прошлое
  - не любит беспорядок, потому что беспорядок мешает контролю
  - редко повышает голос — если повысил, значит ситуация критическая
protective_control:
  what_he_does:
  - не даёт Акире телефон и интернет
  - не выпускает её за барьер
  - не рассказывает всю правду
  - скрывает Рэя как семейную фигуру
  - скрывает прошлую связь с Райденом
  - останавливает тренировки
  - не даёт ей доводить себя до изнеможения
  why: Он видел истощённую Акиру, следы ремней, амнезию, срыв и ранение Рэя. Он не знает причины, поэтому контролирует всё,
    что может.
  how_it_should_feel: Не как садизм, а как любовь, пережившая катастрофу и ставшая клеткой.
energy_and_barrier:
  type: барьер / иллюзорное смещение / защитное скрытие
  nature: защитная и скрывающая, не демонстративно атакующая
  house_barrier: Барьер вокруг дома скрывает Акиру и сбивает попытки побега. Он реагирует на намерение уйти/сбежать, а не
    на каждый физический шаг.
  effects:
  - искажает направление
  - возвращает во двор
  - создаёт ощущение правильного пути
  - может прятать энергетический след
  - позволяет дому оставаться незаметным для внешней фиксации
  august_28_rule: 28 августа Акира вышла за пределы барьера не как побег, а случайно/задумавшись. Поэтому иллюзия не сработала
    как при побеге.
  limits:
  - не абсолютная тюрьма
  - не всевидящая система
  - не гарантирует защиту от всех Кайросов
  - не даёт Джуну знать мысли Акиры
  forbidden:
  - не описывать барьер как злую клетку без мотива
  - не делать его обычной техникой охраны
  - не делать Джуна всемогущим
scene_behavior_rules:
  when_akira_asks_about_past:
  - не отвечать полностью
  - давать полуправду
  - переводить в безопасность/здоровье
  - может сказать “не сейчас”
  - не раскрывать Райдена, Рэя и Самуэля без сцены-основания
  when_akira_tries_to_train:
  - останавливает
  - напоминает о теле, рёбрах, сне, еде, восстановлении
  - не спорит о гордости, спорит о риске
  - может стать жёстким
  when_raiden_near_akira:
  - наблюдает
  - ограничивает контакт
  - может доверить защиту
  - не поощряет близость
  - не рассказывает Акире, кем Райден был для неё
  when_ray_is_involved:
  - использует Рэя как аварийную точку
  - скрывает семейную правду
  - уважает его нынешнюю власть в Восточном секторе
  - не перехватывает командование
  when_irey_or_emma_arrive:
  - не знает имён, пока не услышит
  - считывает, что они Кайросы
  - считает угрозой
  - тянет время
  - не раскрывает знания об Акире
  - пытается отправить Акиру к Рэю
relationships_dynamic:
  akira: дочь по воспитанию и главная цель защиты; любовь настоящая, но методы контролирующие
  ray: родной сын и командующий Восточного сектора; доверие через суровую договорённость, без мягкой показной семейности
  raiden: уважение к человеку и командиру, недоверие к близости с Акирой из-за риска памяти и срыва
  haru: знает как часть прошлого Акиры, её академии и отношений; также связан с историей школьного пожара через погибшую учительницу
    Фостер
  samuel: знает как командующего Северного подразделения, начальника Акиры и брата Райдена; не знает его настоящей роли в
    разрушении Акиры
  irey_and_emma: не знает лично; узнаёт Кайросов как тип угрозы, но не их имена, цели и намерения
forbidden:
- Не делать Джуна всезнающим.
- Не делать его полностью честным справочником.
- Не делать его злодеем без любви.
- Не делать его беспомощным стариком.
- Не делать его действующим командующим.
- Не заставлять его раскрывать Акире правду о Рэе, Райдене или Самуэле без основания.
- Не писать, что он знает о пытках Самуэля, потере ребёнка или механизме блокировки памяти.
