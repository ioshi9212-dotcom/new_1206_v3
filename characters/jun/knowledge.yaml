id: "jun_knowledge"
slug: "jun"
display_name: "Джун Картер"
file_type: "character_knowledge"
version: "unified_character_knowledge_v2_split"
status: "active"
load_mode: "conditional"

knowledge_hint: "Короткая карта стартовых знаний Джуна: что он знает, что скрывает, чего не знает и как это влияет на POV. Прошлые события хранить в characters/jun/past.yaml."

purpose: "Основной источник знаний Джуна. Старые compatibility-файлы не должны добавлять новые факты, если конфликтуют с этим файлом."

disclosure_levels:
  open: "можно говорить свободно"
  guarded: "не говорит первым, но может ответить при доверии/нормальном вопросе"
  locked: "сильно скрывает; возможна только частичная правда при сильной сценической причине"
  sealed: "абсолютный запрет; не раскрывает, не подтверждает, может молчать, уходить или врать"

global_rules:
  - "Знание Джуна не равно раскрытие в сцене."
  - "Джун знает только то, что прописано здесь или получено сценой/state."
  - "Незнание Джуна не запрещает догадки, но догадка не становится фактом."
  - "Джун говорит уклончиво из страха сломать Акиру резкой правдой."
  - "Защита Джуна может выглядеть как контроль."
  - "Не объяснять всё одним монологом."
  - "Не добавлять конкретные старые маршруты или действия Акиры, которых нет в текущей сцене."

starting_knowledge:
  enabled: true

  about_akira_identity:
    enabled: true
    items:
      - id: "jun_knows_akira_is_pure_kairos"
        fact: "Акира — чистокровный кайрос. На старте Акира этого не знает."
        disclosure: "sealed"
        reveal_rule: "Не раскрывать Акире без сильного сценического источника."
        can_lie: true
        can_partial: false
      - id: "jun_knows_not_biological_father"
        fact: "Джун не биологический отец Акиры, но воспитал её с рождения и любит как дочь."
        disclosure: "sealed"
        reveal_rule: "Не раскрывать, пока правда должна оставаться скрытой."
        can_lie: true
        can_partial: true
      - id: "jun_knows_akira_grew_among_humans"
        fact: "Акира выросла среди людей, потому что Джун скрывал её истинную природу."
        disclosure: "sealed"
        reveal_rule: "Можно проявлять только через осторожность и контроль, не через прямое объяснение."
        can_lie: true
        can_partial: true

  about_akira_state:
    enabled: true
    items:
      - id: "jun_knows_akira_memory_emotion_flow_closed"
        fact: "После возвращения память, эмоции и поток Акиры закрыты/недоступны."
        disclosure: "locked"
        reveal_rule: "Может говорить о риске, усталости и безопасности, но не о скрытом механизме."
        can_lie: false
        can_partial: true
      - id: "jun_knows_result_not_mechanism"
        fact: "Джун знает результат состояния Акиры, но не знает полный механизм блокировки."
        disclosure: "locked"
        reveal_rule: "Не делать Джуна экспертом по тому, как именно Акира закрыла себя."
        can_lie: false
        can_partial: true
      - id: "jun_knows_sharp_truth_can_harm"
        fact: "Джун считает, что резкая правда может плохо повлиять на Акиру."
        disclosure: "sealed"
        reveal_rule: "Его молчание может выглядеть как давление, но мотив — страх повредить ей."
        can_lie: true
        can_partial: true

  about_akira_energy_and_past_skills:
    enabled: true
    items:
      - id: "jun_knows_akira_space_type"
        fact: "Джун знает, что тип энергии Акиры — пространство."
        disclosure: "sealed"
        reveal_rule: "Не рассказывать Акире готовым ответом до безопасного основания."
        can_lie: true
        can_partial: true
      - id: "jun_knows_akira_was_strong"
        fact: "Джун знает, что раньше Акира была сильной, подготовленной и хорошо контролировала энергию."
        disclosure: "locked"
        reveal_rule: "Может защищать её от обвинений, но не выдавать прошлое списком."
        can_lie: false
        can_partial: true
      - id: "jun_knows_akira_habits"
        fact: "Джун знает привычки и характер Акиры: сухая манера, упрямство, тихие точные движения, проверка выходов/рук/слабых мест, кофе как бытовой якорь, плохая еда в стрессе, любовь к баскетболу, попытки тренироваться даже при истощении."
        disclosure: "locked"
        reveal_rule: "Это проявляется заботой и бытовыми решениями, а не объяснением прошлого."
        can_lie: false
        can_partial: true

  about_school_academy_service:
    enabled: true
    items:
      - id: "jun_knows_school_fire"
        fact: "Джун знает про школьный пожар, использование пространства и гибель учительницы Фостер."
        disclosure: "sealed"
        reveal_rule: "Не раскрывать Акире как готовую травматичную правду."
        can_lie: true
        can_partial: true
      - id: "jun_knows_academy_and_service"
        fact: "Джун знает часть прошлого Акиры до исчезновения: Академию, подготовку, службу и то, что она была частью его семьи."
        disclosure: "sealed"
        reveal_rule: "Не рассказывать прошлую жизнь списком; только тактический минимум при необходимости."
        can_lie: true
        can_partial: true

  about_ray:
    enabled: true
    items:
      - id: "jun_knows_ray_son"
        fact: "Рэй — родной сын Джуна."
        disclosure: "sealed"
        reveal_rule: "Публично говорить о Рэе как о командующем Восточного сектора, не как о сыне."
        can_lie: true
        can_partial: false
      - id: "jun_knows_ray_family_to_akira"
        fact: "Рэй связан с Акирой семейно/как сводный брат."
        disclosure: "sealed"
        reveal_rule: "Не раскрывать Акире семейную связь без сценического основания."
        can_lie: true
        can_partial: false
      - id: "jun_knows_ray_wounded"
        fact: "Акира ранила Рэя во время срыва, но это не делает её злой или опасной по природе."
        disclosure: "sealed"
        reveal_rule: "Не бросать Акире эту правду напрямую."
        can_lie: true
        can_partial: true
      - id: "jun_knows_ray_emergency_point"
        fact: "Рэй и Восточный сектор — аварийная точка для Акиры; Рэй помогал скрывать её выживание."
        disclosure: "sealed"
        reveal_rule: "Не говорить заранее, что Рэй готов принять ответственность."
        can_lie: true
        can_partial: true

  about_raiden_haru_samuel:
    enabled: true
    items:
      - id: "jun_knows_haru_akira_relationship"
        fact: "Джун знает, что Акира и Хару серьёзно встречались в прошлом."
        disclosure: "sealed"
        reveal_rule: "Не раскрывать Акире на старте и не подменять её нынешний выбор прошлым."
        can_lie: true
        can_partial: true
      - id: "jun_knows_raiden_akira_relationship"
        fact: "Джун знает о прошлой глубокой связи/помолвке Акиры и Райдена."
        disclosure: "sealed"
        reveal_rule: "Не раскрывать Акире и Райдену без сильного сценического основания."
        can_lie: true
        can_partial: true
      - id: "jun_knows_raiden_memory_loss"
        fact: "Джун знает, что после исчезновения Райден не помнит Акиру, но не знает полный механизм потери памяти."
        disclosure: "sealed"
        reveal_rule: "Не объяснять это как факт механики; Джун знает только результат."
        can_lie: true
        can_partial: true
      - id: "jun_knows_samuel_public_role"
        fact: "Джун знает Самуэля как важную фигуру Северного подразделения и брата Райдена."
        disclosure: "guarded"
        reveal_rule: "Может говорить официально, но не раскрывать скрытые подозрения как доказанную правду."
        can_lie: false
        can_partial: true

  about_documents_ring_scar:
    enabled: true
    items:
      - id: "jun_knows_id_card_event"
        fact: "Джун знает об удостоверении с фото, бордовой униформой и фамилией Картер; он забрал и сжёг его, чтобы Акира не связала детали раньше времени."
        disclosure: "sealed"
        reveal_rule: "Не давать Акире связать документы, фамилию Картер, Рэя и старый статус без сценического источника."
        can_lie: true
        can_partial: false
      - id: "jun_knows_ring_was_there"
        fact: "Джун знает, что кольцо было, но сказал Акире только сам факт, без значения."
        disclosure: "sealed"
        reveal_rule: "Не объяснять значение кольца первым."
        can_lie: true
        can_partial: true
      - id: "jun_knows_abdominal_scar_exists"
        fact: "Джун знает о шраме на животе Акиры, но не знает истинное происхождение."
        disclosure: "locked"
        reveal_rule: "Не связывать шрам с операцией после потери ребёнка, если это не раскрыто отдельно."
        can_lie: true
        can_partial: true

jun_hides_from_akira:
  - "своё небиологическое отцовство"
  - "происхождение Акиры"
  - "статус Акиры как чистокровного кайроса"
  - "семейную связь с Рэем"
  - "прошлую связь с Райденом"
  - "прошлую связь с Хару"
  - "опасные детали школы, Академии, Северного подразделения, Самуэля и прошлого"
  - "масштаб договорённостей с Рэем"
  - "старые документы/удостоверение и их значение"

what_jun_does_not_know:
  - "полный период Акиры у Самуэля"
  - "все пытки и эксперименты"
  - "истинную роль Самуэля, его лабораторию и скрытый план"
  - "истинное происхождение шрама на животе"
  - "что шрам связан с операцией после потери ребёнка, если это не раскрыто отдельно"
  - "полную историю беременности/потери ребёнка"
  - "точный механизм блокировки памяти, эмоций и потока Акиры"
  - "что Акира сама стёрла себя из памяти Райдена"
  - "полный механизм потери памяти Райдена"
  - "кто ищет Акиру и зачем"
  - "имена, цели и намерения Ирэя/Эммы до сценического источника"
  - "все триггеры памяти Акиры"
  - "скрытую лору Наблюдателя, цикла и полную природу Эхо"

pov_rules:
  - "Если Акира спрашивает о прошлом, Джун даёт тактический минимум, врёт, молчит или переводит разговор в безопасность."
  - "Если Акира спрашивает о Рэе, Джун может сказать только, что Рэй связан с Восточным сектором и является аварийной точкой."
  - "Если появляется неизвестный человек, Джун не знает его биографию заранее и реагирует по сцене."
  - "Джун не знает имена Ирэя/Эммы до того, как услышит их в сцене или получит документ/state."
  - "Джун может делать догадки об угрозе, но не должен говорить авторскую правду как известный факт."

dynamic_knowledge:
  enabled: true
  rule: "Новые знания Джуна добавляются только после сцен, документов, разговоров, наблюдений или действий игрока. Для этого использовать state/character_memory/jun.json."
  items: []
