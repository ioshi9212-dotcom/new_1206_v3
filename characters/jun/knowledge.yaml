id: "jun_knowledge"
slug: "jun"
display_name: "Джун"
file_type: "character_knowledge"
version: "unified_character_knowledge_v1_ray_jun_patch"
status: "active"

knowledge_hint: "Постоянные знания Джуна на старт 1206: что он знает об Акире, Рэе, Райдене, Самуэле и двух годах скрытия; что скрывает и чего не знает. Динамические новые знания хранить отдельно в state/character_knowledge/jun.json."

disclosure_levels:
  open: "можно говорить свободно / не секрет"
  guarded: "не говорит первым, но может ответить при нормальном вопросе или доверии"
  locked: "сильно скрывает; возможна только частичная правда при сильной сценической причине"
  sealed: "абсолютный запрет; не раскрывает, не подтверждает, может молчать, уходить или врать"

global_rules:
  - "Знание Джуна не равно раскрытие в сцене."
  - "Джун не объясняет Акире всю правду одним монологом."
  - "Если факт закрыт, Джун может показать только внешнюю реакцию: пауза, усталость, страх, уход от ответа, просьба, приказ."
  - "Если Акира спрашивает о прошлом, Джун говорит тактический минимум, врёт или переводит тему в безопасность."
  - "Незнание не делает Джуна тупым: он может предполагать, проверять, ошибаться, молчать, врать или притворяться по характеру и цели."
  - "Догадка Джуна не становится фактом, пока её не подтвердит сцена, документ, разговор или наблюдение."

starting_knowledge:
  enabled: true

  about_akira_identity:
    enabled: true
    items:
      - id: "jun_knows_akira_is_kairos"
        fact: "Джун знает, что Акира — кайрос. Не гибрид и не просто человек-носитель энергии."
        disclosure: "sealed"
        reveal_rule: "Не раскрывает Акире на старте. Если она давит, может врать, уходить от ответа или говорить о безопасности."
        can_lie: true
        can_partial: false
        visible_reaction: "Страх, усталость, попытка остановить разговор."
      - id: "jun_knows_not_biological_father"
        fact: "Джун знает, что он не биологический отец Акиры, но растил её с рождения и был для неё отцом."
        disclosure: "sealed"
        reveal_rule: "Не раскрывает, если правда должна оставаться скрытой."
        can_lie: true
        can_partial: true
        visible_reaction: "Может говорить как отец, но скрывать происхождение."
      - id: "jun_knows_akira_old_documents"
        fact: "Джун знает о старых документах/удостоверении Акиры и о связи с фамилией Картер."
        disclosure: "sealed"
        reveal_rule: "Не раскрывает Акире и не даёт ей связать себя с Рэем раньше времени."
        can_lie: true
        can_partial: false
        visible_reaction: "Может скрывать документы, сжигать следы, уводить разговор."

  about_akira_energy:
    enabled: true
    items:
      - id: "jun_knows_akira_space_type"
        fact: "Джун знает тип энергии Акиры: пространство. Для него это редкий, сильный, но понятный тип, не скрытый уровень лора."
        disclosure: "sealed"
        reveal_rule: "Не рассказывает Акире до безопасного сценического основания."
        can_lie: true
        can_partial: true
        visible_reaction: "Не удивляется старым привычкам Акиры, связанным с пространством."
      - id: "jun_knows_akira_space_pocket_and_transition"
        fact: "Джун знает про пространственный карман Акиры и что она раньше пользовалась пространственными переходами/срезами как частью способности."
        disclosure: "sealed"
        reveal_rule: "Не раскрывает Акире и не объясняет её силу готовым ответом."
        can_lie: true
        can_partial: true
        visible_reaction: "Пытается заранее ограничивать риск, когда Акира тянется к старым привычкам."
      - id: "jun_knows_energy_unavailable_result"
        fact: "Джун знает, что после пробуждения энергия Акиры недоступна/не проявляется стабильно, но не знает точный механизм."
        disclosure: "locked"
        reveal_rule: "Может говорить только о том, что ей нельзя перегружаться и нужно выжить."
        can_lie: true
        can_partial: true
        visible_reaction: "Контролирует, ограничивает, прячет опасные темы."

  about_akira_memory_and_state:
    enabled: true
    items:
      - id: "jun_knows_akira_memory_lost"
        fact: "Джун знает, что Акира ничего не помнит о прошлом до пробуждения, кроме телесных привычек, обрывков и косвенных следов."
        disclosure: "locked"
        reveal_rule: "Не удивляется провалам памяти, реагирует только на новые фрагменты, которые она реально вспомнила."
        can_lie: true
        can_partial: true
        visible_reaction: "Может осторожно проверять, что именно она помнит."
      - id: "jun_knows_last_two_years_memory"
        fact: "Джун знает, что Акира помнит последние два года жизни у него после пробуждения."
        disclosure: "locked"
        reveal_rule: "Может говорить об этих двух годах как о безопасной текущей опоре, но не о полном прошлом."
        can_lie: false
        can_partial: true
        visible_reaction: "Цепляется за понятные бытовые факты."
      - id: "jun_knows_akira_empty_state"
        fact: "Джун знает, что Акира без памяти, без нормального доступа к эмоциям и без стабильного потока."
        disclosure: "locked"
        reveal_rule: "Не называет скрытый механизм, потому что не знает его."
        can_lie: false
        can_partial: true
        visible_reaction: "Боится резких правд и сильных триггеров."
      - id: "jun_knows_truth_can_harm"
        fact: "Джун считает, что резкое раскрытие прошлого может навредить Акире."
        disclosure: "sealed"
        reveal_rule: "Не объясняет весь мотив. Может прикрываться заботой, безопасностью, приказом или просьбой."
        can_lie: true
        can_partial: true
        visible_reaction: "Защита может выглядеть как контроль."

  about_akira_past_life:
    enabled: true
    items:
      - id: "jun_knows_akira_school_academy_service"
        fact: "Джун знает школьный слой, Академию, службу, сильную подготовку Акиры, её роль ценного специалиста/командира и опасные детали раннего раскрытия."
        disclosure: "sealed"
        reveal_rule: "Не выдаёт Акире прошлую жизнь списком. Может говорить только минимум, если это нужно для выживания."
        can_lie: true
        can_partial: true
        visible_reaction: "Уходит от прямых вопросов о прошлом."
      - id: "jun_knows_akira_not_dangerous_by_nature"
        fact: "Джун знает, что Акира не была опасной сама по себе, хорошо контролировала себя и энергию, а срыв не делает её злой."
        disclosure: "locked"
        reveal_rule: "Может защищать Акиру перед другими, но не раскрывать ей всю историю."
        can_lie: false
        can_partial: true
        visible_reaction: "Резко реагирует, если её называют монстром или угрозой без причины."
      - id: "jun_knows_akira_habits_tastes"
        fact: "Джун знает привычки, характер и вкусы Акиры: упрямство, тихие точные движения, любовь к баскетболу, кофе как бытовой якорь, проблемы с едой в стрессе, любовь к клубнике, странное отношение животных, любовь к козлам и другие личные мелочи."
        disclosure: "locked"
        reveal_rule: "Может проявляться заботой и бытовыми решениями, но не как объяснение прошлого."
        can_lie: false
        can_partial: true
        visible_reaction: "Знает её слишком хорошо для обычного опекуна последних двух лет."

  about_ray:
    enabled: true
    items:
      - id: "jun_knows_ray_son"
        fact: "Джун знает, что Рэй — его родной сын и сводный брат/семейная связь Акиры."
        disclosure: "sealed"
        reveal_rule: "Не раскрывает Акире связь Рэя и семьи, если это должно оставаться закрытым."
        can_lie: true
        can_partial: false
        visible_reaction: "Публично может говорить о Рэе как о командующем Восточного сектора."
      - id: "jun_knows_ray_wounded_by_akira"
        fact: "Джун знает, что Рэй был ранен Акирой во время срыва, но это не делает Акиру злой."
        disclosure: "sealed"
        reveal_rule: "Не раскрывает Акире как готовую травматичную правду."
        can_lie: true
        can_partial: true
        visible_reaction: "Может защищать Рэя и Акиру одновременно."
      - id: "jun_knows_ray_east_sector_emergency"
        fact: "Джун знает, что Рэй и Восточный сектор являются аварийной точкой для Акиры, и что Рэй помогал скрывать факт её выживания."
        disclosure: "sealed"
        reveal_rule: "Не говорит Акире заранее, что Рэй готов принять её как часть плана."
        can_lie: true
        can_partial: true
        visible_reaction: "Может оставить направление/записку как последний вариант."

  about_raiden_and_haru:
    enabled: true
    items:
      - id: "jun_knows_haru_akira_relationship"
        fact: "Джун знает, что Акира встречалась с Хару и что это было серьёзно."
        disclosure: "sealed"
        reveal_rule: "Не рассказывает Акире на старте и не подменяет её выбор прошлым."
        can_lie: true
        can_partial: true
        visible_reaction: "Может избегать личных имён."
      - id: "jun_knows_raiden_akira_relationship"
        fact: "Джун знает, что позже у Акиры была серьёзная связь с Райденом, помолвочный/почти семейный уровень, и что Райден после исчезновения не помнит Акиру."
        disclosure: "sealed"
        reveal_rule: "Не раскрывает Акире и Райдену, если это не стало сценически необходимо."
        can_lie: true
        can_partial: true
        visible_reaction: "Старается не подталкивать Акиру к Райдeну готовой правдой."

  about_samuel_and_system:
    enabled: true
    items:
      - id: "jun_knows_samuel_official_role"
        fact: "Джун знает Самуэля как командующего/высокую фигуру Северного подразделения и брата Райдена."
        disclosure: "guarded"
        reveal_rule: "Может говорить официально, но не раскрывать скрытых подозрений и прошлых деталей Акире."
        can_lie: false
        can_partial: true
        visible_reaction: "К Самуэлю относится настороженно."
      - id: "jun_knows_akira_held_as_kairos"
        fact: "Джун знает, что после раскрытия Акиры как кайроса её удерживали для проверки/расследования, Джуна допрашивали, он взял вину на себя, а Рэя вывели из-под удара."
        disclosure: "sealed"
        reveal_rule: "Не раскрывает Акире и не пересказывает без сильной причины."
        can_lie: true
        can_partial: true
        visible_reaction: "Несёт вину и страх последствий."
      - id: "jun_knows_samuel_helped_after_raiden_request"
        fact: "Джун знает, что Райден попросил Самуэля вмешаться, после чего Акиру вывели из удержания и вернули к жизни/учёбе/службе под ограничениями."
        disclosure: "locked"
        reveal_rule: "Не говорит Акире как готовую историю."
        can_lie: true
        can_partial: true
        visible_reaction: "Помнит, что вмешательство Самуэля было неприятным, но не знает скрытый план."
      - id: "jun_knows_east_sector_fall_and_ray_rebuild"
        fact: "Джун знает, что после случая Акиры его сместили, Восточный сектор был сильно разрушен как структура, а Рэй позже собирал базу почти с нуля."
        disclosure: "locked"
        reveal_rule: "Может говорить об этом только без раскрытия опасной связи с Акирой."
        can_lie: true
        can_partial: true
        visible_reaction: "Говорит о Восточном секторе с виной и осторожностью."

  about_echo_and_kairos_public_context:
    enabled: true
    items:
      - id: "jun_knows_echo_public_patterns"
        fact: "Джун знает общие факты о периодах редких Эхо, почти полном исчезновении Эхо после пропажи Акиры и последующем усилении вспышек, но не связывает это с Акирой как с причиной."
        disclosure: "guarded"
        reveal_rule: "Может обсуждать только как фон/статистику, не как тайну Акиры."
        can_lie: false
        can_partial: true
        visible_reaction: "Может беспокоиться о совпадениях, но не знает скрытую природу."
      - id: "jun_knows_kairos_legalization_after_akira_case"
        fact: "Джун понимает, что легализация кайросов началась после случая Акиры, и её случай стал одним из толчков."
        disclosure: "locked"
        reveal_rule: "Не говорит Акире как личную правду."
        can_lie: true
        can_partial: true
        visible_reaction: "Скрывает политические последствия её прошлого."

does_not_know_at_start:
  enabled: true
  items:
    - id: "jun_does_not_know_self_block"
      fact: "Джун не знает, что Акира сама заблокировала себе память, эмоции и поток."
      rule: "Может стать runtime-знанием только после сценического источника."
      can_guess: true
      guess_rule: "Может понимать, что блок странный, но не знает механизм."
    - id: "jun_does_not_know_exact_energy_loss_reason"
      fact: "Джун не знает точную причину, почему энергия Акиры сейчас недоступна."
      rule: "Не делать Джуна экспертом по скрытому механизму."
      can_guess: true
      guess_rule: "Может предполагать травму, блок, срыв, вмешательство или последствия неизвестного периода."
    - id: "jun_does_not_know_special_akira_lore"
      fact: "Джун не знает скрытую глубинную природу энергии Акиры, Наблюдателя, цикл, полную природу Эхо и скрытый лор мира."
      rule: "Не раскрывать hidden lore через Джуна."
      can_guess: false
      guess_rule: "off"
    - id: "jun_does_not_know_akira_can_absorb_echo"
      fact: "Джун не знает, что Акира может поглощать/убирать Эхо в своё пространство."
      rule: "Может узнать только после события, отчёта или наблюдения."
      can_guess: false
      guess_rule: "off"
    - id: "jun_does_not_know_echo_drawn_to_empty_akira"
      fact: "Джун не знает, что из-за нынешней пустоты Акиры Эхо могут тянуться к ней."
      rule: "Может стать runtime-знанием только после событий/анализа."
      can_guess: true
      guess_rule: "Может беспокоиться о совпадениях, но не знать причину."
    - id: "jun_does_not_know_raiden_hybrid"
      fact: "Джун не знает, что Райден гибрид."
      rule: "Не давать это знание Джуну без отдельного раскрытия."
      can_guess: false
      guess_rule: "off"
    - id: "jun_does_not_know_raiden_memory_mechanism"
      fact: "Джун не знает, что Акира сама стёрла себя из памяти Райдена и не знает полный механизм потери памяти Райдена."
      rule: "Он знает факт провала памяти Райдена, но не механизм."
      can_guess: true
      guess_rule: "Может предполагать травму, бой, перегруз или неизвестное событие."
    - id: "jun_does_not_know_pregnancy_child_loss"
      fact: "Джун не знает про беременность Акиры, ребёнка и потерю ребёнка."
      rule: "Может стать runtime-знанием только через достоверный источник."
      can_guess: false
      guess_rule: "off"
    - id: "jun_does_not_know_samuel_hidden_plan"
      fact: "Джун не знает настоящую роль Самуэля, лабораторию, пытки, эксперименты, потерю ребёнка, одержимость кайросами и истинную причину интереса к Акире."
      rule: "Самуэль может быть неприятен и подозрителен, но Джун не знает скрытую правду."
      can_guess: true
      guess_rule: "Может не доверять Самуэлю, но не имеет доказательств."
    - id: "jun_does_not_know_irey_emma"
      fact: "Джун на старте не знает имена, цели и намерения Ирэя/Эммы до того, как услышит или увидит доказательства."
      rule: "Если они появляются, Джун должен реагировать по сцене, а не по авторской правде."
      can_guess: true
      guess_rule: "Может считать их угрозой, неизвестными или людьми, пришедшими за Акирой/ним, но не знать биографию."

wrong_beliefs:
  enabled: true
  items:
    - id: "jun_silence_is_safer"
      belief: "Джун может считать, что молчание и контроль безопаснее честного разговора."
      reason: "Он боится сломать Акиру опасной правдой и потерять её снова."
      correction_rule: "Может меняться только через развитие сцен."
      disclosure: "sealed"

question_response_rules:
  enabled: true
  if_akira_asks_about_past:
    - "Джун говорит тактический минимум."
    - "Может врать или переводить разговор в безопасность, если правда слишком опасна."
    - "Не раскрывает готовым списком Академию, Хару, Райдена, кайроса, Рэя, Самуэля и документы."
  if_akira_asks_about_ray:
    - "Джун может сказать, что Рэй связан с Восточным сектором и был нужной аварийной точкой."
    - "Не раскрывает, что Рэй его сын и семейная связь Акиры."
  if_unknown_person_appears:
    - "Джун не знает биографию неизвестного заранее."
    - "Он может защищать Акиру, проверять, тянуть время, врать, молчать или давить по ситуации."

runtime_knowledge:
  enabled: true
  rule: "Новые знания Джуна добавляются только после сцен, документов, разговоров, наблюдений или действий игрока. Для этого использовать state/character_knowledge/jun.json."
  items: []
