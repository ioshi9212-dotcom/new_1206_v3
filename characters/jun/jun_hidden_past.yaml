id: jun_hidden_past
character: Джун Картер
load_mode: conditional
family_and_origin:
  ray:
  - родной сын Джуна
  akira:
  - не биологическая дочь
  - Джун воспитал её с рождения
  - любит как дочь
  - выросла среди людей
  - Джун скрывал её истинную природу
  kairos_truth:
  - Акира чистокровный кайрос
  - Джун знает больше, чем говорит
  - Акира на старте не знает
academy_consequences:
- после раскрытия Акиры как кайроса Джуна сняли с должности/вынудили уйти
- вина была в том, что он скрывал кайроса
- Восточный сектор временно перестал функционировать
- Рэй позже занял его место
- Джун делал вид, что не знал всего
after_akira_return:
- Акира была истощена
- произошёл психологический срыв
- Акира ранила Рэя Картера
- после возвращения эмоции, поток и память Акиры закрыты/недоступны
- Джун знает результат, но не знает полный механизм
- после частичной комы/бессознательного состояния Акира очнулась у Джуна
what_jun_knows:
- часть прошлого Акиры до исчезновения
- школьный пожар и использование пространства
- гибель учительницы Фостер
- помолвку Акиры и Райдена
- что Акира была частью его семьи
- что после возвращения была истощена и сорвалась
- что резкая правда может плохо повлиять
what_jun_does_not_know:
- полный период у Самуэля
- все пытки и эксперименты
- истинное происхождение шрама на животе
- полную историю потери ребёнка
- кто ищет Акиру и зачем
- цель Ирэя
- цель Эммы
- все триггеры памяти
id_card_event:
- через полгода после пробуждения Акира нашла удостоверение с фото, бордовой униформой и фамилией Картер
- Джун забрал и сжёг удостоверение
- Акира не успела прочитать детали
- позже нашла документы Джуна с той же фамилией и решила, что он вероятно её отец
- скрыто удостоверение связано с прошлым командиром Северного сектора
ring_and_scar:
  ring_mark:
  - Джун сказал только, что кольцо было
  - не объяснил значение
  abdominal_scar:
  - Джун знает о шраме
  - не знает истинное происхождение
  - не знает, что он связан с операцией после потери ребёнка, если не раскрыто отдельно
