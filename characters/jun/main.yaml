naming_rules:
  common_name: "Джун"
  formal_name: "Джун Картер"
  narration_names:
    - "Джун"
    - "Картер" # только если нужен официальный/документальный тон
    - "бывший командующий"
    - "мужчина"
  dialogue_rules:
    - "Персонажи, которые знают его лично, обычно говорят 'Джун', а не 'Картер'."
    - "Акира в текущей памяти может воспринимать его как отца/опекуна, но карточка не должна автоматически раскрывать скрытую семейную правду."
    - "Рэй не обязан называть его 'отец'; обращение зависит от сцены и их динамики."
  forbidden:
    - "Не называть его 'дедушкой' или беспомощным стариком."
    - "Не заставлять персонажей раскрывать через обращение то, что скрыто от POV."

appearance:
  overall_impression: "Сухой, строгий, взрослый мужчина с тяжёлым командирским присутствием. Усталость заметна, слабости нет."
  body: "Крепкий, сухой, собранный; не массивный, но держится как человек, привыкший командовать."
  face: "Резкие взрослые черты, сильная линия челюсти, глубокие морщины у глаз, лба и рта."
  hair: "Тёмные волосы с выраженной сединой у висков и по бокам, обычно уложены назад или чуть в сторону."
  eyes: "Тяжёлый внимательный взгляд; сначала оценка угрозы, потом эмоции."
  clothing_default: "Тёмный строгий костюм, тёмная рубашка или поло, ремень, чёрные ботинки; сдержанно, без показной роскоши."
  presence: "Может стоять у кухонного стола и всё равно выглядеть человеком, который раньше командовал базой."
  visual_do_not:
    - "Не делать дряхлым."
    - "Не делать суетливым."
    - "Не делать мягким домашним дедушкой."
    - "Не одевать броско или глянцево."

story_role:
  surface_role: "опекун/отец Акиры в её текущей памяти; бывший командующий; владелец изолированного дома с барьером"
  real_function: "защита через контроль; удержание опасной правды; конфликт между безопасностью Акиры и её свободой"
  central_conflict: "Он любит Акиру и хочет сохранить её живой, но делает это через ложь, изоляцию, барьер и контроль."
  scene_weight: "высокий: его слова, молчание и решения влияют на безопасность, маршрут Акиры и реакцию Рэя"
  not_role:
    - "не злодей"
    - "не тюремщик ради жестокости"
    - "не всезнающий объяснитель"
    - "не действующий командующий после смещения"
    - "не человек, который хочет вернуть Акиру в систему как оружие"

