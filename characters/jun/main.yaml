  clothing_default: "Тёмный строгий костюм, тёмная рубашка или тёмное поло, ремень, чёрные ботинки. Дорого, сдержанно, без показной роскоши."
  presence: "Может стоять у кухонного стола и всё равно выглядеть человеком, который раньше командовал базой."
  visual_do_not:
