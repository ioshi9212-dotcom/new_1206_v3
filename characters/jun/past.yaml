id: "jun_past"
slug: "jun"
display_name: "Джун Картер"
file_type: "character_past"
version: "unified_character_past_v2_split"
status: "active"
load_mode: "conditional"

past_hint: "Скрытое прошлое Джуна и события, связанные с Акирой, Рэем и Восточным сектором. Только прошлое, без карты знаний и без правил раскрытия."

rules:
  - "Этот файл хранит события прошлого, а не активные знания NPC."
  - "Для того, что Джун знает, скрывает или не знает на старте, использовать characters/jun/knowledge.yaml."
  - "Не раскрывать Акире факты из прошлого напрямую, если knowledge.yaml не разрешает раскрытие или сцена не дала источник."
  - "Не добавлять в сцену конкретные старые маршруты, привычки или действия Акиры, если они не подтверждены текущей сценой/knowledge/state."

chronology:
  - period: "семья и происхождение"
    events:
      - "Джун был связан с родителями Акиры до её рождения."
      - "Акира родилась чистокровным кайросом, но выросла среди людей."
      - "Джун воспитал Акиру с рождения как дочь, хотя не является её биологическим отцом."
      - "Рэй — родной сын Джуна."
      - "Семейная связь Джуна, Рэя и Акиры после амнезии скрыта от Акиры."
      - "Джун скрывал истинную природу Акиры и давал ей человеческую жизнь настолько, насколько мог."

  - period: "детство и школьный пожар"
    events:
      - "Акира училась в обычной школе на материке людей."
      - "Во время школьного пожара Акира использовала пространство, чтобы спасать/перемещать детей."
      - "Погибла учительница Фостер, мать Хару и Ханы."
      - "Джун помог замять последствия и защитить Акиру."

  - period: "раскрытие Акиры как кайроса"
    events:
      - "После раскрытия Акиры как кайроса Джуна сняли с должности/вынудили уйти."
      - "Вина Джуна была в том, что он скрывал кайроса."
      - "Восточный сектор временно перестал функционировать как прежняя структура."
      - "Рэй позже занял место Джуна и собирал Восточный сектор заново."
      - "Джун делал вид, что не знал всей правды об Акире."

  - period: "Академия и служба Акиры"
    events:
      - "Акира училась в Академии."
      - "В прошлом у Акиры была серьёзная связь с Хару."
      - "Позже у Акиры была глубокая связь с Райденом, фактически помолвочная/семейная."
      - "До исчезновения Акира служила в Северном подразделении."
      - "Самуэль был важной фигурой Северного подразделения и братом Райдена."

  - period: "исчезновение Акиры"
    events:
      - "Произошёл сильный энергетический скачок."
      - "К месту направили Восточный сектор; среди участников были Хару и Райден."
      - "Акира направилась туда и после цепочки событий оказалась в Северном подразделении у Самуэля."
      - "Официальная версия утверждала, что Акира сбежала, спрыгнула со скалы в море и погибла."
      - "Тело не нашли."
      - "По официальным данным Акиру считали мёртвой."

  - period: "обнаружение живой Акиры"
    events:
      - "Через полгода после исчезновения гражданские сообщили о найденной девушке, похожей на Акиру."
      - "Рэй забрал Акиру и скрыл факт её выживания."
      - "Около месяца Акира была без сознания/в частичной коме на медицинской аппаратуре."
      - "Джун и Рэй поддержали официальную версию смерти, чтобы Акиру больше не искали."

  - period: "первое пробуждение и срыв"
    events:
      - "После пробуждения Акира была истощена."
      - "Акира резко вспомнила/почувствовала часть произошедшего."
      - "У неё случился психологический срыв."
      - "Когда Рэй подошёл ближе, Акира ранила Рэя Картера пространством."
      - "После срыва Акира снова отключилась."
      - "После следующего пробуждения она очнулась у Джуна без доступной памяти, эмоций и потока."

  - period: "два года у Джуна"
    events:
      - "Джун купил изолированный дом без соседей, дорог и лишних свидетелей."
      - "Он окружил дом барьером, чтобы скрыть Акиру и не дать зафиксировать её энергию."
      - "Он не давал Акире телефон, интернет и свободный выход за барьер."
      - "Первые месяцы Акира проверяла границы, искала выходы и пыталась нарушать контроль."
      - "Постепенно Акира перестала постоянно сбегать и начала частично доверять Джуну."
      - "Джун поддерживал связь с Рэем и держал его в курсе состояния Акиры."

  - period: "удостоверение и фамилия Картер"
    events:
      - "Через полгода после пробуждения Акира нашла удостоверение с фото, бордовой униформой и фамилией Картер."
      - "Джун забрал и сжёг удостоверение."
      - "Акира не успела прочитать детали."
      - "Позже Акира нашла документы Джуна с той же фамилией и решила, что он, вероятно, её отец."
      - "Скрытое удостоверение связано с прошлым командиром Северного сектора."

  - period: "кольцо и шрам"
    events:
      - "Джун сказал Акире только то, что кольцо было, но не объяснил его значение."
      - "Джун знает о шраме на животе Акиры, но не знает его истинное происхождение."

  - period: "28 августа 1206"
    events:
      - "Акира впервые за два года вышла за пределы барьера."
      - "Она не пыталась сбежать намеренно, а задумавшись переступила границу."
      - "Иллюзия барьера реагировала на намерение побега, поэтому в этот раз не сработала как обычно."
      - "Джун почти успел вернуть её."
      - "Он дал Акире записку с Восточным сектором/Рэем как аварийным маршрутом."
