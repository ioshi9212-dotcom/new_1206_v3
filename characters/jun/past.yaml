id: jun
file_type: character_past_and_knowledge
version: 1206_v2_rebuild_2026-06-22
purpose: Прошлое Джуна, официальная версия событий, знания Джуна, незнание Джуна и общие знания Джуна/Рэя об Акире.
timeline:
- period: до рождения Акиры
  events:
  - Джун дружил с родителями Акиры.
  - Родители Акиры были чистокровными Кайросами и жили на материке людей скрыто.
  - Мать Акиры умерла при родах и попросила Джуна забрать ребёнка и вырастить как человека/дочь.
  - Жена Джуна умерла после рождения Рэя; Джун воспитывал Рэя один.
- period: детство Акиры
  events:
  - Джун вырастил Акиру с рождения.
  - Он знал, что она Кайрос.
  - Он не растил её как оружие или проект.
  - Он пытался дать ей обычную человеческую жизнь.
  - Рэй и Акира фактически выросли как семья, но эта семейная правда скрывается от Акиры после амнезии.
- period: школьный пожар
  events:
  - Акира училась в обычной школе на материке людей.
  - Во время инцидента она использовала пространство, чтобы спасать/перемещать детей.
  - Погибла учительница Фостер, мать Хару и Ханы.
  - Акира перегрузилась; это не было злым намерением и не доказывает, что она опасна сама по себе.
  - Джун знает о пожаре, использовании пространства и гибели Фостер.
  - Джун использовал связи, чтобы замять последствия и защитить Акиру.
- period: Академия
  events:
  - Джун знает, что Акира училась в Академии.
  - Он знает о её привычках, контроле, любви к баскетболу, сухой манере и способности держаться спокойно под давлением.
  - Он знает, что Акира встречалась с Хару.
  - Он знает, что позже у Акиры была серьёзная связь с Райденом.
  - Он знает, что связь с Райденом была глубокой, фактически помолвочной/семейной.
- period: служба до исчезновения
  events:
  - Акира была командиром в Северном подразделении.
  - Она не относилась к Восточному сектору в этот период.
  - Командующим Северного подразделения был Самуэль.
  - Джун знает, что Самуэль — брат Райдена.
  - Джун знает Самуэля как значимую военную/политическую фигуру и начальника Акиры, но не знает его настоящей роли.
- period: '1201'
  events:
  - Джуна сместили с должности командующего Восточного сектора.
  - 'Причина: он скрывал Кайроса — Акиру.'
  - После разбирательств Кайросов частично легализовали, но Джун всё равно лишился должности.
  - После него командующим Восточного сектора стал Рэй Картер.
- period: 'исчезновение Акиры: официальная версия'
  events:
  - Был обнаружен сильный скачок энергии.
  - Туда направили Восточный сектор; среди участников были Хару и Райден.
  - Акира узнала об этом и направилась к ним.
  - Произошла стычка с Кайросами с материка.
  - Акира и Райден получили ранения.
  - Самуэль доставил Акиру в Северное подразделение, в свой медблок.
  - После этого Акира якобы сбежала и спрыгнула со скалы в море.
  - Её искали около полугода.
  - Официально тело не нашли; версия — искать в море бессмысленно, улики найдены, Акира погибла.
- period: после обнаружения живой Акиры
  events:
  - Через полгода гражданские сообщили о найденной девушке, похожей на Акиру.
  - Рэй сразу взял с собой нескольких рейдеров и забрал её.
  - 'Версия в глазах Рэя и Джуна: Акира выплыла из моря без сознания.'
  - Около месяца она лежала без сознания на медицинской аппаратуре.
  - Рэй и Джун держали факт её выживания в строгой тайне.
  - Они официально похоронили Акиру/поддержали версию смерти, чтобы никто больше её не искал.
- period: первое пробуждение и срыв
  events:
  - Когда Акира очнулась, она резко вспомнила что-то из произошедшего.
  - Сначала случился психический срыв.
  - Когда Рэй подошёл ближе, чтобы успокоить её, произошёл срыв энергии.
  - Пространство резануло Рэю шею.
  - Акира поняла, что натворила, и снова отключилась.
  - 'После следующего пробуждения она была уже в доме Джуна: без памяти, без энергии, без эмоций.'
- period: два года у Джуна
  events:
  - Джун купил изолированный дом без соседей, дорог и свидетелей.
  - Он окружил дом барьером, чтобы скрыть Акиру и не дать зафиксировать её энергию.
  - Первые месяцы Акира пыталась нарушать контроль, искать выходы и проверять границы.
  - Джун понял, что простое запирание и прямой контроль бесполезны.
  - Постепенно Акира перестала сбегать и начала доверять ему.
  - Он не давал ей телефон и интернет.
  - Он не выпускал её за барьер.
  - Она плохо ела, плохо спала и пыталась тренироваться.
  - Джун видел это, а Рэй узнавал через звонки Джуна.
- period: 28 августа 1206
  events:
  - Акира впервые за два года вышла за пределы барьера.
  - Она не пыталась сбежать, а просто задумавшись переступила границу.
  - Иллюзия барьера реагировала на намерение побега, поэтому в этот раз не сработала как обычно.
  - Джун почти вовремя успел вернуть её.
  - Он дал ей записку с Восточным сектором/Рэем как аварийным маршрутом.
  - Это общие знания Рэя и Джуна.
official_version_known_to_jun_and_ray:
  status: не полная правда; это версия, которую Джун и Рэй знают/принимают со стороны Самуэля и официальных данных
  points:
  - скачок энергии
  - направлен Восточный сектор
  - участвовали Хару и Райден
  - Акира направилась к ним
  - стычка с Кайросами с материка
  - ранения Акиры и Райдена
  - Самуэль доставил Акиру в медблок Северного подразделения
  - Акира якобы сбежала
  - Акира якобы прыгнула со скалы в море
  - тело не нашли
  - позже гражданские нашли девушку, похожую на Акиру, без сознания
author_truth_not_known_by_jun:
  status: эта правда нужна автору/движку, но не должна быть знанием Джуна
  truth:
  - Самуэль сломал Акиру пытками и давлением.
  - Акира потеряла ребёнка.
  - Ситуация с Райденом стала частью травмы.
  - У Акиры вернулась память прошлых реинкарнаций.
  - Психика не выдержала суммы боли.
  - Акира сама стерла/заблокировала память Райдена о себе.
  - Акира сама заблокировала собственную память, эмоции и поток после срыва.
  - Срыв не доказывает, что она была опасна по природе; это может случиться с любым носителем, если довести тело и психику
    до предела.
what_jun_knows:
  about_akira_identity:
  - Акира — Кайрос.
  - Он растил её с рождения.
  - Она не была опасной для системы сама по себе.
  - Она хорошо контролировала себя и энергию.
  - Она была сильным рейдером и командиром.
  - Она была ценным специалистом для системы.
  about_akira_body_and_habits:
  - любит баскетбол
  - играет без энергии, но слишком точно читает тело, темп и площадку
  - любит/использует кофе как бытовой якорь
  - плохо ест, если в стрессе
  - может коротко спать для восстановления
  - держит границы сухо и резко
  - наблюдает за выходами, руками и слабостями людей
  - двигается тихо и точно
  - может выбирать нестандартные пути и оценивать маршруты телом
  - может пытаться тренироваться, даже когда тело истощено
  - идеальный контроль для неё — техника безопасности, а не желание выделиться
  about_academy_and_relationships:
  - Акира училась в Академии.
  - Джун знает, что она встречалась с Хару.
  - Джун знает, что позже была серьёзная связь с Райденом.
  - Джун знает о помолвочном/почти семейном уровне связи Акиры и Райдена.
  - Джун знает, что после исчезновения Райден не помнит Акиру вообще.
  about_school_fire:
  - Акира ходила в обычную школу.
  - Произошёл школьный пожар.
  - Акира использовала пространство для спасения/перемещения детей.
  - Погибла учительница Фостер.
  - Это связано с Хару и Ханой Фостер.
  - Джун помог замять последствия, чтобы защитить Акиру.
  about_samuel:
  - Самуэль — командующий Северного подразделения.
  - Самуэль был начальником Акиры до её исчезновения.
  - Самуэль — брат Райдена.
  - Самуэль значимая военная/политическая фигура.
  about_ray:
  - Рэй — его родной сын.
  - Рэй стал командующим Восточного сектора после смещения Джуна.
  - Рэй помогал скрывать факт, что Акира жива.
  - Рэй был ранен Акирой во время срыва.
  - 'Рэй и Джун договорились: если что-то случится, Рэй возьмёт ответственность и скроет Акиру на базе.'
  about_raiden_memory_loss:
  - Рэй и Джун поняли, что Райден не помнит Акиру.
  - Они не давили на него и не пытались насильно вернуть память.
  - Они посчитали это психологическим последствием/защитной реакцией, не зная настоящего механизма.
what_jun_does_not_know:
- настоящую роль Самуэля в разрушении Акиры
- что Самуэль пытал Акиру
- что Самуэль связан с потерей ребёнка
- что конкретно происходило за полгода пропажи
- где именно Акира была всё это время
- что именно стало финальным триггером срыва
- механизм возвращения реинкарнационной памяти
- что Акира сама стёрла себя из памяти Райдена
- что Акира сама заблокировала себе память, эмоции и поток
- скрытую лору Наблюдателя
- полную природу Акиры
- имена, цели и намерения Ирэя/Эммы до того, как услышит/увидит доказательства
what_jun_hides_from_akira:
- что он не биологический отец, если эта правда должна оставаться скрытой
- связь Рэя с ней как семьи/сводного брата
- прошлую связь с Райденом
- помолвочный уровень связи с Райденом
- подробности школьного пожара
- часть академического прошлого
- что её официально похоронили
- масштаб того, как её скрывали последние два года
- свои разговоры с Рэем
- то, что Рэй готов принять её на базе как аварийный план
shared_jun_ray_knowledge:
- Акира жива.
- Официально она считается погибшей.
- Её выживание скрывают.
- Она была у Джуна два года.
- Она без памяти, без стабильного доступа к энергии и эмоциям.
- Она пыталась нарушать контроль, искать выходы и тренироваться.
- Она плохо ела и спала.
- Она ранила Рэя во время срыва, но это не делает её злой.
- Если ситуация выйдет из-под контроля, Акиру нужно вести к Рэю в Восточный сектор.
forbidden:
- Не писать, что Джун знает авторскую правду про Самуэля.
- Не писать, что Джун знает механизм блокировки памяти.
- Не писать, что Джун знает про ребёнка.
- Не писать, что Джун знает Ирэя и Эмму заранее.
- Не писать, что Акира была опасна для системы сама по себе.
- Не путать Северное подразделение Акиры с Восточным сектором.
- Не делать официальную версию полной правдой.
