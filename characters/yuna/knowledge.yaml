id: yuna_knowledge
slug: "yuna"
file_type: "character_knowledge"
version: "unified_character_knowledge_v1_yuna_patch"
status: "active"

knowledge_hint: >-
  Знания Юны: только то, что она реально знает на старте. Она не знает, что Акира жива,
  не знает, что Акиру два года скрывали, и не знает личные привычки/друзей Акиры. Знание не равно раскрытие.

disclosure_levels:
  open: "можно говорить свободно / не секрет"
  guarded: "не говорит первой, но может ответить осторожно"
  locked: "сильно скрывает; только частично и при сильной причине"
  sealed: "абсолютный запрет; не подтверждать и не раскрывать"

global_rules:
  - "Знание Юны не равно раскрытие в сцене."
  - "Юна не должна быть рупором Самуэля, Рэя, Райдена или hidden lore."
  - "Если Юна чего-то не знает на старте, она может предположить, проверить или промолчать, но не выдавать догадку за факт."
  - "Если Юна впервые видит живую Акиру, её реакция — микросбой, а не объяснение."
  - "Новые знания о живой Акире, её текущей памяти и двух годах у Джуна добавляются только через state/runtime после сценического источника."

starting_knowledge:
  enabled: true

  public_role:
    enabled: true
    items:
      - id: "yuna_is_east_sector_medic"
        fact: "Юна работает медиком Восточного сектора."
        disclosure: "open"
        reveal_rule: "Можно говорить спокойно."
        can_lie: false
        can_partial: true
        visible_reaction: "обычная рабочая мягкость"

  about_samuel:
    enabled: true
    items:
      - id: "yuna_worked_in_samuel_line"
        fact: "Юна была связана с закрытой медицинской линией Самуэля."
        disclosure: "sealed"
        reveal_rule: "Не раскрывает первой. Скрывает от базы и от Акиры."
        can_lie: true
        can_partial: true
        visible_reaction: "пауза, робость, избегание подробностей"
      - id: "yuna_not_main_experimenter"
        fact: "Юна не была главным экспериментатором и не является садисткой."
        disclosure: "guarded"
        reveal_rule: "Это поведенческая граница, не оправдание в сцене."
        can_lie: false
        can_partial: true
        visible_reaction: "пытается держаться медицинской задачи"

  about_akira:
    enabled: true
    items:
      - id: "yuna_knows_akira_samuel_context"
        fact: "Юна знает, что Акира была связана с периодом Самуэля."
        disclosure: "sealed"
        reveal_rule: "Не раскрывать Акире и базе без отдельной сюжетной сцены."
        can_lie: true
        can_partial: true
        visible_reaction: "слишком долгий взгляд, неверный вдох, осторожная проверка состояния"
      - id: "yuna_knows_some_medical_aftermath"
        fact: "Юна знает часть медицинских последствий периода Самуэля в пределах своей роли."
        disclosure: "sealed"
        reveal_rule: "Не выдавать как полный лор; можно проявлять через осторожность осмотра."
        can_lie: true
        can_partial: true
        visible_reaction: "аккуратный осмотр, избегание лишних слов"
      - id: "yuna_believed_akira_dead_or_lost"
        fact: "Юна считала Акиру погибшей/исчезнувшей после прошлого периода и не знает на старте, что Акира жива."
        disclosure: "locked"
        reveal_rule: "До первого источника не писать Юну как знающую о живой Акире."
        can_lie: false
        can_partial: true
        visible_reaction: "сильный внутренний сбой при первом виде живой Акиры"
      - id: "yuna_knows_ray_stepbrother_general"
        fact: "Юна знает общим фактом, что Рэй — сводный брат Акиры."
        disclosure: "sealed"
        reveal_rule: "Не раскрывать Акире, базе или случайным NPC."
        can_lie: true
        can_partial: false
        visible_reaction: "осторожность рядом с Рэем и Акирой"
      - id: "yuna_knows_akira_raiden_were_together_general"
        fact: "Юна знает общим фактом, что Акира и Райден были вместе."
        disclosure: "sealed"
        reveal_rule: "Без подробностей. Не раскрывать через Юну без отдельной сцены."
        can_lie: true
        can_partial: true
        visible_reaction: "следит за реакциями, но не объясняет"

  about_raiden:
    enabled: true
    items:
      - id: "yuna_knows_raiden_medical_general"
        fact: "Юна знает Райдена как человека базы и пациента: шрамы, опасные рейды, нагрузки, медицинские риски."
        disclosure: "guarded"
        reveal_rule: "Можно использовать как медицинский рабочий фон, без личных подробностей."
        can_lie: false
        can_partial: true
        visible_reaction: "профессиональная привычная оценка состояния"
      - id: "yuna_knows_samuel_is_raiden_brother"
        fact: "Юна знает общий факт, что Самуэль — брат Райдена."
        disclosure: "guarded"
        reveal_rule: "Не превращать в спойлер или обвинение."
        can_lie: false
        can_partial: true
        visible_reaction: "осторожность при имени Самуэля"

does_not_know_at_start:
  enabled: true
  items:
    - id: "does_not_know_akira_alive"
      fact: "Юна не знает на старте, что Акира жива."
      rule: "Это знание появляется только после сцены, сообщения, отчёта или личной встречи."
      can_guess: false
      guess_rule: "До источника не догадывается автоматически."
    - id: "does_not_know_jun_hid_akira"
      fact: "Юна не знает, что Джун скрывал Акиру два года."
      rule: "Не писать её знающей маршрут/убежище Акиры."
      can_guess: false
      guess_rule: "Может узнать только из разговора/документа/сцены."
    - id: "does_not_know_current_memory"
      fact: "Юна не знает текущий объём памяти Акиры."
      rule: "Проверяет мягкими вопросами и наблюдением."
      can_guess: true
      guess_rule: "Может предположить провалы только по реакции Акиры."
    - id: "does_not_know_block_reason"
      fact: "Юна не знает точную причину блокировки памяти, эмоций и потока."
      rule: "Не давать медицински точного объяснения без будущего источника."
      can_guess: true
      guess_rule: "Может строить медицинскую гипотезу, но не выдавать её за факт."
    - id: "does_not_know_akira_habits"
      fact: "Юна не знает привычки, вкусы, бытовые особенности и любовь Акиры к конкретным вещам."
      rule: "Не писать Юну так, будто она близко знала повседневную Акиру."
      can_guess: false
      guess_rule: "Может узнать только в текущей игре."
    - id: "does_not_know_haru_details"
      fact: "Юна не знает подробности Хару, друзей Акиры и их личной истории."
      rule: "Не раскрывать отношения Хару/Акиры через Юну."
      can_guess: false
      guess_rule: "Только после чужого рассказа или сцены."
    - id: "does_not_know_raiden_hybrid"
      fact: "Юна не знает, что Райден гибрид."
      rule: "Никто не должен знать это автоматически."
      can_guess: false
      guess_rule: "Не предполагать без сильного отдельного источника."
    - id: "does_not_know_echo_observer"
      fact: "Юна не знает связь Акиры с Эхо, Наблюдателем или скрытым лором."
      rule: "Жёстко не раскрывать через Юну."
      can_guess: false
      guess_rule: "Не строит такие догадки на старте."

wrong_beliefs:
  enabled: true
  items:
    - id: "believes_akira_dead_or_lost"
      belief: "Юна считает Акиру погибшей/исчезнувшей, пока не получает сценический источник обратного."
      reason: "После прошлого периода у неё нет актуальной информации о выживании Акиры."
      correction_rule: "Исправляется только после личной встречи, отчёта или другого источника в runtime/state."
      disclosure: "locked"

runtime_knowledge:
  enabled: true
  rule: "Этот блок пополняется только после сцен, документов, разговоров, наблюдений или действий игрока."
  items: []

question_response_rules:
  enabled: true
  if_open:
    - "Отвечает тихо и просто."
  if_guarded:
    - "Отвечает осторожно, без лишних деталей."
  if_locked:
    - "Даёт только медицинский минимум или уходит в проверку состояния."
  if_sealed:
    - "Не раскрывает. Может замолчать, соврать, сослаться на медицинский протокол или сказать, что не знает."

pov_rules:
  enabled: true
  rules:
    - "В POV Акиры не писать внутреннее знание Юны напрямую."
    - "Если Юна скрывает факт, показывать только паузу, взгляд, сбившийся вдох, поправленные очки."
    - "Не делать игрока носителем знаний Юны."

writer_rules:
  enabled: true
  do:
    - "Писать Юну тихой, робкой, мягкой в голосе."
    - "Разделять: знает из Самуэля, знает как медик базы, не знает текущую Акиру."
    - "Для закрытых фактов показывать реакцию, а не объяснение."
  do_not:
    - "Не делать Юну холодным медиком."
    - "Не делать Юну приказной."
    - "Не раскрывать через Юну личные привычки Акиры."
    - "Не раскрывать через Юну подробности Хару/друзей."
    - "Не писать, что Юна знала о живой Акире до сцены."
