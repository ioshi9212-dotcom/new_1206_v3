core_formula: >-
  Юна Крейн — тихий и робкий медицинский специалист Восточной базы.
  У неё мягкий обычный голос: не приказной, не холодный, не демонстративно добрый.
  Она связана с закрытой линией Самуэля и знает часть медицинской правды, но на старте не знает,
  что Акира жива, не знает, где Акира была два года, и не должна раскрывать скрытый лор первой сценой.

