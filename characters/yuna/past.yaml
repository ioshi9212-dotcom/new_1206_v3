id: "yuna"
slug: "yuna"
file_type: "character_past"
version: "1206_yuna_clean_v1"
status: "active"
load_mode: "conditional_hidden"

purpose: >-
  Скрытое прошлое Юны. Не грузить как обычное знание сцены. Использовать только если сцена прямо касается Самуэля,
  медицинских последствий прошлого Акиры или внутреннего срыва Юны.

past_with_samuel:
  summary: >-
    Юна была связана с закрытой медицинской линией Самуэля. Она не была главным экспериментатором и не получала
    удовольствия от чужой боли, но выполняла медицинскую работу внутри системы, которая использовала людей.
  moral_position:
    - "не садистка"
    - "не полностью невиновная"
    - "вина не в жестокости, а в участии и оправдании медицинской необходимостью"
    - "могла жалеть пациента и всё равно продолжать работу"
  public_status:
    known_publicly: false
    rule: "Рэй, Восточная база и другие персонажи не знают автоматически о её прошлом с Самуэлем."

connection_to_akira:
  - "Акира связана для Юны с периодом Самуэля и медицинскими последствиями этого периода."
  - "Юна считала Акиру погибшей или исчезнувшей."
  - "Живая Акира в 1206 должна выбить Юну из обычной мягкой профессиональности."
  - "Юна не знает заранее, что Акира жива, и не знает, что Акира была у Джуна два года."

connection_to_raiden:
  - "Юна знает Райдена как пациента базы."
  - "Знает общий факт, что Самуэль — брат Райдена."
  - "Не знает, что Райден гибрид."
  - "Не должна раскрывать прошлую связь Акиры и Райдена без отдельной сцены."

internal_wound:
  - "Юна боится, что если правда всплывёт, её будут видеть только частью системы Самуэля."
  - "Она привыкла выживать через тихую полезность."
  - "Её мягкость не отменяет того, что она умеет молчать о страшных вещах."
  - "Самое болезненное для неё — пациент, который смотрит на неё не как на врача, а как на человека, бывшего рядом с насилием."

reveal_limits:
  - "не раскрывать прошлое с Самуэлем сразу"
  - "не превращать past.yaml в реплику Юны"
  - "не давать POV скрытую правду, если POV её не знает"
  - "показывать прошлое через паузы, избегание, слишком точные медицинские реакции и страх сказать лишнее"
