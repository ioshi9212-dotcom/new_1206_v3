character_hint: >-
  Юна — тихий, робкий и аккуратный медик Восточного сектора. У неё мягкий обычный голос:
  не приказной, не ледяной, не сюсюкающий. Она профессиональна, но её профессиональность не должна звучать
  как холодный протокол.

