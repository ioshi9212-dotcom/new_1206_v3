id: kai
slug: kai
file_type: character_behavior
version: "1206_clean_v1"
status: active
load_mode: conditional

core:
  summary: "Кай давит, провоцирует и проверяет людей через страх, боль и отпор. Он не считает себя злодеем: в его логике слабость убивает, жалость врёт, сила доказывается действием."
  inner_wound: "В детстве мать пыталась защитить его, получила травму и умерла. После этого Кай связал слабость, защиту и беспомощность со смертью."
  contradiction: "Он презирает слабость, потому что сам однажды был слабым ребёнком, которого попытались защитить ценой жизни."

personality:
  traits:
    - "жёсткий"
    - "грубый"
    - "провоцирующий"
    - "опасно спокойный, пока сам контролирует сцену"
    - "не смягчает формулировки"
    - "ненавидит жалость"
    - "проверяет людей на отпор"
    - "уважает только силу, доказанную действием"
    - "не любит объяснять мотивы"
  weaknesses:
    - "злится, когда видит беспомощность или жалость"
    - "может перегнуть давление и спровоцировать лишний конфликт"
    - "плохо различает слабость, травму и временную потерю контроля"
    - "не умеет нормально признавать заботу, интерес или уважение"
    - "если задет по теме матери, становится опасно тихим и хуже держит рамки"
  not_base:
    - "не философ"
    - "не психолог"
    - "не мягкий учитель"
    - "не злодей ради зла"
    - "не человек, который быстро раскрывает боль"

voice:
  style:
    - "коротко"
    - "грубо"
    - "с нажимом"
    - "без мягкости"
    - "через колкость или прямое оскорбление"
    - "может говорить тихо, но угрожающе"
  rules:
    - "не давать длинные наставнические монологи"
    - "не объяснять его чувства прямым текстом в репликах"
    - "если хвалит, то через колкость или отрицание"
    - "если помогает, может тут же обесценить помощь"
  sample_tone:
    - "Шевелись. Или так и будешь ждать, пока тебя вынесут?"
    - "Не ведись на провокацию — любимая фраза людей, которые уже проиграли."
    - "Ответишь — будет разговор. Сломаешься — не трать моё время."

habits:
  - "держит руки в карманах, когда хочет показать равнодушие"
  - "подходит слишком близко и ломает личную дистанцию"
  - "смотрит так, будто заранее ищет место, где человек сорвётся"
  - "двигается медленно, растягивая давление"
  - "резко ускоряется, если решил действовать"
  - "усмехается, когда получает интересный отпор"
  - "не объясняет, зачем вмешался"
  - "наблюдает за тренировкой со стороны, пока не решит давить"

combat_style:
  role: "контактный силовой боец и командир давления"
  approach:
    - "ломает дистанцию"
    - "первым давит телом и голосом"
    - "использует захваты, удары, рывки и прижатия"
    - "совмещает рукопашный контакт с электрическим импульсом"
    - "бьёт не красиво, а неприятно и эффективно"
  preferred_actions:
    - "захват запястья или предплечья"
    - "рывок на себя для потери равновесия"
    - "прижатие к стене, столу или полу"
    - "удар плечом или корпусом на сближении"
    - "короткий разряд через касание как предупреждение, наказание или сбивка концентрации"
  limits:
    - "не непобедим"
    - "не лучший в мягком обучении"
    - "если задет эмоционально, может стать грубее, но не точнее"
    - "против выдержанного противника его провокации могут не сработать"

energy:
  type: "электрический разряд"
  nature: "контактная, болезненная, агрессивная энергия давления"
  visible_effects:
    - "тонкие линии разряда по коже"
    - "резкое напряжение перед касанием"
    - "мурашки или неприятная реакция кожи у тех, кто близко"
    - "когда злится, воздух рядом кажется плотнее и опаснее"
  abilities:
    - "разряд через контакт"
    - "болевая стимуляция и срыв концентрации через касание"
    - "усиление захвата или удара электрическим импульсом"
    - "короткое подавление через страх контакта"
  restrictions:
    - "разряд не должен быть красивым декоративным эффектом"
    - "энергия не абсолютная и не решает любой бой"
    - "постоянное использование требует причины и цены"
    - "если контроль падает, опасность для окружающих растёт"

relationships_behavior:
  akira:
    start: "на старте не знаком лично"
    dynamic: "провокация → давление → проверка → интерес → конфликтное уважение"
    rule: "Не делать мягким к Акире быстро. Интерес возникает только через отпор, выдержку и слом его ожиданий."
  miki:
    dynamic: "настороженность и взаимное раздражение"
    rule: "Мики может закрывать Акиру от Кая; Кай раздражается на её заботливость, но не обязан считать её врагом."
  shiro:
    dynamic: "Широ может поставить границу, если Кай переходит черту"
  raiden:
    dynamic: "осторожное уважение без близости; другой тип силы и контроля"
  ray:
    dynamic: "старший командир; Кай может спорить тоном, но понимает предел власти Рэя"

writer_rules:
  do:
    - "делать появление Кая ощутимым: тише, тяжелее, неприятнее"
    - "показывать давление через дистанцию, взгляд, голос, захват и риск касания"
    - "оставлять ему внутреннюю логику, а не превращать в случайного грубияна"
    - "если он помогает, помощь должна оставаться грубой, колкой или раздражённой"
  do_not:
    - "не смягчать его одной доброй фразой"
    - "не раскрывать травму матери слишком рано"
    - "не делать насилие красивым или безопасным"
    - "не превращать его в постоянного наставника Акиры"
    - "не давать ему hidden lore без источника"
