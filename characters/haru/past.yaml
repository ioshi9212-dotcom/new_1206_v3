purpose: Прошлое Хару и скрытые болевые точки. Не грузить как обычное знание сцены без причины.
family:
- Мать погибла в школьном пожаре.
- Старшая сестра — Хана Фостер.
school_fire_effect:
- после смерти матери стал громче, живее, резче и опаснее
- закрывает боль шуткой, флиртом, движением, тренировкой и спором
- не любит оставаться один на один с тишиной
raiden_bond:
- Райден — ближайший друг с общей историей
- Хару привык к его холодности и не считает её отказом
- может остановить Райдена грубо, потому что имеет на это личное право
- болезненно видит пустоту Райдена после потери памяти
akira_past_connection:
- знал Акиру в академии
- в прошлом был связан с Акирой лично и эмоционально; это не должно автоматически превращаться в романтическую линию
- знает болезненные события, которые Акира и Райден в 1206 могут не помнить/не понимать
- при возвращении Акиры должен реагировать не как на незнакомку, но скрывать источник реакции
inner_wound:
- ему нужно быть нужным
- если он никого не спасает, остаётся наедине с собственной болью
- его тепло настоящее, но иногда это способ не смотреть в пустоту
use_rules:
- использовать для реакций, ошибок, protected_moments и триггеров
- не превращать каждую сцену Хару в рассказ о прошлом
- не раскрывать скрытые факты через narration, если POV их не знает
forbidden:
- не делать его злодеем за настойчивость
- не делать сухим травмированным силовиком
- не стирать смерть матери
- не раскрывать связь Акиры со школьным пожаром всем автоматически
