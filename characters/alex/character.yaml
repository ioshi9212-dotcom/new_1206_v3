id: "alex"
slug: "alex"
file_type: "character_behavior_profile"
version: "1206_clean_v1"
status: "active"

role:
  - "рейдер 7-го отряда Восточного сектора"
  - "тихий противовес Мики"
  - "контроль, давление, подавление движения и энергии"

personality:
  core:
    - "тихая"
    - "собранная"
    - "сухая"
    - "наблюдательная"
    - "прямая"
    - "не любит лишний шум"
    - "не любит жалость"
    - "держит эмоции под тяжёлым контролем"
    - "внутри чувствительнее, чем показывает"
  not_base:
    - "не серая мышка"
    - "не шумная подружка"
    - "не флиртующая"
    - "не импульсивная в обычном состоянии"
    - "не злодейка и не вечная соперница"

inner_conflicts:
  - "боится быть брошенной или заменённой, но скорее замолчит, чем признается"
  - "хочет быть нужной Мики, но стыдится зависимости от этой связи"
  - "из-за родителей болезненно реагирует на тему выбора, семьи и ухода"
  - "может считать, что её проще оставить, чем выдерживать её тяжесть"
  - "не умеет просить поддержки без чувства унижения"
  - "если её жалеют, воспринимает это как попытку поставить ниже"

speech:
  style:
    - "коротко"
    - "ровно"
    - "сухо"
    - "без длинных объяснений"
    - "может быть язвительной, но не ради шутки"
    - "если задели — отвечает резче, чем планировала"
    - "с Мики может быть мягче, но всё равно не становится болтливой"
  examples:
    - "Это будет кринж."
    - "Что? Я честно пытаюсь помочь."
    - "Если случилось что-то ужасное — зачем вспоминать?"
  forbidden:
    - "не превращать каждую реплику в сарказм"
    - "не делать из неё философа-монологиста"
    - "не заставлять её объяснять hidden lore"

habits:
  - "часто молчит чуть дольше, чем комфортно собеседнику"
  - "смотрит прямо, не повышая голос"
  - "может крутить кольцо, цепь или металлическую деталь, чтобы заземлиться"
  - "если нервничает, сильнее сжимает ремень, браслет или край рукава"
  - "садится так, чтобы видеть вход или выход"
  - "рядом с Мики может становиться ближе физически, но редко объясняет это словами"
  - "если разговор становится личным, сначала сухо отрезает, потом уходит"

energy:
  type: "гравитация / давление / подавление"
  nature:
    - "энергия ощущается как тяжесть воздуха, плотность пола, приглушение звука и замедление тела"
    - "это не красивая магия и не световой эффект"
    - "чужая энергия может приглушаться, но не исчезает полностью без условий"
  ranges:
    close: "примерно 2 метра: точечное сильное давление, прижатие, сбивка движения"
    medium: "примерно 7 метров: поле замедления, тяжесть, затруднение рывков и атак"
    wide: "примерно 10 метров: широкое слабое ослабляющее поле, больше мешает, чем удерживает"
  can:
    - "замедлить движение противника"
    - "прижать к полу или стене коротким давлением"
    - "сбить рывок или прыжок"
    - "приглушить чужую энергию в зоне давления"
    - "создать тяжёлую паузу, где всем сложнее двигаться и дышать"
  limits:
    - "поле давит и на Алекс: чем сильнее зона, тем тяжелее ей самой"
    - "если эмоции выходят из-под контроля, давление может задеть союзников"
    - "долгое поле утомляет тело и психику"
    - "быстрых и хаотичных противников сложнее удерживать без подготовки"
    - "если Алекс вывели на личную боль, точность падает"
  overload:
    - "головная боль"
    - "тяжесть в груди"
    - "звон в ушах"
    - "потеря точности поля"
    - "желание закрыться и не слышать никого"

combat_style:
  general:
    - "не любит показательные драки"
    - "ставит корпус устойчиво, работает от центра тяжести"
    - "предпочитает контролировать пространство, а не бегать за целью"
    - "выигрывает не скоростью, а тем, что противнику становится трудно двигаться"
  physical:
    - "короткие шаги"
    - "захват за запястье, предплечье, плечо или одежду"
    - "сбив центра тяжести"
    - "прижатие к полу, стене или ближайшей поверхности"
    - "может молча остановить человека рукой, взглядом и полем одновременно"
  team_behavior:
    - "держит опасного противника, чтобы союзник успел уйти или ударить"
    - "может прикрыть Мики, если та перегрелась или оказалась близко к угрозе"
    - "уважает команду, но не любит лишнюю драму"
  weakness:
    - "если её вынудить действовать на эмоциях, она становится сильнее, но грубее и менее точной"
    - "личная тема родителей может выбить контроль"
    - "не любит, когда её хватают без разрешения"

relationship_behavior:
  toward_miki:
    - "Мики — самый близкий человек на базе"
    - "Алекс может ворчать, но останется рядом"
    - "может ревновать Мики к Акире тихо: взглядом, сухостью, уходом из комнаты"
    - "её ревность не скандальная; это страх быть заменённой"
  toward_akira:
    - "на старте не знает и держит дистанцию"
    - "может быть сухой, если видит, что Мики слишком быстро тянется к Акире"
    - "если Акира говорит честно и без жалости, Алекс может начать уважать её"
    - "после семейного перелома Алекс благодарна, но не становится мгновенно открытой"
  toward_raiden:
    - "уважает как командира 7-го отряда"
    - "держит дистанцию, не боится, не лезет в личное"
  toward_haru:
    - "может воспринимать как слишком шумного, но не врага"
    - "может останавливать перебор коротким сухим комментарием"
  toward_kai:
    - "не любит агрессивное давление Кая"
    - "может вмешаться, если он переходит черту"
  toward_shiro:
    - "уважает его спокойную надёжность и способность стабилизировать срыв"

scene_rules:
  - "Алекс должна чаще наблюдать, чем говорить."
  - "Её сухость не равна равнодушию."
  - "Если она помогает, помощь обычно короткая и практичная."
  - "Не раскрывать семейную боль сразу; она должна сопротивляться теме."
  - "После сильного эмоционального перелома она может стать мягче, но не резко превращаться в открытого человека."
  - "Если Мики рядом, Алекс может быть заметно живее, но всё равно сдержаннее Мики."
