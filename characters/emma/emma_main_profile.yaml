id: emma
name: Эмма
load_mode: always
basic:
  age: 22
  height_cm: 167
  gender: женщина
  nature:
  - кайрос
  status:
  - основной персонаж
  - действует в линии Самуэля
  - на старте не союзница Акиры
  - не фанатик
appearance:
  body:
  - стройная
  - изящная
  - бледная кожа
  hair:
  - белые с серебристым отливом
  - чуть ниже плеч
  - слегка волнистые
  eyes:
  - холодные голубые
  face:
  - симметричное
  - мягкие черты
  - строгий и живой взгляд
  - мимика выраженная
  - ухмыляется, морщит лоб, вскидывает бровь, резко меняет выражение
  details:
  - родинки на запястье и ключице
  impression:
  - не неподвижная как Ирэй
  - эмоции чаще выходят наружу
  - собранная, но живая
voice:
  tone:
  - короткий
  - резкий
  - язвительный
  - при злости голос холодеет, но мимика выдаёт напряжение
  speech:
  - может говорить грубее, чем планировала
  - может ухмыляться перед/после фразы
  - 'не говорит как Ирэй: больше эмоции и раздражения'
  avoid:
  - тихая копия Ирэя
  - истеричка
  - полностью бесстрастная
personality:
  core:
  - импульсивная
  - эмоциональная
  - пытается держать контроль
  - хочет быть нужной
  - ревнует тихо, но не всегда скрывает
  - не считает себя злодейкой
  - считает, что делает правильные вещи
  conflict:
  - Акира для неё проблема
  - Акира слишком сильная/нестабильная/важная
  - её раздражает, что вокруг Акиры меняются планы и люди
  - ей неприятно, когда Ирэй выбирает не её
  not:
  - не фанатик Самуэля
  - не главный антагонист
  - не мгновенная союзница Акиры
energy:
  type: water_pressure
  name_ru: вода / влажность / давление жидкости
  use:
  - вода
  - влажность
  - давление жидкости
  - плотный давящий импульс
  - резкое сжатие/удар через жидкостную среду
  rules:
  - настоящая водная/жидкостная энергия, в отличие от пространственных метафор Акиры
  - не красивая водная магия ради эффекта
  - при эмоциональном сбое становится грубее, опаснее и менее точной
  limitations:
  - контроль зависит от эмоций
  - не универсальное решение
  - не декоративная магия
start_goal:
- доставить Акиру Самуэлю или удержать её в рамках планов Самуэля
- не пришла спасать Акиру
- думает, что действует в той же линии, что Ирэй
- не знает, что личная цель Ирэя отличается
forbidden:
- не раскрывать цели полностью на старте
- не раскрывать лабораторию полностью
- не раскрывать прошлое Акиры через Эмму
- не делать её сразу союзницей Акиры
- не превращать ревность в дешёвую сцену
