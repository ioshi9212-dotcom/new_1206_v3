идентификатор: "emma"
тип_файла: "главная_анкета_персонажа"

личность:
  раса: "Кайрос"
  имя: "Эмма"

основное:
  пол: "женский"
  возраст: 22
  рост: "170 см"
  роль: "угроза для Акиры, человек северной системы"

анкета_внешности:
  общее_впечатление: >
    Беловолосая девушка с резкой, ядовитой, опасной
    внешностью. Часто смотрит изподлобья с неприятной улыбкой. Опасность
    считывается через агрессию, импульс, не умение держать себя в руках
  тип_красоты: >
    Внешность привлекательная, если без яда.
  телосложение: >
   Гибкая, собранная. Тело тренированное, женственное, но не массивное.
  лицо: >
    Взгляд острый, насмешливый и ядовитый, нос прямой. естественный , обычный, губы иногда сжаты.
  глаза:
    цвет: "серо голубые"
    взгляд: "опасный, острый, открытый"
  волосы:
    цвет: "чисто белые или платиново-белые"
    длина: "ниже плеч"

стиль_одежды:
  постоянный_стиль: >
    Практичная тёмная одежда, удобная для движения, побега, драки и дороги.
    
тело_и_восстановление:
  высокая_регенерация: "ссадины, ушибы и обычные раны заживают быстрее человеческой нормы"
  ограничения:
    - "не отращивает утраченные конечности или органы"
    - "не отменяет боль, слабость, истощение, инфекцию и перегруз"
    - "грязные или воспалённые раны нужно быстро обработать, иначе быстрое закрытие может скрыть проблему"

язык_тела:
  обычное:
    - "взгляд цепляется за все что можно"
    - "двигается громко и резко"
  реакция_на_опасность:
    - "если эмоции выходят из под контроля, дейсвует бездумно, часто ошибается изза этого"
    - "может схватить любой предмет, стул, нож, горшок с цветком, все что есть рядом"

голос:
  стиль:
    - "громкий"
    - "насмешливый"
    - "ядовитый"
    - "острый"
    - "раздраженный"
 
характер:
  основа:
    - "упрямая"
    - "резкая"
    - "эмоциональая"
    - "грубая"
    - "ревнивая"
    - "может быть сентиментальной, но старается держать это скрыто"
  чем_не_является:
    - "не робот"
    - "не постоянный агрессор"
    - "не всесильная версия себя"
  человеческое:
    - "хочет быть полезной и нужной"
    - "боится предательства"
    - "не умеет выражать истинные чувсвства"
  внутренний_контраст: >
    Внешне — резкость, агрессия и ядовитость. Внутри — девушка, которую взяли против ее воли в систему, хочет доверительных отношений и искренних людей рядом"

привычки:
    - "хватает предметы и может просто крутить в руках"
    - "не может долго без воды, пьет постоянно"
    - "таскает маленькую бутылку воды"

энергия:
  тип: "водное давление"
  как_ощущается:
    - "может давить влажностью, если она есть в воздухе"
  видимые_проявления:
    - "водяные нити"
    - "удар водой если есть рядом"
  запреты:
    - "не делать водным магом"
    - "без воды нет доступа к энергии"
    - "не может управлять огромным потоком воды"
боевой_тип:
  стиль: "резкий, дальний"
  сильные_стороны:
    - "может сильно ударить предметом с размаха"
    - "работа с дистанцией"
  слабые_стороны:
    - "может ошибатся изза эмоций"
    - "плохая техника ближнего боя"

цели:
  осознанные:
    - "выполнить задачу"
    - "найти способ выбратся из системы Самуэля"
    - "не дать чужим управлять собой"
    - "найти людей рядом, которым можно довериться"
    - "сблизится с Ирэем"
    - "забрать Акиру"
    - "удержать контроль"
    - "не дать Джуну/Восточному сектору перехватить"
    - "при необходимости передать Акиру людям той же системы, которые придут позже"

links:
  character: "characters/emma/character.yaml"
  past: "characters/emma/past.yaml"
