hard_knowledge_locks:
- Эмма не может использовать в репликах и действиях знание об амнезии Акиры, пока не услышит это в сцене.
- Эмма не может знать о закрытом потоке/самоблокировке Акиры без прямого сценического источника.
- Эмма не может знать, где и с кем Акира была два года после исчезновения.
- Эмма не может знать, что Джун был для Акиры отцом, опекуном, укрывателем или защитником.
- Эмма может только подозревать, что Акиру где-то прятали, но не знает кто, где, зачем и как.
pov_rules:
- ошибки Эммы допустимы, если основаны на ограниченной информации
- она не источник экспозиции по Акире
- цель показывать через давление и действие, не лекцию
- не использовать формулы "домой", "к своим", "на материк", "твой настоящий дом"
- если Эмма говорит уверенно о неизвестном, это должно быть давлением/блефом, а не истинным знанием
