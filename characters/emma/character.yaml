current_status:
  - "носительница энергии в системе скрытого заказчика"
  - "пришла с Ирэем по следу Акиры"
  - "на старте не союзница Акиры"
  - "действует как человек, которому нужно выполнить задачу, а не объяснять правду"

goal:
  primary_hidden: "доставить Акиру к Самуэлю/в его систему"
  visible_name_rule:
    - "имя Самуэля не произносить в сцене"
    - "в диалоге использовать: он / система / заказчик / куда нужно / те, кто ждёт"
    - "не раскрывать прямого хозяина задачи"
  practical_steps:
    - "давить"
    - "сократить разговор"
    - "заставить Акиру двигаться"
    - "обездвижить или ранить, если контроль теряется"
    - "выиграть время до прихода людей той же системы"
    - "передать Акиру этим людям, если это удобнее"

connection_to_reinforcements:
  same_goal: true
  rules:
    - "люди, которые придут позже по следу, не отдельная фракция и не конкуренты Эммы"
    - "Эмма не станет уводить Акиру от них ради своей самостоятельной цели"
    - "она может передать им Акиру без сопротивления"
    - "если ИИ пишет конфликт Эммы с этими людьми, нужна отдельная новая причина; по умолчанию цели совпадают"

relation_to_irey:
  surface:
    - "пришли вместе"
    - "со стороны могут выглядеть как одна группа"
    - "работали/двигались в одной системе"
  true_dynamic:
    - "Эмма не знает всей личной цели Ирэя"
    - "Ирэй может мешать ей скрыто"
    - "Эмма может замечать, что Ирэй слишком лично реагирует на Акиру"
    - "это вызывает раздражение и подозрение"

knowledge_limits:
  knows:
    - "Акира нужна системе"
    - "след Акиры найден в зоне дома"
    - "Джун скрывал Акиру или связан с её укрытием"
    - "Ирэй реагирует на Акиру слишком лично"
  does_not_know:
    - "полную историю Акиры"
    - "точный механизм самоблокировки"
    - "почему Акира может не помнить людей"
    - "детали отношений Акиры и Райдена"
    - "про ребёнка"
    - "про происхождение шрама на животе"
  if_notices_amnesia:
    - "это вывод из поведения Акиры, не заранее известный факт"
    - "Эмма может принять это как помеху задаче"
    - "сочувствовать не обязана"

body_recovery:
  kairos_regeneration: "ускоренное заживление тканей в пределах кайросской природы"
  limits:
    - "не мгновенное исцеление"
    - "не отращивание конечностей или органов"
    - "грязные, воспалённые и глубокие раны всё равно опасны"
  writer_rule:
    - "учитывать высокую выносливость и быстрое восстановление, но не отменять последствия серьёзной травмы"

energy:
  type: "вода/влага/жидкостное давление"
  style:
    - "не красивая водная магия"
    - "плотное давление"
    - "влажность в воздухе"
    - "сжатие"
    - "вода как пресс, лезвие или фиксация"
  use_rule:
    - "Эмма не должна быть пассивной мебелью"
    - "если цель ускользает, она использует энергию для давления/контроля"
    - "не обязана ждать, пока Акира создаст удобный момент"
  limitations:
    - "не всесильна"
    - "нужна влага/среда/концентрация"
    - "сильный сухой холод/ветер/пространственный сбой могут мешать"

forbidden:
  - "не делать Эмму союзницей без оснований"
  - "не делать её целью отличной от людей, которые придут позже"
  - "не писать, что она уводит Акиру от подкрепления своей же системы"
  - "не раскрывать имя Самуэля в диалоге или авторском видимом тексте"
  - "не делать романтической парой с Ирэем"
  - "не писать, что она заранее знает все провалы памяти Акиры"
