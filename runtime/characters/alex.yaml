id: "alex"
name: "Алекс"
load_mode: "conditional"
short: >-
  Алекс — рейдер 7-го отряда, 23 года, 170 см. Длинные чёрные волосы в косе, тёмные глаза, светлая кожа, тёмный альтернативный стиль с карго, ремнями, цепями и ботинками. Тихая, сухая, собранная, не флиртующая и не шумная. Энергия: гравитация/давление/подавление; поле тяжести 2/7/10 м, замедляет, прижимает, приглушает энергию, но давит и на неё. Лучшая подруга Мики; может тихо ревновать Мики к Акире из страха быть заменённой. Семейная тема болезненна. Не знает hidden lore Акиры/Райдена.
load_when:
  - "alex active/present/speaking/observing"
  - "scene goal directly involves Alex"
  - "Miki-Alex relationship is active"
  - "Akira-Alex relationship is active"
  - "family/parents topic for Alex is active"
files:
  main: "characters/alex/main.yaml"
  character: "characters/alex/character.yaml"
  knowledge: "characters/alex/knowledge.yaml"
  past: "characters/alex/past.yaml"
  memory: "state/character_memory/alex.json"
