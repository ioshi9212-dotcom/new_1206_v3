locations_id: east_sector_locations
version: east_sector_locations_v2_whitelist_base_logic

location_rules:
  - "Не придумывать новые локации без причины. Если сцена требует место, сначала использовать список ниже."
  - "Закрытые/режимные зоны доступны только по роли, приказу, сопровождению или сценическому основанию."
  - "Обычные бытовые зоны доступны в повседневной жизни без драматического препятствия."
  - "Если персонаж идёт по базе ночью, не вставлять охрану и запреты автоматически."

base_location_hard_lock:
  - "Восточный сектор состоит из локаций, перечисленных в этом файле, плюс мелкие переходы между ними: коридор, лестница, дорожка, вход, двор."
  - "Новую крупную локацию можно создать только если она явно вытекает из существующей зоны и нужна сцене."
  - "Не создавать новые посты, КПП, комнаты досмотра, сканеры, закрытые коридоры, камеры, клетки или охранников у каждого поворота без сюжетной причины."
  - "Ворота — главный вход/выезд, а не серия КПП по всей базе."
  - "Внутри базы люди могут ходить, говорить, есть, курить, тренироваться, спорить, выходить на крышу и во двор без отдельного разрешения, если нет тревоги/приказа/опасности."
  - "База не тюрьма и не академия. Это рабочая жилая территория взрослых молодых рейдеров."

locations:
  gates_and_barrier:
    type: entry_security
    description: "Главные ворота, постовой, высокий периметр и барьерный контур. Это вход/выезд, а не серия КПП по всей базе."
    access: "выезд возможен с предупреждением постового/ответственного и связью"

  parking_zone:
    type: service
    description: "Парковка сразу после входа: мотоциклы, автомобили, служебный транспорт."

  central_yard:
    type: public_life
    description: "Открытая лицевая часть: дорожки, деревья, лавки, простой фонтан. Спокойно, сдержанно, не роскошно."

  dormitory:
    type: residential
    description: "Общежитие. Первый этаж нежилой; выше жилые комнаты. Тут люди живут, а не просто ночуют."
    floors:
      first: "столовая, небольшой медпункт, бытовые проходы"
      second: "часть одноместных/командирских комнат и смешанные комнаты"
      third_fourth: "обычные двухместные комнаты"

  akira_room:
    type: residential_private
    floor: 2
    default_owner_history: "бывшая комната Райдена"
    current_use: "комната, куда поселят Акиру"
    raiden_note: "Райден в ней не живёт, потому что ему некомфортно; он выбрал комнату на третьем этаже с Хару."
    description: "Комната больше обычной: кровать, стол, стулья, шкаф, тумба, зеркало, окно, мини-кухня, небольшая душевая и туалет."
    mini_kitchen: "пара столешниц, ящики, раковина; это не полноценная домашняя кухня."
    item_rule: "Не придумывать содержимое шкафов, тумб и ящиков, пока оно не открыто и не перечислено в сцене/state."

  residential_lounge:
    type: public_life
    description: "Небольшая зона отдыха в жилом блоке: диван/старые кресла, стол, чайник/кофе, место посидеть и поговорить."

  canteen:
    type: food
    description: "Общая столовая с нормальным бесплатным питанием, кофе, сладким и простой горячей едой. Не сухпайки."

  raider_kitchen:
    type: food_optional
    description: "Отдельная небольшая кухня для тех, кто хочет готовить сам."

  vending_area:
    type: food_public
    description: "Автоматы с напитками и закусками в жилом/общем блоке."

  admin_building:
    type: work
    description: "Административное здание: входная зона, рабочие помещения, совещания, лекционные кабинеты, командный сектор."

  ray_office:
    type: command
    description: "Кабинет Рэя. Сюда не заходят просто так; формальность выше, чем в быту."

  commanders_workspace:
    type: work
    description: "Общее рабочее пространство командиров, без отдельных кабинетов на каждого. Практично, без элитной изоляции."

  meeting_room:
    type: work
    description: "Комната совещаний для отчётов, стратегий и разборов."

  lecture_rooms:
    type: professional_training
    description: "Кабинеты для профессиональных разборов. Это не школа и не Академия."

  file_library:
    type: archive
    description: "Файловая библиотека/архив базы: цифровые и бумажные дела, отчёты, карты, записи, доступы. Не обычная гражданская библиотека с художественными книгами."

  science_block:
    type: restricted_work
    description: "Небольшой научный блок при базе: оборудование, энергия, защитные устройства, изучение системы. Частично закрыт."

  medical_point:
    type: medical
    description: "Небольшой медпункт для осмотров, стабилизации, обработки ран, контроля перегрузки и последствий рейдов. Не роскошная клиника."

  underground_training_hall:
    type: combat_training
    description: "Главный тренировочный зал под административным зданием: усиленные стены, маты, стойки, мишени, спарринги, энергия, шум и следы использования."

  regular_gym:
    type: physical_training
    description: "Обычный спортзал для физической подготовки."

  pool:
    type: recovery_training
    description: "Бассейн под общежитием: тренировки, восстановление, отдельные виды подготовки."

  shooting_range:
    type: combat_training_restricted
    description: "Закрытое стрельбище. Доступ по правилам оружия/тренировок."

  basketball_court:
    type: sport_public
    description: "Баскетбольный корт на территории: обычный рабочий корт, не глянцевый спорткомплекс. Асфальт/покрытие, кольца, ограждение, лавки/стена/деревья рядом."
    akira_pull: "Акиру может тянуть к корту телом и привычкой, даже если она не понимает почему."

  roof:
    type: public_liminal
    description: "Крыша — не запретная зона по умолчанию. Здесь курят, молчат, смотрят на город, разговаривают."

  back_free_area:
    type: open_public
    description: "Свободная площадка за зданиями для занятий, отдыха и бытовых сцен."

  garage_and_vehicles:
    type: service
    description: "Гараж/служебная техника: автомобили, мотоциклы, квадроциклы, инструменты, аварийные наборы."

  helipad:
    type: service
    description: "Вертолётная площадка как часть служебной инфраструктуры, не центр повседневной жизни."
